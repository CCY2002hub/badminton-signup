<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羽球精英管理系統 - Ultimate V18</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* 視覺與排版 (完整保留，絕不刪除) */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  color-scheme: dark; --bg-deep: #020c1b; --bg-dark: #0a192f; --text-main: #e6f1ff; 
  --neon-green: #64ffda; --neon-red: #ff5e5e; --neon-orange: #ffaa33; --neon-blue: #007bff;
  --glass: rgba(17, 34, 64, 0.6); --glass-header: rgba(10, 25, 47, 0.8);
  --border: rgba(100, 255, 218, 0.1); --radius: 12px;
}
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-deep); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #020c1b 0%, #0a192f 50%, #172a45 100%); z-index: -2; }
.header { background: var(--glass-header); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0 1.5rem; position: sticky; top: 0; z-index: 40; height: 60px; display: flex; align-items: center; justify-content: space-between; }
.container { max-width: 960px; margin: 0 auto; padding: 1rem 1rem 5rem; }
.tabs-wrapper { border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; overflow-x: auto; white-space: nowrap; }
.tab { padding: 15px 18px; font-size: 14px; color: #ccd6f6; cursor: pointer; background: none; border: none; border-bottom: 3px solid transparent; font-weight: 700; transition: 0.3s; }
.tab.active { color: var(--neon-green); border-bottom-color: var(--neon-green); }
.card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; position: relative; }
.btn-primary { width: 100%; padding: 12px; background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green); border-radius: 8px; font-weight: 700; cursor: pointer; }
.btn-danger { color: var(--neon-red); border: 1px solid var(--neon-red); background: none; border-radius: 4px; cursor: pointer; padding: 4px 8px; font-size: 11px; font-weight: bold; transition: 0.2s; }
.btn-danger:hover { background: rgba(255,94,94,0.1); }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: rgba(100,255,218,0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
.lvl-badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; color: #fff; margin-left: 5px; }
.warn-mark { color: var(--neon-red); font-weight: 800; font-size: 10px; border: 1px solid var(--neon-red); padding: 1px 4px; border-radius: 4px; margin-left: 5px; }
input, select, textarea { width: 100%; padding: 12px; background: rgba(2,12,27,0.4); border: 1px solid var(--border); border-radius: 8px; color: #fff; margin-bottom: 1rem; }
.section { display: none; } .section.active { display: block !important; }
#login-screen, #lobby-screen, #room-screen { display: none; }
.player-row { display: flex; flex-direction: column; gap: 8px; padding: 15px 0; border-bottom: 1px solid var(--border); }
.player-main { display: flex; align-items: center; gap: 12px; }
.avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(100,255,218,0.1); display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border); }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.admin-actions { display: flex; gap: 10px; margin-top: 8px; padding-left: 52px; overflow-x: auto; white-space: nowrap; }

/* 等級色塊 */
.l1-3 { background: #4a7c1b; } .l4-5 { background: #a32d2d; } .l6-7 { background: #8e1c5c; } 
.l8-9 { background: #b8860b; } .l10-12 { background: #104e8b; } .l13-15 { background: #696969; }
.l16-18 { background: #000; border-color: var(--neon-green); }

.toast { position: fixed; bottom: 2rem; left: 50%; transform: translate(-50%, 100px); background: #0a192f; border: 1px solid var(--neon-green); padding: 12px 24px; border-radius: 20px; font-size: 13px; color: var(--neon-green); transition: 0.3s; z-index: 200; }
.toast.show { transform: translate(-50%, 0); }
</style>
</head>
<body>

<header class="header">
  <a href="?" style="text-decoration:none; color:var(--neon-green); font-weight:700;">🏸 Elite 羽球系統 V18</a>
  <div style="display:flex; align-items:center; gap:10px;">
    <span id="user-display-name" style="font-size:12px;"></span>
    <button id="logout-btn" style="font-size:10px; padding:4px 8px; background:none; border:1px solid var(--border); border-radius:15px; color:gray; display:none;" onclick="signOut()">登出</button>
  </div>
</header>

<div id="login-screen" class="container" style="flex-direction:column; align-items:center; justify-content:center; height:75vh;">
  <div class="card" style="text-align:center; width:100%; max-width:400px; padding:2.5rem;">
    <h2 style="color:var(--neon-green); margin-bottom:20px;">深海羽球系統</h2>
    <button class="btn-primary" onclick="signInWithGoogle()">Google 登入</button>
  </div>
</div>

<div id="lobby-screen" class="container">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
    <h2 style="color:var(--neon-green);">球局佈告欄</h2>
    <button id="create-btn" class="btn-primary" style="width:auto; margin:0; padding:8px 20px; display:none;" onclick="createNewGroup()">➕ 創建球局</button>
    <button id="apply-btn" class="btn-outline" style="font-size:12px; padding:8px 15px; border:1px solid var(--neon-green); color:var(--neon-green); background:none; border-radius:8px; cursor:pointer;" onclick="applyForHost()">申請當團主</button>
  </div>
  <div class="card" style="padding: 10px;">
    <h3 style="font-size:13px; color:var(--text-main); margin: 10px;">👑 我的管理中心</h3>
    <div id="my-games-list" style="padding: 0 10px;">載入中...</div>
  </div>
  <h3 style="color:var(--text-dim); margin-top:30px; font-size:16px;">🏸 開放報名中</h3>
  <div id="other-games-container"></div>
</div>

<div id="room-screen" class="container">
  <div style="margin-bottom:15px;"><button style="background:none; border:none; color:gray; cursor:pointer; font-size:14px;" onclick="window.location.href='?'">🔙 返回佈告欄</button></div>
  <div class="tabs-wrapper"><div class="tabs">
    <button id="tab-game" class="tab active" onclick="switchTab('game')">球局資訊</button>
    <button id="tab-signup" class="tab" onclick="switchTab('signup')">報名臨打</button>
    <button id="tab-roster" class="tab" onclick="switchTab('roster')">報名名單</button>
    <button id="tab-admin" class="tab admin-only" onclick="switchTab('admin')">⚙️ 團主管理</button>
  </div></div>

  <div id="sec-game" class="section active">
    <div class="card">
      <h2 id="disp-venue">📍 載入中...</h2>
      <div id="disp-address" style="color:var(--neon-blue); text-decoration:underline; cursor:pointer; font-size:13px; margin:10px 0;"></div>
      <div style="display:flex; flex-wrap:wrap; gap:10px; margin:15px 0;">
        <span class="badge">👥 <span id="disp-full-count">0/0</span> 人</span>
        <span class="badge">🏆 <span id="disp-lv-range">1-18</span> 級</span>
        <span class="badge">💳 <span id="disp-payment">現金</span></span>
      </div>
      <div style="font-size:14px;">📅 日期：<span id="disp-date"></span> | 時間：<span id="disp-time-range"></span></div>
      <div style="display:flex; gap:10px; margin-top:20px;"><div style="flex:1; background:rgba(24,95,165,0.1); padding:10px; border-radius:8px;">♂ 男 <b id="disp-fee-m">0</b></div><div style="flex:1; background:rgba(237,147,177,0.1); padding:10px; border-radius:8px;">♀ 女 <b id="disp-fee-f">0</b></div></div>
      <div id="note-box" style="margin-top:20px; padding:15px; background:rgba(100,255,218,0.05); border-radius:8px; display:none;"><div id="disp-note" style="white-space:pre-wrap;"></div></div>
    </div>
  </div>

  <div id="sec-signup" class="section">
    <div class="card">
      <div id="signup-form-box">
        <h3>填寫報名資料</h3>
        <label style="margin-top:15px;">報名姓名</label><input type="text" id="inp-name" onfocus="this.select()">
        <label>羽球等級 (1-18)</label><select id="inp-level"><option value="">請選擇...</option><option value="1">1</option><option value="4">4</option><option value="6">6</option><option value="8">8</option><option value="10">10</option><option value="13">13</option><option value="16">16</option></select>
        <label>付款方式</label><select id="inp-payment-choice"><option value="現金">現金支付</option></select>
        <label>聯絡電話</label><input type="tel" id="inp-phone" placeholder="09xx-xxx-xxx">
        <button id="signup-btn" class="btn-primary" onclick="doSignup()">確認報名</button>
      </div>
      <div id="signup-full-msg" style="display:none; text-align:center;"><h3>⚠️ 本團已滿</h3></div>
    </div>
  </div>

  <div id="sec-roster" class="section">
    <div class="card"><div id="roster-list"></div></div>
  </div>

  <div id="sec-admin" class="section admin-only">
    <div class="card">
      <label>球館名稱</label><input type="text" id="set-venue">
      <label>地址</label><input type="text" id="set-address">
      <label>打球日</label><select id="set-date"><option value="每週一">每週一</option><option value="每週二">每週二</option><option value="每週三">每週三</option><option value="每週四">每週四</option><option value="每週五">每週五</option><option value="每週六">每週六</option><option value="每週日">每週日</option></select>
      <div style="display:flex; gap:10px;"><input type="time" id="set-time-start"><input type="time" id="set-time-end"></div>
      <label>限制人數</label><select id="set-limit-select"></select>
      <label>支付方式</label>
      <div style="display:flex; gap:15px; margin-bottom:15px;"><label><input type="checkbox" id="check-cash"> 現金</label><label><input type="checkbox" id="check-linepay"> LinePay</label></div>
      <label>備註</label><textarea id="set-note"></textarea>
      <button class="btn-primary" onclick="saveSettings()">💾 儲存球局</button>
      <div style="margin-top:30px; border-top:1px solid #333; padding-top:20px;"><h3 style="color:var(--neon-red); font-size:14px;">🚫 黑名單</h3><div id="blacklist-view">無</div></div>
      <button class="btn-primary" style="color:var(--neon-red); border-color:var(--neon-red); margin-top:20px;" onclick="deleteGroup()">🗑️ 永久刪除球局</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC8sgJZoA7U1rUY8mnLg-uZKkhMkaSVQ0c",
  authDomain: "badminton-1006.firebaseapp.com",
  projectId: "badminton-1006",
  storageBucket: "badminton-1006.firebasestorage.app",
  messagingSenderId: "103056676038",
  appId: "1:1030566766038:web:e73fbb8976fec3cf423077",
  databaseURL: "https://badminton-1006-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

const urlParams = new URLSearchParams(window.location.search);
const groupId = urlParams.get('id');
let currentUser = null, isAdmin = false, groupSettings = {limit:12};
let players = [];

function initSelects() {
    const lSel = document.getElementById('set-limit-select');
    for(let i=1; i<=50; i++) lSel.add(new Option(i + " 人", i));
}
initSelects();

auth.onAuthStateChanged((user) => {
  document.querySelectorAll('#login-screen, #lobby-screen, #room-screen').forEach(el => el.style.display = 'none');
  if (user) {
    currentUser = user;
    document.getElementById('user-display-name').textContent = "Hi, " + user.displayName;
    document.getElementById('inp-name').value = user.displayName;
    document.getElementById('logout-btn').style.display = 'block';
    checkHostStatus(user.uid);
    if (!groupId) { document.getElementById('lobby-screen').style.display = 'block'; loadLobby(); }
    else { document.getElementById('room-screen').style.display = 'block'; loadRoom(groupId); }
  } else { document.getElementById('login-screen').style.display = 'flex'; }
});

function checkHostStatus(uid) {
  db.ref('hosts/' + uid).on('value', (s) => {
    const d = s.val(), st = (typeof d === 'object') ? d.status : d;
    if (st === 'approved') document.getElementById('create-btn').style.display = 'block';
  });
}

function loadLobby() {
  db.ref('groups').on('value', (snap) => {
    const data = snap.val(); if (!data) return;
    let myHtml = "";
    const classified = { "每週一":[],"每週二":[],"每週三":[],"每週四":[],"每週五":[],"每週六":[],"每週日":[] };
    Object.keys(data).forEach(id => {
      const g = data[id]; if(!g.settings) return;
      const s = g.settings, cnt = g.players ? Object.keys(g.players).length : 0;
      const card = `<div class="card" onclick="window.location.href='?id=${id}'" style="cursor:pointer; border-left:4px solid var(--neon-green); padding:12px; margin-bottom:8px;">
          <div style="display:flex; justify-content:space-between;"><b>${s.venue||"未命名"}</b><span class="badge">${cnt}/${s.limit||12}人</span></div></div>`;
      if (s.ownerUid === currentUser.uid) myHtml += card;
      else if (s.venue && classified[s.date]) classified[s.date].push(card);
    });
    document.getElementById('my-games-list').innerHTML = myHtml || "無球局";
    let finalOther = "";
    Object.keys(classified).forEach(d => { if(classified[d].length > 0) finalOther += `<div class="weekday-divider">${d}</div>` + classified[d].join(''); });
    document.getElementById('other-games-container').innerHTML = finalOther || "目前無開放球局";
  });
}

function loadRoom(id) {
  db.ref('groups/' + id + '/settings').on('value', (s) => {
    const st = s.val(); if (!st) return; groupSettings = st;
    if (st.ownerUid === currentUser.uid) { isAdmin = true; document.body.classList.add('is-admin'); loadBlacklist(); }
    document.getElementById('disp-venue').textContent = st.venue || "未命名";
    document.getElementById('disp-address').textContent = st.address || "無地址";
    document.getElementById('disp-lv-range').textContent = (st.lvMin||1) + "-" + (st.lvMax||18);
    
    let payStr = []; const pSel = document.getElementById('inp-payment-choice'); pSel.innerHTML = "";
    if(st.payCash) { payStr.push("現金"); pSel.add(new Option("現金支付", "現金")); }
    if(st.payLine) { payStr.push("LinePay"); pSel.add(new Option("LinePay 支付", "LinePay")); }
    if(pSel.options.length === 0) { payStr.push("現金 (預設)"); pSel.add(new Option("現金支付", "現金")); }
    document.getElementById('disp-payment').textContent = payStr.join(" / ");
    
    if(isAdmin){
        document.getElementById('set-venue').value = st.venue || ""; document.getElementById('set-date').value = st.date || "每週一";
        document.getElementById('set-limit-select').value = st.limit || 12;
        document.getElementById('check-cash').checked = !!st.payCash; document.getElementById('check-linepay').checked = !!st.payLine;
    }
  });

  db.ref('groups/' + id + '/players').on('value', (s) => {
    const d = s.val(); players = d ? Object.keys(d).map(k => ({...d[k], fbKey: k})) : [];
    renderRoster();
    document.getElementById('disp-full-count').textContent = players.length + "/" + (groupSettings.limit || 12);
  });
}

async function doSignup() {
  const name = document.getElementById('inp-name').value.trim();
  const lv = parseInt(document.getElementById('inp-level').value);
  const pay = document.getElementById('inp-payment-choice').value;
  const ph = document.getElementById('inp-phone').value.trim();
  if (!name || !lv || !pay || !ph) return showToast("請填寫所有欄位！");
  
  db.ref(`groups/${groupId}/players/${currentUser.uid}`).set({
    uid: currentUser.uid, name: name, level: lv, payMethod: pay, photoURL: currentUser.photoURL, time: Date.now()
  }).then(() => {
    db.ref(`groups/${groupId}/playerPhones/${currentUser.uid}`).set(ph);
    showToast("報名成功！"); switchTab('roster');
  }).catch(e => alert("失敗：" + e.message));
}

function renderRoster() {
  const l = document.getElementById('roster-list');
  if (players.length === 0) { l.innerHTML = "<p style='text-align:center; color:gray;'>尚未有人報名</p>"; return; }
  l.innerHTML = players.map(p => {
    const phoneId = `phone-${p.uid}`, recordId = `record-${p.uid}`;
    if (isAdmin) db.ref(`groups/${groupId}/playerPhones/${p.uid}`).once('value', s => { if(document.getElementById(phoneId)) document.getElementById(phoneId).textContent = s.val() || '無'; });
    db.ref('userRecords/' + p.uid).once('value', s => {
        const d = s.val(); if (!d || !document.getElementById(recordId)) return;
        const c = d.lateCancels ? Object.keys(d.lateCancels).length : 0;
        const r = d.skillRatings ? Object.values(d.skillRatings) : [];
        const avg = r.length ? (r.reduce((a,b)=>a+b.score,0)/r.length).toFixed(1) : '無';
        document.getElementById(recordId).innerHTML = (c > 0 ? `<span class="warn-mark">⚠️ 臨退 ${c}</span>` : '') + ` <span style="color:gray; font-size:10px;">鑑定: ${avg}</span>`;
    });
    return `<div class="player-row">
      <div class="player-main"><div class="avatar">${p.photoURL ? `<img src="${p.photoURL}">` : p.name[0]}</div>
        <div style="flex:1"><b>${p.name}</b> <span class="lvl-badge l1-3">LV.${p.level}</span> <span class="badge" style="font-size:9px;">${p.payMethod||'現金'}</span> <span id="${recordId}"></span>
        <div style="font-size:11px;color:gray" id="${phoneId}">${isAdmin ? '讀取中...' : '通訊受保護'}</div></div></div>
      ${isAdmin ? `<div class="admin-actions">
        <button class="btn-danger" onclick="markLateCancel('${p.uid}', '${p.name}')">臨退</button>
        <button class="btn-danger" onclick="addToBlacklist('${p.uid}', '${p.name}')">封鎖</button>
        <button class="btn-danger" style="color:var(--neon-green); border-color:var(--neon-green);" onclick="rateSkill('${p.uid}', '${p.name}')">鑑定</button>
        <button class="btn-danger" style="color:white; border-color:white;" onclick="handleDeletePlayer('${p.uid}')">移除</button></div>` : ''}
    </div>`;
  }).join('');
}

function handleDeletePlayer(uid) { if(confirm("確定移除此人？")) { db.ref(`groups/${groupId}/players/${uid}`).remove(); db.ref(`groups/${groupId}/playerPhones/${uid}`).remove().then(()=>showToast("已移除")); } }
function markLateCancel(uid, n) { if(confirm(`標記 ${n} 為臨退？`)) db.ref('userRecords/'+uid+'/lateCancels').push({time:Date.now()}).then(()=>showToast("已紀錄")); }
function addToBlacklist(uid, n) { if(confirm(`封鎖 ${n}？`)) db.ref('blacklists/'+currentUser.uid+'/'+uid).set({name:n, time:Date.now()}).then(()=>showToast("已封鎖")); }
function rateSkill(uid, n) { const s = prompt("鑑定實力 (1-18)：", "10"); if(s) db.ref('userRecords/'+uid+'/skillRatings').push({score:parseInt(s), rater:currentUser.uid}).then(()=>showToast("鑑定完成")); }

function saveSettings() {
  db.ref('groups/' + groupId + '/settings').update({
    venue: document.getElementById('set-venue').value, address: document.getElementById('set-address').value,
    date: document.getElementById('set-date').value, timeStart: document.getElementById('set-time-start').value,
    timeEnd: document.getElementById('set-time-end').value, limit: parseInt(document.getElementById('set-limit-select').value),
    payCash: document.getElementById('check-cash').checked, payLine: document.getElementById('check-linepay').checked,
    lastResetDate: new Date().toLocaleDateString()
  }).then(() => showToast("已儲存！"));
}
function loadBlacklist() {
    db.ref('blacklists/' + currentUser.uid).on('value', s => {
        const d = s.val(), el = document.getElementById('blacklist-view');
        if(!d) { el.innerHTML = "無"; return; }
        el.innerHTML = Object.keys(d).map(uid => `<div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>${d[uid].name}</span><button class="btn-danger" onclick="db.ref('blacklists/${currentUser.uid}/${uid}').remove()">解除</button></div>`).join('');
    });
}
function createNewGroup() {
  const newId = Math.random().toString(36).substring(2, 8);
  db.ref('groups/' + newId + '/settings').set({ ownerUid: currentUser.uid, venue: "新場地 (點擊管理修改)", date: "每週一", lvMin: 1, lvMax: 18, limit: 12, payCash: true, lastResetDate: new Date().toLocaleDateString() })
    .then(() => window.location.href = "?id=" + newId).catch(() => alert("失敗：無權限"));
}
function deleteGroup() { if(confirm("永久刪除球局？")) db.ref('groups/' + groupId).remove().then(() => window.location.href = window.location.pathname); }
function switchTab(tId) { ['game','signup','roster','admin'].forEach(id => { 
    document.getElementById('sec-'+id).classList.toggle('active', id===tId); document.getElementById('tab-'+id).classList.toggle('active', id===tId);
}); }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
function signInWithGoogle() { auth.signInWithPopup(provider); }
function signOut() { auth.signOut().then(() => window.location.href = window.location.pathname); }
function applyForHost() { if(confirm("申請當團主？")) db.ref('hosts/' + currentUser.uid).set({status:'pending', name:currentUser.displayName, email:currentUser.email, time:Date.now()}); }
</script>
</body>
</html>
