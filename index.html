<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite 羽球管理系統 - V20 Full Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== 核心視覺設定 (完整保留玻璃擬態與配色) ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  color-scheme: dark;
  --bg-deep: #020c1b; --bg-dark: #0a192f; --text-main: #e6f1ff; --text-dim: #ccd6f6;
  --neon-green: #64ffda; --neon-red: #ff5e5e; --neon-orange: #ffaa33; --neon-blue: #007bff;
  --glass: rgba(17, 34, 64, 0.6); --glass-header: rgba(10, 25, 47, 0.8);
  --border: rgba(100, 255, 218, 0.1); --radius: 12px;
}
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-deep); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #020c1b 0%, #0a192f 50%, #172a45 100%); z-index: -2; }

/* 頂部導覽 */
.header { background: var(--glass-header); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0 1.5rem; position: sticky; top: 0; z-index: 40; height: 60px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 18px; font-weight: 700; color: var(--neon-green); text-decoration: none; }
.container { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }

/* 分頁導覽列 */
.tabs-wrapper { border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
.tabs { display: inline-flex; gap: 5px; padding: 0 10px; }
.tab { padding: 15px 18px; font-size: 14px; color: var(--text-dim); cursor: pointer; background: none; border: none; border-bottom: 3px solid transparent; flex-shrink: 0; font-weight: 700; transition: 0.3s; }
.tab.active { color: var(--neon-green); border-bottom-color: var(--neon-green); text-shadow: 0 0 10px rgba(100,255,218,0.5); }

/* 卡片與按鈕 */
.card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; position: relative; }
.btn-primary { width: 100%; padding: 12px; background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green); border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
.btn-primary:hover:not(:disabled) { background: rgba(100,255,218,0.1); box-shadow: 0 0 15px rgba(100,255,218,0.2); }
.btn-danger { color: var(--neon-red); border: 1px solid var(--neon-red); background: none; border-radius: 4px; cursor: pointer; padding: 6px 12px; font-size: 12px; font-weight: bold; transition: 0.2s; }
.btn-danger:hover { background: rgba(255,94,94,0.1); }

/* 勳章標籤 */
.badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: bold; background: rgba(100,255,218,0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
.lvl-badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; border: 1px solid rgba(255,255,255,0.2); margin-left: 5px; color: #fff; }
.warn-mark { color: var(--neon-red); font-weight: 800; font-size: 10px; border: 1px solid var(--neon-red); padding: 1px 4px; border-radius: 4px; margin-left: 5px; background: rgba(255,94,94,0.1); }

/* 輸入與佈局 */
input, select, textarea { width: 100%; padding: 12px; background: rgba(2,12,27,0.4); border: 1px solid var(--border); border-radius: 8px; color: #fff; margin-bottom: 1rem; font-family: inherit; }
label { font-size: 12px; color: var(--neon-green); margin-bottom: 5px; display: block; font-weight: bold; }
.info-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; font-size: 14px; }
.info-label { color: var(--neon-green); font-weight: bold; min-width: 80px; }
.weekday-divider { color: var(--neon-green); font-size: 14px; font-weight: bold; margin: 25px 0 10px; border-left: 3px solid var(--neon-green); padding-left: 10px; }

/* 名單排版 */
.player-row { display: flex; flex-direction: column; gap: 10px; padding: 15px 0; border-bottom: 1px solid var(--border); }
.player-main { display: flex; align-items: center; gap: 15px; }
.avatar { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(100,255,218,0.1); border: 1px solid var(--border); overflow: hidden; font-size: 18px; font-weight: bold; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.admin-actions { display: flex; gap: 10px; margin-top: 5px; padding-left: 60px; overflow-x: auto; white-space: nowrap; padding-bottom: 5px; }

/* 顯示控制 */
.section { display: none; }
.section.active { display: block !important; animation: fadeIn 0.3s; }
#login-screen, #lobby-screen, #room-screen { display: none; }
.admin-only { display: none !important; }
.is-admin .admin-only { display: block !important; }

/* 等級分色 (圖表標準) */
.l1-3 { background: #4a7c1b; } .l4-5 { background: #a32d2d; } .l6-7 { background: #8e1c5c; } 
.l8-9 { background: #b8860b; } .l10-12 { background: #104e8b; } .l13-15 { background: #696969; }
.l16-18 { background: #000; border-color: var(--neon-green); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translate(-50%, 100px); background: #0a192f; border: 1px solid var(--neon-green); padding: 14px 28px; border-radius: 20px; font-size: 14px; font-weight: bold; color: var(--neon-green); transition: 0.3s; z-index: 200; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
.toast.show { transform: translate(-50%, 0); }
</style>
</head>
<body>

<header class="header">
  <a href="?" class="logo">🏸 Elite 羽球系統</a>
  <div style="display:flex; align-items:center; gap:10px;">
    <span id="user-display-name" style="font-size:12px;"></span>
    <button id="logout-btn" style="font-size:10px; padding:6px 12px; background:none; color:var(--text-dim); border:1px solid var(--border); border-radius:15px; cursor:pointer; display:none;" onclick="signOut()">登出</button>

</header>

<div id="login-screen" class="container" style="flex-direction:column; align-items:center; justify-content:center; height:75vh;">
  <div class="card" style="text-align:center; width:100%; max-width:400px; padding:3rem 2rem;">
    <div style="font-size:64px; margin-bottom:20px;">🏸</div>
    <h2 style="color:var(--neon-green); margin-bottom:15px;">深海羽球系統</h2>
    <p style="color:var(--text-dim); font-size:14px; margin-bottom:30px;">專業揪團與信用管理平台</p>

</div>

<div id="lobby-screen" class="container">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
    <h2 style="color:var(--neon-green);">球局佈告欄</h2>
    <button id="create-btn" class="btn-primary" style="width:auto; margin:0; padding:10px 20px; display:none;" onclick="createNewGroup()">➕ 創建球局</button>
    <button id="apply-btn" class="btn-outline" style="font-size:12px; padding:8px 15px; border:1px solid var(--neon-green); color:var(--neon-green); background:none; border-radius:8px; cursor:pointer;" onclick="applyForHost()">申請當團主</button>
  </div>
  
  <div class="card" style="padding: 10px; border-color:rgba(100,255,218,0.2);">

</div>

<div id="room-screen" class="container">
  <div style="margin-bottom:15px;"><button style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:15px;" onclick="window.location.href='?'">🔙 返回佈告欄</button></div>
  
  <div class="tabs-wrapper"><div class="tabs">
    <button id="tab-game" class="tab active" onclick="switchTab('game')">球局資訊</button>
    <button id="tab-signup" class="tab" onclick="switchTab('signup')">報名臨打</button>

  <div id="sec-game" class="section active">
    <div class="card">
      <h2 id="disp-venue" style="color:var(--text-main); margin-bottom:5px;">📍 載入中...</h2>
      <div id="disp-address" style="color:var(--neon-blue); text-decoration:underline; cursor:pointer; font-size:14px; margin-bottom:15px;"></div>
      
      <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px;">
        <span class="badge">👥 人數：<span id="disp-full-count">0/0</span></span>
        <span class="badge">🏆 等級：<span id="disp-lv-range">1-18</span> 級</span>

      <div style="display:flex; gap:10px; margin-top:20px;">
        <div style="flex:1; background:rgba(24,95,165,0.1); padding:15px; border-radius:8px; text-align:center;">♂ 男生 <br><b id="disp-fee-m" style="font-size:18px;">0</b></div>
        <div style="flex:1; background:rgba(237,147,177,0.1); padding:15px; border-radius:8px; text-align:center;">♀ 女生 <br><b id="disp-fee-f" style="font-size:18px;">0</b></div>
      </div>
      <div id="note-box" style="margin-top:20px; padding:15px; background:rgba(100,255,218,0.05); border-radius:8px; display:none;"><div id="disp-note" style="font-size:14px; white-space:pre-wrap; line-height:1.5;"></div></div>
    </div>
  </div>

  <div id="sec-signup" class="section">
    <div class="card">
      <div id="signup-form-box">
        <h3 style="margin-bottom:15px; color:var(--text-main);">📝 填寫報名資料</h3>
        
        <label>報名姓名 (可自訂)</label>
        <input type="text" id="inp-name" onfocus="this.select()">
        
        <label>我的羽球等級 (1-18 級)</label>
        <select id="inp-level">
            <option value="">請選擇您的等級...</option>

              <option value="1">1 級 (新手)</option><option value="2">2 級</option><option value="3">3 級</option>

              <option value="4">4 級 (初階)</option><option value="5">5 級</option>
            </optgroup>
            <optgroup label="初中階 (6-7)">
              <option value="6">6 級 (初中)</option><option value="7">7 級</option>
            </optgroup>
            <optgroup label="中階 (8-9)">
              <option value="8">8 級 (中階)</option><option value="9">9 級</option>
            </optgroup>
            <optgroup label="中進階 (10-12)">
              <option value="10">10 級 (中進)</option><option value="11">11 級</option><option value="12">12 級</option>
            </optgroup>
            <optgroup label="高階 (13-15)">
              <option value="13">13 級 (高階)</option><option value="14">14 級</option><option value="15">15 級</option>
            </optgroup>
            <optgroup label="職業級 (16-18)">
              <option value="16">16 級 (甲組/退役)</option><option value="17">17 級</option><option value="18">18 級 (國手)</option>

        </select>

        <select id="inp-payment-choice">

        <label>聯絡電話 (🔐 個資加密：僅團主可見)</label>
        <input type="tel" id="inp-phone" placeholder="例如：0912-345-678">
        
        <button id="signup-btn" class="btn-primary" style="margin-top:10px; font-size:16px;" onclick="doSignup()">✅ 確認報名</button>
      </div>
      <div id="signup-full-msg" style="display:none; text-align:center; padding:30px;">
        <h3 style="color:var(--neon-orange); font-size:20px;">⚠️ 本團人數已滿</h3>
      </div>
    </div>
  </div>

  <div id="sec-roster" class="section">
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:10px;">
            <b style="font-size:16px; color:var(--text-main);">目前名單</b>
            <span id="count-badge" class="badge" style="font-size:14px; padding:5px 12px;">0 人</span>
        </div>
        <div id="roster-list"></div>
    </div>
  </div>

  <div id="sec-admin" class="section admin-only">
    <div class="card">
      <h3 style="color:var(--neon-green); margin-bottom:20px;">⚙️ 球局詳細設定</h3>
      
      <label>球館名稱</label>
      <input type="text" id="set-venue" placeholder="例如：大安運動中心">
      
      <label>詳細地址 (連動 Google 地圖導航)</label>
      <input type="text" id="set-address" placeholder="請填寫完整地址">
      
      <label>打球日</label>
      <select id="set-date">
          <option value="每週一">每週一</option><option value="每週二">每週二</option><option value="每週三">每週三</option>
          <option value="每週四">每週四</option><option value="每週五">每週五</option><option value="每週六">每週六</option><option value="每週日">每週日</option>
      </select>
      
      <div style="display:flex; gap:15px; margin-bottom:1rem;">
          <div style="flex:1;"><label>開始時間</label><input type="time" id="set-time-start" style="margin:0;"></div>
          <div style="flex:1;"><label>結束時間</label><input type="time" id="set-time-end" style="margin:0;"></div>
      </div>
      
      <label>限制總人數</label>
      <select id="set-limit-select"></select>
      
      <label>要求等級區間 (1-18)</label>
      <div style="display:flex; gap:15px; margin-bottom:1rem;">
          <div style="flex:1;"><label>最低等級</label><select id="set-lv-min" style="margin:0;"></select></div>
          <div style="flex:1;"><label>最高等級</label><select id="set-lv-max" style="margin:0;"></select></div>
      </div>
      
      <label>接受支付方式 (可複選)</label>
      <div style="display:flex; gap:20px; margin-bottom:1.5rem; background:rgba(2,12,27,0.4); padding:12px; border-radius:8px; border:1px solid var(--border);">
        <label style="display:flex; align-items:center; gap:8px; margin:0;"><input type="checkbox" id="check-cash" style="width:18px; height:18px; margin:0;"> 現金收費</label>
        <label style="display:flex; align-items:center; gap:8px; margin:0;"><input type="checkbox" id="check-linepay" style="width:18px; height:18px; margin:0;"> LinePay</label>
      </div>

      <div style="display:flex; gap:15px; margin-bottom:1rem;">
          <div style="flex:1;"><label>男生費用</label><input type="number" id="set-fee-m" style="margin:0;" placeholder="例: 200"></div>
          <div style="flex:1;"><label>女生費用</label><input type="number" id="set-fee-f" style="margin:0;" placeholder="例: 150"></div>
      </div>
      
      <label>補充備註</label>
      <textarea id="set-note" rows="4" placeholder="例如：提供幾面場地、用什麼球..."></textarea>
      
      <button class="btn-primary" style="font-size:16px; padding:15px;" onclick="saveSettings()">💾 儲存並發佈球局</button>
      
      <div style="margin-top:40px; border-top:1px solid rgba(255,255,255,0.1); padding-top:20px;">
        <h3 style="color:var(--neon-red); font-size:15px; margin-bottom:15px;">🚫 黑名單管理 (被封鎖者將無法報名)</h3>
        <div id="blacklist-view" style="font-size:13px; color:gray; background:rgba(0,0,0,0.3); padding:15px; border-radius:8px;">尚無封鎖名單</div>
      </div>
      
      <button class="btn-primary" style="color:var(--neon-red); border-color:var(--neon-red); margin-top:30px; background:rgba(255,94,94,0.05);" onclick="deleteGroup()">🗑️ 永久刪除此球局</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">提示訊息</div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

<script>
// 1. 初始化 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyC8sgJZoA7U1rUY8mnLg-uZKkhMkaSVQ0c",
  authDomain: "badminton-1006.firebaseapp.com",
  projectId: "badminton-1006",
  storageBucket: "badminton-1006.firebasestorage.app",
  messagingSenderId: "103056676038",
  appId: "1:1030566766038:web:e73fbb8976fec3cf423077",
  databaseURL: "https://badminton-1006-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

const urlParams = new URLSearchParams(window.location.search);
const groupId = urlParams.get('id');
let currentUser = null, isAdmin = false, groupSettings = {limit:12, lvMin:1, lvMax:18};
let players = [];

// 2. 初始化下拉選單 (確保 1-50 人, 1-18 級寫入 DOM)
function initSelects() {
    const lSel = document.getElementById('set-limit-select');
    for(let i=1; i<=50; i++) lSel.add(new Option(i + " 人", i));
    const minL = document.getElementById('set-lv-min'), maxL = document.getElementById('set-lv-max');
    for(let i=1; i<=18; i++) { 
        minL.add(new Option(i + " 級", i)); 
        maxL.add(new Option(i + " 級", i)); 
    }
}
initSelects();

// 3. 狀態管理與登入
auth.onAuthStateChanged((user) => {
  document.querySelectorAll('#login-screen, #lobby-screen, #room-screen').forEach(el => el.style.display = 'none');
  if (user) {
    currentUser = user;
    document.getElementById('user-display-name').textContent = "Hi, " + user.displayName;
    document.getElementById('inp-name').value = user.displayName; // 預設帶入 Google 名字
    document.getElementById('logout-btn').style.display = 'block';
    
    checkHostStatus(user.uid);
    if (!groupId) { 
        document.getElementById('lobby-screen').style.display = 'block'; 
        loadLobby(); 
    } else { 
        document.getElementById('room-screen').style.display = 'block'; 
        loadRoom(groupId); 
    }
  } else { 
      document.getElementById('login-screen').style.display = 'flex'; 
  }
});

function checkHostStatus(uid) {
  db.ref('hosts/' + uid).on('value', (s) => {
    const d = s.val(), st = (typeof d === 'object') ? d.status : d;
    if (st === 'approved') document.getElementById('create-btn').style.display = 'block';
  });
}

// 4. 佈告欄載入 (包含自動重置檢查)
function loadLobby() {
  db.ref('groups').on('value', (snap) => {
    const data = snap.val(); 
    if (!data) { 
        document.getElementById('my-games-list').innerHTML = "目前無球局";
        document.getElementById('other-games-container').innerHTML = "目前無開放球局";
        return; 
    }
    
    let myHtml = "";
    const classified = { "每週一":[],"每週二":[],"每週三":[],"每週四":[],"每週五":[],"每週六":[],"每週日":[] };

    Object.keys(data).forEach(id => {
      const g = data[id]; 
      if(!g.settings) return;
      const s = g.settings;
      const cnt = g.players ? Object.keys(g.players).length : 0;
      
      checkAutoReset(id, s); // 檢查是否該重置名單
      
      const isDraft = (!s.venue || s.venue === "新場地 (點擊管理修改)");
      const card = `
        <div class="card" onclick="window.location.href='?id=${id}'" style="cursor:pointer; border-left:4px solid ${isDraft?'var(--neon-orange)':'var(--neon-green)'}; padding:15px; margin-bottom:10px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <b style="font-size:15px;">${s.venue||"未命名球局"}</b>
            <span class="badge" style="font-size:12px;">${cnt}/${s.limit||12}人</span>
          </div>
          <div style="font-size:11px; color:var(--text-dim);">
            🏆 ${s.lvMin||1}-${s.lvMax||18}級 | 🕒 ${s.date||""} ${s.timeStart||""}
          </div>
        </div>`;
        
      if (s.ownerUid === currentUser.uid) {
          myHtml += card;
      } else if (!isDraft && classified[s.date]) {
          classified[s.date].push(card);
      }
    });

    document.getElementById('my-games-list').innerHTML = myHtml || "<p style='color:gray; font-size:12px;'>目前無草稿或發佈的球局</p>";
    
    let finalOther = "";
    Object.keys(classified).forEach(d => { 
        if(classified[d].length > 0) { 
            finalOther += `<div class="weekday-divider">${d}</div>` + classified[d].join(''); 
        }
    });
    document.getElementById('other-games-container').innerHTML = finalOther || "<p style='text-align:center; color:gray; padding:20px;'>目前無開放報名的球局</p>";
  });
}

function checkAutoReset(id, s) {
    if (!s.date || !s.timeEnd || !s.lastResetDate) return;
    const now = new Date();
    if (s.lastResetDate !== now.toLocaleDateString()) {
        const weekDays = {"每週一":1, "每週二":2, "每週三":3, "每週四":4, "每週五":5, "每週六":6, "每週日":0};
        if (now.getDay() === weekDays[s.date]) {
            const [h, m] = s.timeEnd.split(':').map(Number);
            if ((now.getHours() * 60 + now.getMinutes()) > (h * 60 + m + 30)) {
                db.ref(`groups/${id}/players`).remove();
                db.ref(`groups/${id}/playerPhones`).remove();
                db.ref(`groups/${id}/settings`).update({ lastResetDate: now.toLocaleDateString() });
            }
        }
    }
}

// 5. 球局房間載入與同步
function loadRoom(id) {
  db.ref('groups/' + id + '/settings').on('value', (s) => {
    const st = s.val(); if (!st) return; groupSettings = st;
    
    if (st.ownerUid === currentUser.uid) { 
        isAdmin = true; 
        document.body.classList.add('is-admin'); 
        loadBlacklist(); 
    }
    
    // 渲染前端資訊
    document.getElementById('disp-venue').textContent = st.venue || "未命名球館";
    document.getElementById('disp-address').textContent = st.address || "無地址";
    document.getElementById('disp-address').onclick = () => { 
        if(st.address) window.open('https://www.google.com/maps/search/' + encodeURIComponent(st.address)); 
    };
    document.getElementById('disp-date').textContent = st.date || "-";
    document.getElementById('disp-time-range').textContent = (st.timeStart||"") + " ~ " + (st.timeEnd||"");
    document.getElementById('disp-lv-range').textContent = (st.lvMin||1) + " - " + (st.lvMax||18);
    document.getElementById('disp-fee-m').textContent = st.feeM || "0";
    document.getElementById('disp-fee-f').textContent = st.feeF || "0";
    
    // 渲染支付選單與顯示
    let payStr = []; 
    const pSel = document.getElementById('inp-payment-choice'); 
    pSel.innerHTML = "";
    if(st.payCash) { payStr.push("現金"); pSel.add(new Option("現金支付", "現金")); }
    if(st.payLine) { payStr.push("LinePay"); pSel.add(new Option("LinePay 支付", "LinePay")); }
    if(pSel.options.length === 0) { payStr.push("現金 (預設)"); pSel.add(new Option("現金支付", "現金")); } // 防呆
    document.getElementById('disp-payment').textContent = payStr.join(" / ");

    if (st.note) { 
        document.getElementById('note-box').style.display='block'; 
        document.getElementById('disp-note').textContent=st.note; 
    }
    
    // 渲染管理後台表單
    if(isAdmin){
      document.getElementById('set-venue').value = st.venue || ""; 
      document.getElementById('set-address').value = st.address || "";
      document.getElementById('set-date').value = st.date || "每週一";
      document.getElementById('set-time-start').value = st.timeStart || ""; 
      document.getElementById('set-time-end').value = st.timeEnd || "";
      document.getElementById('set-limit-select').value = st.limit || 12;
      document.getElementById('set-lv-min').value = st.lvMin || 1; 
      document.getElementById('set-lv-max').value = st.lvMax || 18;
      document.getElementById('check-cash').checked = !!st.payCash; 
      document.getElementById('check-linepay').checked = !!st.payLine;
      document.getElementById('set-fee-m').value = st.feeM || ""; 
      document.getElementById('set-fee-f').value = st.feeF || "";
      document.getElementById('set-note').value = st.note || "";
    }
  });

  db.ref('groups/' + id + '/players').on('value', (s) => {
    const d = s.val(); 
    players = d ? Object.keys(d).map(k => ({...d[k], fbKey: k})) : [];
    renderRoster();
    
    document.getElementById('disp-full-count').textContent = players.length + " / " + (groupSettings.limit || 12);
    document.getElementById('count-badge').textContent = players.length + " 人";
    
    // 人數額滿判定
    const me = players.find(p => p.uid === currentUser.uid);
    if (players.length >= (groupSettings.limit || 12) && !me) { 
        document.getElementById('signup-form-box').style.display='none'; 
        document.getElementById('signup-full-msg').style.display='block'; 
    } else { 
        document.getElementById('signup-form-box').style.display='block'; 
        document.getElementById('signup-full-msg').style.display='none'; 
    }
  });
}

// 6. 報名核心邏輯 (加入完整的 Firebase 錯誤捕捉)
async function doSignup() {
  const btn = document.getElementById('signup-btn');
  btn.disabled = true;
  btn.textContent = "報名中...";

  try {
      // 檢查黑名單
      const blacksnap = await db.ref('blacklists/' + groupSettings.ownerUid + '/' + currentUser.uid).get();
      if (blacksnap.exists()) {
          showToast("❌ 抱歉，您無法報名此團主的球局。");
          btn.disabled = false; btn.textContent = "確認報名";
          return;
      }

      const name = document.getElementById('inp-name').value.trim();
      const lv = parseInt(document.getElementById('inp-level').value);
      const pay = document.getElementById('inp-payment-choice').value;
      const ph = document.getElementById('inp-phone').value.trim();

      if (!name) throw new Error("請填寫報名姓名");
      if (!lv) throw new Error("請選擇您的羽球等級");
      if (!pay) throw new Error("請選擇付款方式");
      if (!ph) throw new Error("請填寫聯絡電話");
      
      if (lv < groupSettings.lvMin || lv > groupSettings.lvMax) {
          throw new Error(`您的等級 (${lv}級) 不符合團主的要求區間！`);
      }
      if (players.some(p => p.uid === currentUser.uid)) {
          throw new Error("您已經報名過囉！");
      }

      // 寫入公開資料 (players)
      await db.ref(`groups/${groupId}/players/${currentUser.uid}`).set({
        uid: currentUser.uid, name: name, level: lv, payMethod: pay, photoURL: currentUser.photoURL, time: Date.now()
      });
      
      // 寫入機密電話 (playerPhones)
      await db.ref(`groups/${groupId}/playerPhones/${currentUser.uid}`).set(ph);
      
      showToast("🎉 報名成功！"); 
      switchTab('roster');
      
  } catch (error) {
      // 若遇到 Permission Denied 會在這裡被捕捉並顯示
      let msg = error.message;
      if (msg.includes('PERMISSION_DENIED')) msg = "權限不足，可能您已被封鎖或欄位填寫錯誤。";
      showToast("❌ " + msg);
  } finally {
      btn.disabled = false;
      btn.textContent = "確認報名";
  }
}

// 7. 名單渲染與信用系統
function getLvClass(lv) {
    const n = parseInt(lv); if(n<=3) return "l1-3"; if(n<=5) return "l4-5"; if(n<=7) return "l6-7"; 
    if(n<=9) return "l8-9"; if(n<=12) return "l10-12"; if(n<=15) return "l13-15"; return "l16-18";
}

function renderRoster() {
  const l = document.getElementById('roster-list');
  if (players.length === 0) { 
      l.innerHTML = "<p style='text-align:center; color:var(--text-dim); padding:30px;'>尚未有人報名</p>"; 
      return; 
  }
  
  l.innerHTML = players.map(p => {
    const phoneId = `phone-${p.uid}`;
    const recordId = `record-${p.uid}`;
    
    // 如果是團主，去抓電話
    if (isAdmin) {
        db.ref(`groups/${groupId}/playerPhones/${p.uid}`).once('value', s => { 
            if(document.getElementById(phoneId)) document.getElementById(phoneId).textContent = s.val() || '未提供'; 
        });
    }
    
    // 讀取信用系統 (臨退 / 鑑定)
    db.ref('userRecords/' + p.uid).once('value', s => {
        const d = s.val(); 
        if (!d || !document.getElementById(recordId)) return;
        const c = d.lateCancels ? Object.keys(d.lateCancels).length : 0;
        const r = d.skillRatings ? Object.values(d.skillRatings) : [];
        const avg = r.length ? (r.reduce((a,b)=>a+b.score,0)/r.length).toFixed(1) : '無';
        document.getElementById(recordId).innerHTML = (c > 0 ? `<span class="warn-mark">⚠️ 臨退 ${c} 次</span>` : '') + ` <span style="color:var(--text-dim); font-size:10px; margin-left:5px;">鑑定: ${avg} 級</span>`;
    });

    return `
    <div class="player-row">
      <div class="player-main">
        <div class="avatar">${p.photoURL ? `<img src="${p.photoURL}">` : p.name[0]}</div>
        <div style="flex:1;">
          <b>${p.name}</b> 
          <span class="lvl-badge ${getLvClass(p.level)}">LV.${p.level}</span> 
          <span class="badge" style="font-size:9px;">${p.payMethod||'現金'}</span> 
          <span id="${recordId}"></span>
          <div style="font-size:11px; color:var(--neon-orange); margin-top:4px;" id="${phoneId}">${isAdmin ? '正在讀取電話...' : '🔒 通訊已受保護'}</div>
        </div>
      </div>
      ${isAdmin ? `
      <div class="admin-actions">
        <button class="btn-danger" onclick="markLateCancel('${p.uid}', '${p.name}')">📌 標記臨退</button>
        <button class="btn-danger" onclick="addToBlacklist('${p.uid}', '${p.name}')">🚫 封鎖</button>
        <button class="btn-danger" style="color:var(--neon-green); border-color:var(--neon-green);" onclick="rateSkill('${p.uid}', '${p.name}')">⚖️ 鑑定實力</button>
        <button class="btn-danger" style="color:white; border-color:white;" onclick="handleDeletePlayer('${p.uid}')">🗑️ 移除此員</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

// 8. 團主專用管理函數
function handleDeletePlayer(uid) { 
    if(confirm("確定要將此人從名單中移除嗎？")) { 
        db.ref(`groups/${groupId}/players/${uid}`).remove(); 
        db.ref(`groups/${groupId}/playerPhones/${uid}`).remove().then(()=>showToast("✅ 已成功移除")); 
    } 
}
function markLateCancel(uid, n) { 
    if(confirm(`確定要為 ${n} 記上一筆【臨退】紀錄嗎？`)) {
        db.ref('userRecords/'+uid+'/lateCancels').push({time:Date.now()}).then(()=>showToast("✅ 已寫入信用紀錄")); 
    }
}
function addToBlacklist(uid, n) { 
    if(confirm(`確定將 ${n} 加入您的黑名單？他將永遠無法報名您的局。`)) {
        db.ref('blacklists/'+currentUser.uid+'/'+uid).set({name:n, time:Date.now()}).then(()=>showToast("✅ 已封鎖")); 
    }
}
function rateSkill(uid, n) { 
    const s = prompt(`請輸入您對 ${n} 觀察到的實際等級 (1-18)：`, "10"); 
    if(s && !isNaN(s)) {
        db.ref('userRecords/'+uid+'/skillRatings').push({score:parseInt(s), rater:currentUser.uid}).then(()=>showToast("✅ 鑑定完成")); 
    }
}

function saveSettings() {
  db.ref('groups/' + groupId + '/settings').update({
    venue: document.getElementById('set-venue').value, address: document.getElementById('set-address').value,
    date: document.getElementById('set-date').value, timeStart: document.getElementById('set-time-start').value,
    timeEnd: document.getElementById('set-time-end').value, limit: parseInt(document.getElementById('set-limit-select').value),
    lvMin: parseInt(document.getElementById('set-lv-min').value), lvMax: parseInt(document.getElementById('set-lv-max').value),
    payCash: document.getElementById('check-cash').checked, payLine: document.getElementById('check-linepay').checked,
    feeM: document.getElementById('set-fee-m').value, feeF: document.getElementById('set-fee-f').value, note: document.getElementById('set-note').value,
    lastResetDate: new Date().toLocaleDateString()
  }).then(() => showToast("💾 球局設定已發佈！")).catch(e => showToast("❌ 儲存失敗，權限不足"));
}

function loadBlacklist() {
    db.ref('blacklists/' + currentUser.uid).on('value', s => {
        const d = s.val(), el = document.getElementById('blacklist-view');
        if(!d) { el.innerHTML = "尚無封鎖名單"; return; }
        el.innerHTML = Object.keys(d).map(uid => `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:5px;"><span>${d[uid].name}</span><button class="btn-danger" onclick="db.ref('blacklists/${currentUser.uid}/${uid}').remove()">解除封鎖</button></div>`).join('');
    });
}

function createNewGroup() {
  const newId = Math.random().toString(36).substring(2, 8);
  db.ref('groups/' + newId + '/settings').set({ 
      ownerUid: currentUser.uid, venue: "新場地 (請點擊管理修改)", date: "每週一", lvMin: 1, lvMax: 18, limit: 12, payCash: true, lastResetDate: new Date().toLocaleDateString() 
  }).then(() => window.location.href = "?id=" + newId).catch(() => alert("❌ 失敗：請確認您是否具備團主權限"));
}
function deleteGroup() { if(confirm("確定永久刪除這個球局嗎？所有名單都會消失喔！")) db.ref('groups/' + groupId).remove().then(() => window.location.href = window.location.pathname); }

// 9. UI 工具函數
function switchTab(tId) { 
    ['game','signup','roster','admin'].forEach(id => { 
        const s = document.getElementById('sec-'+id), t = document.getElementById('tab-'+id);
        if(s) s.classList.toggle('active', id===tId); if(t) t.classList.toggle('active', id===tId);
    }); 
}
function showToast(m) { 
    const t = document.getElementById('toast'); t.textContent = m; 
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); 
}
function signInWithGoogle() { auth.signInWithPopup(provider); }
function signOut() { auth.signOut().then(() => window.location.href = window.location.pathname); }
function applyForHost() { if(confirm("想申請成為開團團主嗎？")) db.ref('hosts/' + currentUser.uid).set({status:'pending', name:currentUser.displayName, email:currentUser.email, time:Date.now()}).then(()=>showToast("✅ 申請已送出，請等待管理員核准")); }
</script>
