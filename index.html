<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羽球臨打報名系統 - 雲端同步版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== 基礎設定與配色 ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F6F2; --surface: #FFFFFF; --surface2: #F1EFE8; --border: rgba(0,0,0,0.1);
  --border2: rgba(0,0,0,0.18); --text: #1A1A18; --text2: #5F5E5A; --text3: #888780;
  --green: #3B6D11; --green-bg: #EAF3DE; --green-mid: #639922;
  --amber: #854F0B; --amber-bg: #FAEEDA; --amber-mid: #EF9F27;
  --red: #A32D2D; --red-bg: #FCEBEB;
  --blue: #185FA5; --blue-bg: #E6F1FB; --blue-mid: #85B7EB;
  --pink-bg: #FBEAF0; --pink-border: #ED93B1; --pink-text: #72243E;
  --radius: 10px; --radius-sm: 6px; --shadow: 0 1px 4px rgba(0,0,0,0.07);
}
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }
.site-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; position: sticky; top: 0; z-index: 40; }
.header-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
.logo { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.admin-toggle { font-size: 12px; padding: 5px 12px; border: 1px solid var(--border2); border-radius: 20px; background: transparent; cursor: pointer; color: var(--text2); transition: all .15s; }
.admin-toggle.active { background: var(--text); color: #fff; border-color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; overflow-x: auto; scrollbar-width: none; }
.tab { padding: 10px 16px; font-size: 13px; font-weight: 500; border: none; background: none; cursor: pointer; color: var(--text3); border-bottom: 2px solid transparent; white-space: nowrap; transition: all .2s; }
.tab.active { color: var(--text); border-bottom-color: var(--text); }
.section { display: none; }
.section.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 1rem; }
.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(175px, 1fr)); gap: 10px; margin-bottom: 1rem; }
.info-block { background: var(--surface2); border-radius: var(--radius-sm); padding: .75rem 1rem; }
.info-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.info-value { font-size: 14px; font-weight: 500; }
.fee-row { display: flex; gap: 10px; margin-bottom: 1rem; }
.fee-card { flex: 1; border-radius: var(--radius-sm); padding: .75rem 1rem; }
.fee-m { background: var(--blue-bg); border: 1px solid var(--blue-mid); }
.fee-f { background: var(--pink-bg); border: 1px solid var(--pink-border); }
.badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; display: inline-block; }
.bg-green { background: var(--green-bg); color: var(--green); }
.bg-red { background: var(--red-bg); color: var(--red); }
.slots-bar { background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; margin-top: .5rem; }
.slots-fill { height: 100%; transition: width .4s; background: var(--green-mid); }
.form-group { margin-bottom: 1rem; }
.form-label { font-size: 13px; color: var(--text2); margin-bottom: 5px; display: block; }
input, select, textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 14px; }
.submit-btn { width: 100%; padding: 11px; background: var(--text); color: #fff; border: none; border-radius: var(--radius-sm); font-weight: 700; cursor: pointer; margin-top: .5rem; transition: opacity 0.2s; }
.submit-btn:hover { opacity: 0.8; }
.player-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; background: #CECBF6; color: #3C3489; }
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; transition: transform .3s; z-index: 200; }
.toast.show { transform: translateX(-50%) translateY(0); }
.is-admin .admin-panel { display: block; }
.admin-panel { display: none; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">🏸 羽球臨打報名</div>
    <button class="admin-toggle" id="admin-toggle" onclick="toggleAdmin()">團主模式</button>
  </div>
</header>

<div class="container" id="app">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('game')">球局資訊</button>
    <button class="tab" onclick="switchTab('signup')">報名臨打</button>
    <button class="tab" onclick="switchTab('roster')">報名名單</button>
    <button class="tab admin-panel" onclick="switchTab('admin')">管理設定</button>
  </div>

  <div id="sec-game" class="section active">
    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:1rem">
        <h2 id="disp-title">載入中...</h2>
        <span class="badge bg-green" id="status-badge">報名中</span>
      </div>
      <div class="info-grid">
        <div class="info-block"><div class="info-label">地點</div><div id="disp-venue" class="info-value">-</div></div>
        <div class="info-block"><div class="info-label">時間</div><div id="disp-time" class="info-value">-</div></div>
        <div class="info-block"><div class="info-label">日期</div><div id="disp-date" class="info-value">-</div></div>
      </div>
      <div class="fee-row">
        <div class="fee-card fee-m">男生 <span id="disp-fee-m">-</span></div>
        <div class="fee-card fee-f">女生 <span id="disp-fee-f">-</span></div>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;font-size:13px">
        <span>報名人數</span>
        <span><span id="count">0</span> / <span id="max-slots">12</span></span>
      </div>
      <div class="slots-bar"><div class="slots-fill" id="slots-fill" style="width:0%"></div></div>
    </div>
  </div>

  <div id="sec-signup" class="section">
    <div class="card">
      <div class="card-title">填寫報名資料</div>
      <div class="form-group">
        <label class="form-label">姓名</label>
        <input type="text" id="inp-name" placeholder="請輸入姓名">
      </div>
      <div class="form-group">
        <label class="form-label">電話</label>
        <input type="tel" id="inp-phone" placeholder="09xx-xxx-xxx">
      </div>
      <button class="submit-btn" onclick="doSignup()">確認報名</button>
    </div>
  </div>

  <div id="sec-roster" class="section">
    <div class="card" id="roster-list">暫無報名資料</div>
  </div>

  <div id="sec-admin" class="section">
    <div class="card">
      <div class="card-title">球局快速設定</div>
      <div class="form-group"><label>標題</label><input type="text" id="set-title"></div>
      <div class="form-group"><label>球館</label><input type="text" id="set-venue"></div>
      <div class="form-group"><label>日期</label><input type="text" id="set-date"></div>
      <div class="form-group"><label>時間</label><input type="text" id="set-time"></div>
      <div class="form-group"><label>男生費用</label><input type="text" id="set-fee-m"></div>
      <div class="form-group"><label>女生費用</label><input type="text" id="set-fee-f"></div>
      <button class="submit-btn" onclick="saveSettings()" style="background:#3B6D11">儲存並同步到雲端</button>
      <button class="submit-btn" onclick="clearPlayers()" style="background:#A32D2D; margin-top:10px">清空所有報名名單</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<script>
// 1. Firebase 配置 (對應你的 badminton-1006 專案)
const firebaseConfig = {
  apiKey: "AIzaSyC8sgJZoA7U1rUY8mnLg-uZKkhMkaSVQ0c",
  authDomain: "badminton-1006.firebaseapp.com",
  projectId: "badminton-1006",
  storageBucket: "badminton-1006.firebasestorage.app",
  messagingSenderId: "103056676038",
  appId: "1:1030566766038:web:e73fbb8976fec3cf423077",
  databaseURL: "https://badminton-1006-default-rtdb.firebaseio.com"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let players = [];
let isAdmin = false;

// 2. 監聽資料庫 - 球員名單
db.ref('players').on('value', (snapshot) => {
  const data = snapshot.val();
  players = data ? Object.keys(data).map(key => ({...data[key], fbKey: key})) : [];
  renderRoster();
  updateCount();
});

// 3. 監聽資料庫 - 球局設定
db.ref('settings').on('value', (snapshot) => {
  const settings = snapshot.val();
  if (settings) {
    document.getElementById('disp-title').textContent = settings.title || "羽球臨打團";
    document.getElementById('disp-venue').textContent = settings.venue || "-";
    document.getElementById('disp-date').textContent = settings.date || "-";
    document.getElementById('disp-time').textContent = settings.time || "-";
    document.getElementById('disp-fee-m').textContent = settings.feeM || "-";
    document.getElementById('disp-fee-f').textContent = settings.feeF || "-";
    
    if(isAdmin){
        document.getElementById('set-title').value = settings.title || "";
        document.getElementById('set-venue').value = settings.venue || "";
        document.getElementById('set-date').value = settings.date || "";
        document.getElementById('set-time').value = settings.time || "";
        document.getElementById('set-fee-m').value = settings.feeM || "";
        document.getElementById('set-fee-f').value = settings.feeF || "";
    }
  }
});

// 權限切換 (預設密碼 1234)
function toggleAdmin() {
  if (!isAdmin) {
    const pw = prompt("請輸入管理密碼：\n(預設測試密碼為 1234)");
    if (pw !== "1234") return showToast("密碼錯誤！");
  }
  isAdmin = !isAdmin;
  document.getElementById('app').classList.toggle('is-admin', isAdmin);
  document.getElementById('admin-toggle').classList.toggle('active', isAdmin);
  document.getElementById('admin-toggle').textContent = isAdmin ? '✓ 團主模式' : '團主模式';
  showToast(isAdmin ? "進入管理模式" : "回到球員模式");
}

// 報名功能
function doSignup() {
  const name = document.getElementById('inp-name').value.trim();
  const phone = document.getElementById('inp-phone').value.trim();
  if (!name || !phone) return showToast("請填寫完整資料");

  // 將資料推送到 Firebase
  db.ref('players').push({ name, phone, time: Date.now() })
    .then(() => {
      showToast("報名成功！");
      document.getElementById('inp-name').value = "";
      document.getElementById('inp-phone').value = "";
      switchTab('roster');
    })
    .catch(error => {
      showToast("發生錯誤，請確認資料庫讀寫權限是否有開！");
      console.error(error);
    });
}

// 儲存設定
function saveSettings() {
  const settings = {
    title: document.getElementById('set-title').value,
    venue: document.getElementById('set-venue').value,
    date: document.getElementById('set-date').value,
    time: document.getElementById('set-time').value,
    feeM: document.getElementById('set-fee-m').value,
    feeF: document.getElementById('set-fee-f').value,
  };
  db.ref('settings').set(settings).then(() => showToast("設定已同步到雲端！"));
}

// 清空名單
function clearPlayers() {
  if (confirm("確定要清空所有報名名單嗎？此動作無法復原。")) {
    db.ref('players').remove().then(() => showToast("已清空名單"));
  }
}

// 渲染名單
function renderRoster() {
  const list = document.getElementById('roster-list');
  if (players.length === 0) {
    list.innerHTML = "<div style='text-align:center; color:gray; padding: 20px;'>目前尚無人報名</div>";
    return;
  }
  list.innerHTML = players.map((p) => `
    <div class="player-row">
      <div class="avatar">${p.name[0]}</div>
      <div style="flex:1">
        <div style="font-weight:700">${p.name}</div>
        <div style="font-size:12px;color:var(--text3)">${p.phone}</div>
      </div>
      ${isAdmin ? `<button onclick="deletePlayer('${p.fbKey}')" style="color:#A32D2D; border:1px solid #A32D2D; border-radius:4px; padding:4px 8px; background:none; cursor:pointer">刪除</button>` : ''}
    </div>
  `).join('');
}

function deletePlayer(key) {
    if(confirm("確定要刪除這位球員嗎？")) db.ref('players').child(key).remove();
}

function updateCount() {
  const count = players.length;
  document.getElementById('count').textContent = count;
  const pct = Math.min(100, (count / 12) * 100);
  document.getElementById('slots-fill').style.width = pct + "%";
  
  if(count >= 12) {
      document.getElementById('status-badge').textContent = '已額滿';
      document.getElementById('status-badge').className = 'badge bg-red';
  } else {
      document.getElementById('status-badge').textContent = '報名中';
      document.getElementById('status-badge').className = 'badge bg-green';
  }
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.getAttribute('onclick').includes(id)));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + id));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
