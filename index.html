<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羽球揪團佈告欄 - Ocean Professional Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== 核心視覺設定 ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  color-scheme: dark;
  --bg-deep: #020c1b; --bg-dark: #0a192f; --text-main: #e6f1ff; --text-dim: #ccd6f6;
  --neon-green: #64ffda; --neon-red: #ff5e5e; --neon-blue: #007bff; --neon-orange: #ffaa33;
  --glass: rgba(17, 34, 64, 0.6); --glass-header: rgba(10, 25, 47, 0.8);
  --border: rgba(100, 255, 218, 0.1); --radius: 12px;
}
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-deep); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #020c1b 0%, #0a192f 50%, #172a45 100%); z-index: -2; }

/* 頂部導覽 */
.header { background: var(--glass-header); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0 1.5rem; position: sticky; top: 0; z-index: 40; }
.header-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
.logo { font-size: 18px; font-weight: 700; color: var(--neon-green); text-decoration: none; }
.container { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }

/* 分頁導覽 (不換行版) */
.tabs-wrapper { border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
.tabs { display: inline-flex; gap: 5px; padding: 0 10px; }
.tab { padding: 15px 18px; font-size: 14px; color: var(--text-dim); cursor: pointer; background: none; border: none; border-bottom: 3px solid transparent; flex-shrink: 0; font-weight: 700; transition: 0.3s; }
.tab.active { color: var(--neon-green); border-bottom-color: var(--neon-green); text-shadow: 0 0 10px rgba(100,255,218,0.5); }

/* 其他組件 */
.card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
.btn-primary { width: 100%; padding: 12px; background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green); border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
.btn-primary:hover { background: rgba(100,255,218,0.1); }

/* 滑桿 */
input[type=range] { -webkit-appearance: none; width: 100%; background: rgba(100,255,218,0.1); height: 8px; border-radius: 5px; outline: none; margin: 15px 0; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: var(--neon-green); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px var(--neon-green); }

/* 控制顯示 */
.section { display: none; }
.section.active { display: block !important; animation: fadeIn 0.3s; }
#login-screen, #lobby-screen, #room-screen { display: none; }
.admin-only { display: none !important; }
.is-admin .admin-only { display: block !important; }

/* 常用組件 */
input, select, textarea { width: 100%; padding: 12px; background: rgba(2,12,27,0.4); border: 1px solid var(--border); border-radius: 8px; color: #fff; margin-bottom: 1rem; }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: bold; background: rgba(100,255,218,0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
.weekday-divider { color: var(--neon-green); font-size: 14px; font-weight: bold; margin: 25px 0 10px; border-left: 3px solid var(--neon-green); padding-left: 10px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

.toast { position: fixed; bottom: 2rem; left: 50%; transform: translate(-50%, 100px); background: rgba(10,25,47,0.9); border: 1px solid var(--neon-green); padding: 12px 24px; border-radius: 20px; font-size: 13px; color: var(--neon-green); transition: 0.3s; z-index: 200; }
.toast.show { transform: translate(-50%, 0); }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="?" class="logo" style="text-decoration:none;">🏸 羽球揪團系統</a>
    <div style="display:flex; align-items:center; gap:10px;">
      <span id="user-display-name" style="font-size:12px; color:var(--text-dim);"></span>
      <button id="logout-btn" style="font-size:10px; padding:4px 8px; background:none; color:var(--text-dim); border:1px solid var(--border); border-radius:15px; cursor:pointer; display:none;" onclick="signOut()">登出</button>
    </div>
  </div>
</header>

<div id="login-screen" class="container" style="flex-direction:column; align-items:center; justify-content:center; height:75vh;">
  <div class="card" style="text-align:center; width:100%; max-width:400px; padding:2.5rem;">
    <div style="font-size:56px; margin-bottom:15px;">🏸</div>
    <h2 style="color:var(--neon-green); margin-bottom:20px;">深海羽球系統</h2>
    <p style="color:var(--text-dim); margin-bottom:25px; font-size:13px;">請先登入以使用系統</p>
    <button class="btn-primary" onclick="signInWithGoogle()">使用 Google 帳號登入</button>
  </div>
</div>

<div id="lobby-screen" class="container">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
    <h2 style="color:var(--neon-green);">佈告欄</h2>
    <button id="create-btn" class="btn-primary" style="width:auto; margin:0; padding:8px 20px; display:none;" onclick="createNewGroup()">➕ 創建球局</button>
    <button id="apply-btn" class="btn-outline" style="font-size:12px; padding:8px 15px; border:1px solid var(--neon-green); color:var(--neon-green); background:none; border-radius:8px; cursor:pointer;" onclick="applyForHost()">申請當團主</button>
  </div>
  
  <div class="card" style="padding: 10px; border-color:rgba(100,255,218,0.2);">
    <h3 style="font-size:14px; color:var(--text-main); margin: 10px;">👑 我的管理中心</h3>
    <div class="sub-drawer" onclick="toggleDrawer('draft')">
        <div class="drawer-header" style="cursor:pointer;"><div class="drawer-title" style="color:var(--neon-orange); font-size:13px;">📙 待完成草稿 <span id="draft-count">(0)</span></div><span>▼</span></div>
        <div class="drawer-content" id="content-draft" style="display:none; padding:10px;"></div>
    </div>
    <div class="sub-drawer" onclick="toggleDrawer('active')">
        <div class="drawer-header" style="cursor:pointer;"><div class="drawer-title" style="color:var(--neon-green); font-size:13px;">✅ 已發佈球局 <span id="active-count">(0)</span></div><span>▼</span></div>
        <div class="drawer-content" id="content-active" style="display:none; padding:10px;"></div>
    </div>
  </div>

  <h3 style="color:var(--text-dim); margin-top:30px; font-size:16px;">🏸 開放報名中</h3>
  <div id="other-games-container"></div>
</div>

<div id="room-screen" class="container">
  <div style="margin-bottom: 15px;"><button style="background:none; color:var(--text-dim); border:none; cursor:pointer; font-size:14px;" onclick="window.location.href='?'">🔙 返回佈告欄</button></div>
  
  <div class="tabs-wrapper">
    <div class="tabs">
        <button id="tab-game" class="tab active" onclick="switchTab('game')">球局資訊</button>
        <button id="tab-signup" class="tab" onclick="switchTab('signup')">報名臨打</button>
        <button id="tab-roster" class="tab" onclick="switchTab('roster')">報名名單</button>
        <button id="tab-admin" class="tab admin-only" onclick="switchTab('admin')">⚙️ 團主設定</button>
    </div>
  </div>

  <div id="sec-game" class="section active">
    <div class="card">
        <h2 id="disp-venue" style="color:var(--text-main); margin-bottom:10px;">📍 載入中...</h2>
        <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px;">
            <span class="badge">報名中</span>
            <span class="badge" style="color:var(--neon-blue); border-color:var(--neon-blue);">🏟️ <span id="disp-courts">1</span> 面場地</span>
            <span class="badge" style="color:var(--neon-orange); border-color:var(--neon-orange);">👥 <span id="disp-full-count">0/0</span> 人</span>
        </div>
        <p style="color:var(--neon-green); font-size:14px;">📅 <span id="disp-date">-</span> <span id="disp-time">-</span></p>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <div style="flex:1; background:rgba(24,95,165,0.1); padding:10px; border-radius:8px;">♂ 男 <b id="disp-fee-m">0</b></div>
            <div style="flex:1; background:rgba(237,147,177,0.1); padding:10px; border-radius:8px;">♀ 女 <b id="disp-fee-f">0</b></div>
        </div>
        <div id="note-box" style="margin-top:20px; padding:15px; background:rgba(100,255,218,0.05); border-radius:8px; display:none;">
            <div id="disp-note" style="font-size:14px; white-space:pre-wrap;"></div>
        </div>
    </div>
  </div>

  <div id="sec-signup" class="section">
    <div class="card">
      <div id="signup-form-box">
        <h3>填寫報名資料</h3>
        <label style="margin-top:15px;">報名姓名</label><input type="text" id="inp-name" readonly>
        <label>聯絡電話</label><input type="tel" id="inp-phone" placeholder="請輸入手機號碼" onfocus="this.select()">
        <button id="signup-btn" class="btn-primary" onclick="doSignup()">確認報名</button>
      </div>
      <div id="signup-full-msg" style="display:none; text-align:center; padding:20px;">
        <h3 style="color:var(--neon-orange);">⚠️ 本團人數已滿</h3>
      </div>
    </div>
  </div>

  <div id="sec-roster" class="section">
    <div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:15px;"><b>目前名單</b><span id="count-badge" class="badge">0 人</span></div><div id="roster-list"></div></div>
  </div>

  <div id="sec-admin" class="section admin-only">
    <div class="card">
        <label>球館名稱</label><input type="text" id="set-venue" onfocus="this.select()">
        <label>打球日</label><select id="set-date"><option value="">請選擇...</option><option value="每週一">每週一</option><option value="每週二">每週二</option><option value="每週三">每週三</option><option value="每週四">每週四</option><option value="每週五">每週五</option><option value="每週六">每週六</option><option value="每週日">每週日</option></select>
        <label>時間</label><input type="time" id="set-time">
        <label>限制人數： <span id="val-limit" style="color:#fff;">12</span></label>
        <input type="range" id="set-limit" min="1" max="50" value="12" oninput="document.getElementById('val-limit').textContent=this.value">
        <label>場地數量： <span id="val-courts" style="color:#fff;">2</span></label>
        <input type="range" id="set-courts" min="1" max="10" value="2" oninput="document.getElementById('val-courts').textContent=this.value">
        <label>男生費用</label><input type="text" id="set-fee-m" onfocus="this.select()">
        <label>女生費用</label><input type="text" id="set-fee-f" onfocus="this.select()">
        <label>備註</label><textarea id="set-note"></textarea>
        <button class="btn-primary" onclick="saveSettings()">💾 儲存並發佈</button>
        <button class="btn-primary" onclick="deleteGroup()" style="color:var(--neon-red); border-color:var(--neon-red); margin-top:30px;">🗑️ 刪除球局</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC8sgJZoA7U1rUY8mnLg-uZKkhMkaSVQ0c",
  authDomain: "badminton-1006.firebaseapp.com",
  projectId: "badminton-1006",
  storageBucket: "badminton-1006.firebasestorage.app",
  messagingSenderId: "103056676038",
  appId: "1:1030566766038:web:e73fbb8976fec3cf423077",
  databaseURL: "https://badminton-1006-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

const urlParams = new URLSearchParams(window.location.search);
const groupId = urlParams.get('id');
let currentUser = null;
let players = [];
let maxLimit = 12;

function switchTab(tId) {
    ['game','signup','roster','admin'].forEach(id => {
        const s = document.getElementById('sec-'+id);
        const t = document.getElementById('tab-'+id);
        if(id===tId){ s.classList.add('active'); if(t) t.classList.add('active'); }
        else { s.classList.remove('active'); if(t) t.classList.remove('active'); }
    });
}

auth.onAuthStateChanged((user) => {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('lobby-screen').style.display = 'none';
  document.getElementById('room-screen').style.display = 'none';
  document.getElementById('logout-btn').style.display = 'none'; // 🔴 登入前強制隱藏

  if (user) {
    currentUser = user;
    document.getElementById('user-display-name').textContent = "Hi, " + user.displayName;
    document.getElementById('logout-btn').style.display = 'block'; // 🟢 登入後才顯示
    checkHostStatus(user.uid);
    if (!groupId) { document.getElementById('lobby-screen').style.display = 'block'; loadLobbyGames(); }
    else { document.getElementById('room-screen').style.display = 'block'; loadRoomData(groupId); }
  } else {
    document.getElementById('login-screen').style.display = 'flex';
  }
});

function signInWithGoogle() { auth.signInWithPopup(provider); }
function signOut() { auth.signOut().then(() => window.location.href = window.location.pathname); }

function checkHostStatus(uid) {
  db.ref('hosts/' + uid).on('value', (s) => {
    const d = s.val();
    const st = (typeof d === 'object') ? d.status : d;
    if (st === 'approved') document.getElementById('create-btn').style.display = 'block';
  });
}

function loadLobbyGames() {
  db.ref('groups').on('value', (snap) => {
    const data = snap.val();
    const dList = document.getElementById('content-draft');
    const aList = document.getElementById('content-active');
    const cont = document.getElementById('other-games-container');
    if (!data) return;

    let dH = ""; let aH = ""; let dC = 0; let aC = 0;
    const days = ["每週一","每週二","每週三","每週四","每週五","每週六","每週日"];
    const classified = { "每週一":[],"每週二":[],"每週三":[],"每週四":[],"每週五":[],"每週六":[],"每週日":[] };

    Object.keys(data).forEach(id => {
      const s = data[id].settings;
      const cnt = data[id].players ? Object.keys(data[id].players).length : 0;
      const isComp = (s.venue && s.date); 
      const card = `<div class="card" onclick="window.location.href='?id=${id}'" style="cursor:pointer; border-left:4px solid ${isComp?'var(--neon-green)':'var(--neon-orange)'}; padding:12px; margin-bottom:8px;">
          <div style="display:flex; justify-content:space-between; font-size:14px;"><b>${s.venue||"未命名"}</b><span class="badge">${cnt}/${s.limit||0}人</span></div></div>`;

      if (s.ownerUid === currentUser.uid) { if (isComp) { aH += card; aC++; } else { dH += card; dC++; } }
      else if (isComp && classified[s.date]) classified[s.date].push(card);
    });

    document.getElementById('draft-count').textContent = `(${dC})`;
    document.getElementById('active-count').textContent = `(${aC})`;
    dList.innerHTML = dH || "<p style='font-size:11px; color:gray;'>無草稿</p>";
    aList.innerHTML = aH || "<p style='font-size:11px; color:gray;'>無發佈</p>";

    let oH = "";
    days.forEach(d => { if (classified[d].length > 0) { oH += `<div class="weekday-divider">${d}</div>`; classified[d].forEach(c => oH += c); } });
    cont.innerHTML = oH || "<p style='text-align:center; padding:20px; color:gray;'>目前尚無球局</p>";
  });
}

function loadRoomData(id) {
  db.ref('groups/' + id + '/settings').on('value', (s) => {
    const st = s.val();
    if (!st) return;
    if (st.ownerUid === currentUser.uid) { document.body.classList.add('is-admin'); }
    maxLimit = st.limit || 12;
    document.getElementById('disp-venue').textContent = st.venue || "未命名";
    document.getElementById('disp-date').textContent = st.date || "-";
    document.getElementById('disp-time').textContent = st.time || "-";
    document.getElementById('disp-fee-m').textContent = st.feeM || "0";
    document.getElementById('disp-fee-f').textContent = st.feeF || "0";
    document.getElementById('disp-courts').textContent = st.courts || "1";
    if (st.note) { document.getElementById('note-box').style.display='block'; document.getElementById('disp-note').textContent=st.note; }
    
    document.getElementById('set-venue').value = st.venue || "";
    document.getElementById('set-date').value = st.date || "";
    document.getElementById('set-time').value = st.time || "";
    document.getElementById('set-limit').value = st.limit || 12;
    document.getElementById('val-limit').textContent = st.limit || 12;
    document.getElementById('set-courts').value = st.courts || 1;
    document.getElementById('val-courts').textContent = st.courts || 1;
    document.getElementById('set-fee-m').value = st.feeM || "";
    document.getElementById('set-fee-f').value = st.feeF || "";
    document.getElementById('set-note').value = st.note || "";
  });

  db.ref('groups/' + id + '/players').on('value', (s) => {
    const d = s.val();
    players = d ? Object.keys(d).map(k => ({...d[k], fbKey: k})) : [];
    renderRoster();
    const count = players.length;
    document.getElementById('count-badge').textContent = count + " 人";
    document.getElementById('disp-full-count').textContent = count + " / " + maxLimit;
    if (count >= maxLimit) { document.getElementById('signup-form-box').style.display='none'; document.getElementById('signup-full-msg').style.display='block'; }
    else { document.getElementById('signup-form-box').style.display='block'; document.getElementById('signup-full-msg').style.display='none'; }
  });
}

function saveSettings() {
  db.ref('groups/' + groupId + '/settings').update({
    venue: document.getElementById('set-venue').value, date: document.getElementById('set-date').value,
    time: document.getElementById('set-time').value, limit: parseInt(document.getElementById('set-limit').value),
    courts: parseInt(document.getElementById('set-courts').value), feeM: document.getElementById('set-fee-m').value,
    feeF: document.getElementById('set-fee-f').value, note: document.getElementById('set-note').value
  }).then(() => showToast("已儲存！"));
}

function doSignup() {
  const ph = document.getElementById('inp-phone').value.trim();
  if (!ph) return showToast("請填手機");
  if (players.some(p => p.uid === currentUser.uid)) return showToast("已報名！");
  db.ref('groups/' + groupId + '/players').push({ uid: currentUser.uid, name: currentUser.displayName, photoURL: currentUser.photoURL, phone: ph, time: Date.now() })
    .then(() => { showToast("成功！"); switchTab('roster'); });
}

function renderRoster() {
  const l = document.getElementById('roster-list');
  const isAdmin = document.body.classList.contains('is-admin');
  if (players.length === 0) { l.innerHTML = "<p style='text-align:center; color:gray;'>尚無人報名</p>"; return; }
  l.innerHTML = players.map(p => `<div class="player-row"><div class="avatar">${p.photoURL?`<img src="${p.photoURL}">`:p.name[0]}</div><div style="flex:1"><b>${p.name}</b><div style="font-size:11px;color:gray">${isAdmin?p.phone:'通訊隱藏'}</div></div>${isAdmin?`<button onclick="deletePlayer('${p.fbKey}')" style="background:none; border:1px solid var(--neon-red); color:var(--neon-red); border-radius:4px; padding:2px 6px; font-size:10px;">刪除</button>`:''}</div>`).join('');
}

function deletePlayer(k) { if(confirm("刪除此人？")) db.ref('groups/' + groupId + '/players').child(k).remove(); }
function deleteGroup() { if(confirm("確定刪除？")) db.ref('groups/' + groupId).remove().then(() => window.location.href = window.location.pathname); }
function toggleDrawer(t) { 
    const el = document.getElementById('content-' + t);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
function applyForHost() { if(confirm("申請當團主？")) { db.ref('hosts/' + currentUser.uid).set({status:'pending', name:currentUser.displayName, email:currentUser.email, time:Date.now()}).then(()=>showToast("已送出")); } }
</script>
</body>
</html>
