<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite 羽球系統 - V28 UI Refined</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== 核心視覺設定 (完美還原寬敞間距) ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  color-scheme: dark;
  --bg-deep: #020c1b; 
  --bg-dark: #0a192f; 
  --text-main: #e6f1ff; 
  --text-dim: #ccd6f6;
  --neon-green: #64ffda; 
  --neon-red: #ff5e5e; 
  --neon-orange: #ffaa33; 
  --neon-blue: #007bff;
  --glass: rgba(17, 34, 64, 0.6); 
  --glass-header: rgba(10, 25, 47, 0.8);
  --border: rgba(100, 255, 218, 0.1); 
  --radius: 12px;
}
body { 
    font-family: 'Noto Sans TC', sans-serif; 
    background: var(--bg-deep); 
    color: var(--text-main); 
    min-height: 100vh; 
    overflow-x: hidden; 
}
body::before { 
    content: ""; 
    position: fixed; 
    top: 0; left: 0; width: 100%; height: 100%; 
    background: linear-gradient(135deg, #020c1b 0%, #0a192f 50%, #172a45 100%); 
    z-index: -2; 
}

/* 頂部導覽 */
.header { 
    background: var(--glass-header); 
    backdrop-filter: blur(10px); 
    border-bottom: 1px solid var(--border); 
    padding: 0 1.5rem; 
    position: sticky; 
    top: 0; 
    z-index: 40; 
    height: 60px; 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
}
.logo { font-size: 18px; font-weight: 700; color: var(--neon-green); text-decoration: none; }
.container { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }

/* 分頁切換 (還原適當高度與間距) */
.tabs-wrapper { 
    border-bottom: 1px solid var(--border); 
    margin-bottom: 1.5rem; 
    overflow-x: auto; 
    white-space: nowrap; 
    -webkit-overflow-scrolling: touch; 
}
.tabs { display: inline-flex; gap: 5px; padding: 0 10px; }
.tab { 
    padding: 15px 18px; 
    font-size: 15px; 
    color: var(--text-dim); 
    cursor: pointer; 
    background: none; 
    border: none; 
    border-bottom: 3px solid transparent; 
    flex-shrink: 0; 
    font-weight: 700; 
    transition: 0.3s; 
}
.tab.active { 
    color: var(--neon-green); 
    border-bottom-color: var(--neon-green); 
    text-shadow: 0 0 10px rgba(100,255,218,0.5); 
}

/* 卡片與按鈕元件 (還原 Padding) */
.card { 
    background: var(--glass); 
    backdrop-filter: blur(10px); 
    border: 1px solid var(--border); 
    border-radius: var(--radius); 
    padding: 2rem; /* 恢復舒適的內邊距 */
    margin-bottom: 1.5rem; 
    position: relative; 
}
.btn-primary { 
    width: 100%; 
    padding: 14px; /* 恢復好按的按鈕高度 */
    background: transparent; 
    color: var(--neon-green); 
    border: 1px solid var(--neon-green); 
    border-radius: 8px; 
    font-size: 16px;
    font-weight: 700; 
    cursor: pointer; 
    transition: 0.2s; 
}
.btn-primary:hover:not(:disabled) { background: rgba(100,255,218,0.1); box-shadow: 0 0 15px rgba(100,255,218,0.2); }
.btn-primary:disabled { border-color: #444; color: #444; cursor: not-allowed; }

.btn-danger { 
    color: var(--neon-red); 
    border: 1px solid var(--neon-red); 
    background: none; 
    border-radius: 6px; 
    cursor: pointer; 
    padding: 6px 12px; 
    font-size: 12px; 
    font-weight: bold; 
    transition: 0.2s; 
}
.btn-danger:hover { background: rgba(255,94,94,0.1); }

/* 標籤設計 */
.badge { 
    font-size: 12px; 
    padding: 5px 12px; 
    border-radius: 20px; 
    font-weight: bold; 
    background: rgba(100,255,218,0.1); 
    color: var(--neon-green); 
    border: 1px solid var(--neon-green); 
    margin-right: 8px; 
    margin-bottom: 8px; 
    display: inline-block;
}
.tag-badge { background: rgba(0, 123, 255, 0.15); color: var(--neon-blue); border-color: var(--neon-blue); }

/* Hashtag 點選按鈕樣式 */
.hashtag-selector { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 2rem; }
.tag-item { 
    padding: 8px 16px; 
    border: 1px solid #444; 
    border-radius: 20px; 
    font-size: 13px; 
    cursor: pointer; 
    transition: 0.2s; 
    color: gray; 
}
.tag-item.active { border-color: var(--neon-blue); color: var(--neon-blue); background: rgba(0, 123, 255, 0.1); }

/* 表單與排版 (解決擁擠問題) */
input, select, textarea { 
    width: 100%; 
    padding: 14px; /* 增加輸入框內邊距 */
    background: rgba(2,12,27,0.4); 
    border: 1px solid var(--border); 
    border-radius: 8px; 
    color: #fff; 
    margin-bottom: 1.5rem; /* 增加輸入框之間的距離 */
    font-family: inherit; 
    font-size: 15px;
}
label { 
    font-size: 13px; 
    color: var(--neon-green); 
    margin-bottom: 8px; 
    display: block; 
    font-weight: bold; 
    letter-spacing: 0.5px;
}
.info-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; font-size: 15px; }
.info-label { color: var(--neon-green); font-weight: bold; min-width: 80px; }
.weekday-divider { color: var(--neon-green); font-size: 15px; font-weight: bold; margin: 30px 0 15px; border-left: 4px solid var(--neon-green); padding-left: 12px; }

/* 名單樣式 */
.player-row { display: flex; flex-direction: column; gap: 12px; padding: 18px 0; border-bottom: 1px solid var(--border); }
.player-main { display: flex; align-items: center; gap: 15px; }
.avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(100,255,218,0.1); border: 1px solid var(--border); overflow: hidden; font-size: 18px; font-weight: bold; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.admin-actions { display: flex; gap: 10px; margin-top: 8px; padding-left: 63px; overflow-x: auto; white-space: nowrap; padding-bottom: 5px; }

/* 顯示邏輯 */
.section { display: none; }
.section.active { display: block !important; animation: fadeIn 0.3s; }
#login-screen, #lobby-screen, #room-screen { display: none; }
.admin-only { display: none !important; }
.is-admin .admin-only { display: block !important; }

/* 等級色塊 (18級標準) */
.lvl-badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 800; color: #fff; margin-left: 5px; border: 1px solid rgba(255,255,255,0.2); }
.l1-3 { background: #4a7c1b; } .l4-5 { background: #a32d2d; } .l6-7 { background: #8e1c5c; } 
.l8-9 { background: #b8860b; } .l10-12 { background: #104e8b; } .l13-15 { background: #696969; }
.l16-18 { background: #000; border-color: var(--neon-green); }
.warn-mark { color: var(--neon-red); font-weight: 800; font-size: 11px; border: 1px solid var(--neon-red); padding: 2px 6px; border-radius: 4px; margin-left: 5px; background: rgba(255,94,94,0.1); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translate(-50%, 100px); background: rgba(10,25,47,0.95); border: 1px solid var(--neon-green); padding: 14px 28px; border-radius: 20px; font-size: 14px; font-weight: bold; color: var(--neon-green); transition: 0.3s; z-index: 200; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
.toast.show { transform: translate(-50%, 0); }
</style>
</head>
<body>

<header class="header">
  <a href="?" class="logo">🏸 Elite 羽球系統</a>
  <div style="display:flex; align-items:center; gap:10px;">
    <span id="user-display-name" style="font-size:13px;"></span>
    <button id="logout-btn" style="font-size:11px; padding:6px 14px; background:none; color:var(--text-dim); border:1px solid var(--border); border-radius:15px; cursor:pointer; display:none;" onclick="signOut()">登出</button>
  </div>
</header>

<div id="login-screen" class="container" style="flex-direction:column; align-items:center; justify-content:center; height:75vh;">
  <div class="card" style="text-align:center; width:100%; max-width:420px; padding:4rem 2rem;">
    <div style="font-size:64px; margin-bottom:20px;">🏸</div>
    <h2 style="color:var(--neon-green); margin-bottom:15px; font-size:24px;">深海羽球系統</h2>
    <p style="color:var(--text-dim); font-size:14px; margin-bottom:40px;">專業揪團與信用管理平台</p>

</div>

<div id="lobby-screen" class="container">

    </div>
  </div>
  
  <div class="card" style="padding: 15px; border-color:rgba(100,255,218,0.2);">
    <h3 style="font-size:15px; color:var(--text-main); margin-bottom: 15px;">👑 我的管理中心</h3>
    <div id="my-games-list">載入中...</div>
  </div>

  <h3 style="color:var(--text-dim); margin-top:40px; font-size:18px;">🏸 開放報名中</h3>
  <div id="other-games-container">載入中...</div>
</div>

<div id="room-screen" class="container">
  <div style="margin-bottom:20px;"><button style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:15px; font-weight:bold;" onclick="window.location.href='?'">🔙 返回佈告欄</button></div>
  
  <div class="tabs-wrapper"><div class="tabs">
    <button id="tab-game" class="tab active" onclick="switchTab('game')">球局資訊</button>

    <button id="tab-roster" class="tab" onclick="switchTab('roster')">審核名單</button>
    <button id="tab-admin" class="tab admin-only" onclick="switchTab('admin')">⚙️ 團主管理</button>
  </div></div>

  <div id="sec-game" class="section active">
    <div class="card">
      <div id="disp-hashtags" style="margin-bottom:20px; display:flex; flex-wrap:wrap;"></div>
      
      <h2 id="disp-venue" style="color:var(--text-main); margin-bottom:8px; font-size:24px;">📍 載入中...</h2>

      </div>
      
      <div class="info-row"><span class="info-label">📅 日期：</span><span id="disp-date">-</span></div>
      <div class="info-row"><span class="info-label">🕒 時間：</span><span id="disp-time-range">-</span></div>

            <div style="color:var(--text-dim); margin-bottom:8px; font-size:14px;">♂ 男生費用</div>

            <div style="color:var(--text-dim); margin-bottom:8px; font-size:14px;">♀ 女生費用</div>

          <div style="color:var(--neon-green); font-weight:bold; margin-bottom:10px;">📝 團主備註</div>
          <div id="disp-note" style="font-size:15px; white-space:pre-wrap; line-height:1.6; color:var(--text-dim);"></div>
      </div>
    </div>
  </div>

  <div id="sec-signup" class="section">
    <div class="card">
      <div id="signup-form-box">
        <h3 style="margin-bottom:25px; color:var(--neon-green); border-bottom:1px solid var(--border); padding-bottom:15px;">📝 填寫報名資料</h3>
        
        <label>報名姓名 (可自訂)</label>
        <input type="text" id="inp-name" onfocus="this.select()">
        
        <label>我的羽球等級 (1-18 級)</label>
        <select id="inp-level">
            <option value="">請點擊選擇您的等級...</option>
            <optgroup label="新手階 (1-3)"><option value="1">1 級 (新手)</option><option value="2">2 級</option><option value="3">3 級</option></optgroup>
            <optgroup label="初階 (4-5)"><option value="4">4 級 (初階)</option><option value="5">5 級</option></optgroup>
            <optgroup label="初中階 (6-7)"><option value="6">6 級 (初中)</option><option value="7">7 級</option></optgroup>
            <optgroup label="中階 (8-9)"><option value="8">8 級 (中階)</option><option value="9">9 級</option></optgroup>
            <optgroup label="中進階 (10-12)"><option value="10">10 級 (中進)</option><option value="11">11 級</option><option value="12">12 級</option></optgroup>

        <label>選擇付款方式</label>
        <select id="inp-payment-choice"><option value="現金">現金支付</option></select>

        <button id="signup-btn" class="btn-primary" style="margin-top:20px;" onclick="doSignup()">✅ 送出報名 (等待團主審核)</button>

      <div id="signup-full-msg" style="display:none; text-align:center; padding:40px 20px;">

      <label>詳細地址 (連動 Google 地圖導航)</label>

      <select id="set-limit-select"></select>
      
      <label>要求等級區間 (1-18)</label>

      </div>
      
      <label>接受支付方式 (可複選)</label>
      <div style="display:flex; gap:25px; margin-bottom:2rem; background:rgba(2,12,27,0.4); padding:15px; border-radius:8px; border:1px solid var(--border);">
        <label style="display:flex; align-items:center; gap:10px; margin:0; font-size:15px;"><input type="checkbox" id="check-cash" style="width:20px; height:20px; margin:0;"> 現金收費</label>
        <label style="display:flex; align-items:center; gap:10px; margin:0; font-size:15px;"><input type="checkbox" id="check-linepay" style="width:20px; height:20px; margin:0;"> LinePay</label>
      </div>

      <div style="display:flex; gap:20px; margin-bottom:1.5rem;">
          <div style="flex:1;"><label>男生費用</label><input type="number" id="set-fee-m" style="margin:0;" placeholder="例: 200"></div>
          <div style="flex:1;"><label>女生費用</label><input type="number" id="set-fee-f" style="margin:0;" placeholder="例: 150"></div>
      </div>
      
      <label>補充備註</label>
      <textarea id="set-note" rows="5" placeholder="例如：提供幾面場地、用什麼球..."></textarea>
      
      <button class="btn-primary" style="font-size:18px; padding:16px; margin-top:10px;" onclick="saveSettings()">💾 儲存並發佈球局</button>
      
      <div style="margin-top:50px; border-top:1px solid rgba(255,255,255,0.1); padding-top:30px;">
        <h3 style="color:var(--neon-red); font-size:16px; margin-bottom:20px;">🚫 黑名單管理 (被封鎖者將無法報名)</h3>
        <div id="blacklist-view" style="font-size:14px; color:gray; background:rgba(0,0,0,0.3); padding:20px; border-radius:12px;">尚無封鎖名單</div>
      </div>
      
      <button class="btn-primary" style="color:var(--neon-red); border-color:var(--neon-red); margin-top:40px; background:rgba(255,94,94,0.05);" onclick="deleteGroup()">🗑️ 永久刪除此球局</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">提示訊息</div>

const groupId = urlParams.get('id');

let currentUser = null, isAdmin = false, groupSettings = {limit:12, lvMin:1, lvMax:18};
let players = [], selectedTags = [];

// 2. 初始化下拉選單
function initSelects() {
    const lSel = document.getElementById('set-limit-select');
    for(let i=1; i<=50; i++) lSel.add(new Option(i + " 人", i));
    const minL = document.getElementById('set-lv-min'), maxL = document.getElementById('set-lv-max');
    for(let i=1; i<=18; i++) { 
        minL.add(new Option(i + " 級", i)); 
        maxL.add(new Option(i + " 級", i)); 
    }
}
initSelects();

// 🌟 Hashtag 點擊邏輯
document.querySelectorAll('.tag-item').forEach(item => {
    item.onclick = () => {
        item.classList.toggle('active');
        const val = item.getAttribute('data-val');
        if (item.classList.contains('active')) { if(!selectedTags.includes(val)) selectedTags.push(val); }
        else { selectedTags = selectedTags.filter(t => t !== val); }
    };
});

// 3. 狀態管理與登入
auth.onAuthStateChanged((user) => {
  document.querySelectorAll('#login-screen, #lobby-screen, #room-screen').forEach(el => el.style.display = 'none');
  if (user) {
    currentUser = user;
    document.getElementById('user-display-name').textContent = "Hi, " + user.displayName;
    document.getElementById('inp-name').value = user.displayName; 
    document.getElementById('logout-btn').style.display = 'block';
    
    checkHostStatus(user.uid);
    if (!groupId) { 
        document.getElementById('lobby-screen').style.display = 'block'; 
        loadLobby(); 
    } else { 
        document.getElementById('room-screen').style.display = 'block'; 
        loadRoom(groupId); 
    }
  } else { 
      document.getElementById('login-screen').style.display = 'flex'; 
  }
});

function checkHostStatus(uid) {
  db.ref('hosts/' + uid).on('value', (s) => {
    const d = s.val(), st = (typeof d === 'object') ? d.status : d;
    if (st === 'approved' || uid === SUPER_ADMIN) document.getElementById('create-btn').style.display = 'block';
  });
}

// 4. 佈告欄載入
function loadLobby() {
  db.ref('groups').on('value', (snap) => {
    const data = snap.val(); 
    if (!data) { 
        document.getElementById('my-games-list').innerHTML = "目前無球局";
        document.getElementById('other-games-container').innerHTML = "<p style='text-align:center; color:gray; padding:20px;'>目前無開放報名的球局</p>";
        return; 
    }
    
    let myHtml = "";
    const classified = { "每週一":[],"每週二":[],"每週三":[],"每週四":[],"每週五":[],"每週六":[],"每週日":[] };

    Object.keys(data).forEach(id => {
      const g = data[id]; 
      if(!g.settings) return;
      const s = g.settings;
      let appCnt = 0; if (g.players) Object.values(g.players).forEach(p => { if(p.status==='approved'||!p.status) appCnt++; });
      
      checkAutoReset(id, s); 
      
      const isDraft = (!s.venue || s.venue === "新場地 (請點擊管理修改)");
      const card = `
        <div class="card" onclick="window.location.href='?id=${id}'" style="cursor:pointer; border-left:4px solid ${isDraft?'var(--neon-orange)':'var(--neon-green)'}; padding:15px; margin-bottom:10px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <b style="font-size:15px;">${s.venue||"未命名球局"}</b>
            <span class="badge" style="font-size:12px;">核准 ${appCnt}/${s.limit||12}人</span>
          </div>
          <div style="font-size:11px; color:var(--text-dim);">
            🏆 ${s.lvMin||1}-${s.lvMax||18}級 | 🕒 ${s.date||""} ${s.timeStart||""}
          </div>
        </div>`;
        
      if (s.ownerUid === currentUser.uid || currentUser.uid === SUPER_ADMIN) {
          myHtml += card;
      } else if (!isDraft && classified[s.date]) {
          classified[s.date].push(card);
      }
    });

    document.getElementById('my-games-list').innerHTML = myHtml || "<p style='color:gray; font-size:12px;'>目前無草稿或發佈的球局</p>";
    
    let finalOther = "";
    Object.keys(classified).forEach(d => { 
        if(classified[d].length > 0) { 
            finalOther += `<div class="weekday-divider">${d}</div>` + classified[d].join(''); 
        }
    });
    document.getElementById('other-games-container').innerHTML = finalOther || "<p style='text-align:center; color:gray; padding:20px;'>目前無開放報名的球局</p>";
  });
}

function checkAutoReset(id, s) {
    if (!s.date || !s.timeEnd || !s.lastResetDate) return;
    const now = new Date();
    if (s.lastResetDate !== now.toLocaleDateString()) {
        const weekDays = {"每週一":1, "每週二":2, "每週三":3, "每週四":4, "每週五":5, "每週六":6, "每週日":0};
        if (now.getDay() === weekDays[s.date]) {
            const [h, m] = s.timeEnd.split(':').map(Number);
            if ((now.getHours() * 60 + now.getMinutes()) > (h * 60 + m + 30)) {
                db.ref(`groups/${id}/players`).remove().catch(()=>{});
                db.ref(`groups/${id}/playerPhones`).remove().catch(()=>{});
                db.ref(`groups/${id}/settings`).update({ lastResetDate: now.toLocaleDateString() }).catch(()=>{});
            }
        }
    }
}

// 5. 球局房間載入與同步
function loadRoom(id) {
  db.ref('groups/' + id + '/settings').on('value', (s) => {
    const st = s.val(); if (!st) return; groupSettings = st;
    
    if (st.ownerUid === currentUser.uid || currentUser.uid === SUPER_ADMIN) { 
        isAdmin = true; 
        document.body.classList.add('is-admin'); 
        loadBlacklist(st.ownerUid); 
    }
    
    // 渲染 Hashtag
    const tagBox = document.getElementById('disp-hashtags');
    tagBox.innerHTML = (st.tags || []).map(t => `<span class="badge tag-badge"># ${t}</span>`).join('');

    // 渲染前端資訊
    document.getElementById('disp-venue').textContent = st.venue || "未命名球館";
    document.getElementById('disp-address').textContent = st.address || "無地址";
    document.getElementById('disp-address').onclick = () => { 
        if(st.address) window.open('https://www.google.com/maps/search/' + encodeURIComponent(st.address)); 
    };
    document.getElementById('disp-date').textContent = st.date || "-";
    document.getElementById('disp-time-range').textContent = (st.timeStart||"") + " ~ " + (st.timeEnd||"");
    document.getElementById('disp-lv-range').textContent = (st.lvMin||1) + " - " + (st.lvMax||18);
    document.getElementById('disp-fee-m').textContent = st.feeM || "0";
    document.getElementById('disp-fee-f').textContent = st.feeF || "0";
    
    // 渲染支付選單與顯示
    let payStr = []; 
    const pSel = document.getElementById('inp-payment-choice'); 
    pSel.innerHTML = "";
    if(st.payCash) { payStr.push("現金"); pSel.add(new Option("現金支付", "現金")); }
    if(st.payLine) { payStr.push("LinePay"); pSel.add(new Option("LinePay 支付", "LinePay")); }
    if(pSel.options.length === 0) { payStr.push("現金 (預設)"); pSel.add(new Option("現金支付", "現金")); } // 防呆
    document.getElementById('disp-payment').textContent = payStr.join(" / ");

    if (st.note) { 
        document.getElementById('note-box').style.display='block'; 
        document.getElementById('disp-note').textContent=st.note; 
    }
    
    // 渲染管理後台表單
    if(isAdmin){
      document.getElementById('set-venue').value = st.venue || ""; 
      document.getElementById('set-address').value = st.address || "";
      document.getElementById('set-date').value = st.date || "每週一";
      document.getElementById('set-time-start').value = st.timeStart || ""; 
      document.getElementById('set-time-end').value = st.timeEnd || "";
      document.getElementById('set-limit-select').value = st.limit || 12;
      document.getElementById('set-lv-min').value = st.lvMin || 1; 
      document.getElementById('set-lv-max').value = st.lvMax || 18;
      document.getElementById('check-cash').checked = !!st.payCash; 
      document.getElementById('check-linepay').checked = !!st.payLine;
      document.getElementById('set-fee-m').value = st.feeM || ""; 
      document.getElementById('set-fee-f').value = st.feeF || "";
      document.getElementById('set-note').value = st.note || "";
      
      // 同步 Hashtag 選擇狀態
      selectedTags = st.tags || [];
      document.querySelectorAll('.tag-item').forEach(item => {
          item.classList.toggle('active', selectedTags.includes(item.getAttribute('data-val')));
      });
    }
  });

  db.ref('groups/' + id + '/players').on('value', (s) => {
    const d = s.val(); 
    players = d ? Object.keys(d).map(k => ({...d[k], fbKey: k})) : [];
    
    // 名單排序：核准的在上面，審核中的在下面
    players.sort((a, b) => {
        const aApp = a.status === 'approved' || !a.status;
        const bApp = b.status === 'approved' || !b.status;
        return (aApp === bApp) ? (a.time - b.time) : (aApp ? -1 : 1);
    });

    renderRoster();
    
    // 計算核准人數與候補人數
    const approvedCount = players.filter(p => p.status === 'approved' || !p.status).length;
    const limit = groupSettings.limit || 12;
    
    document.getElementById('disp-full-count').textContent = approvedCount + " / " + limit;
    document.getElementById('count-badge').textContent = `已核准: ${approvedCount} | 審核/候補: ${players.length - approvedCount}`;
    
    // 動態顯示報名表單狀態
    const me = players.find(p => p.uid === currentUser.uid);
    const formBox = document.getElementById('signup-form-box');
    const msgBox = document.getElementById('signup-full-msg');
    const msgContent = document.getElementById('msg-content');
    const signupBtn = document.getElementById('signup-btn');

    if (me) {
        formBox.style.display = 'none'; msgBox.style.display = 'block';
        if (me.status === 'pending') {
            msgContent.innerHTML = '⏳ 您的報名正在等待團主審核...<br><span style="font-size:14px; color:gray; margin-top:10px; display:inline-block;">請耐心等候，或至名單查看狀態</span>';
            msgContent.style.color = "var(--neon-orange)";
        } else {
            msgContent.innerHTML = '✅ 您已成功加入本球局！<br><span style="font-size:14px; color:gray; margin-top:10px; display:inline-block;">請準時出席，若需請假請聯繫團主</span>';
            msgContent.style.color = "var(--neon-green)";
        }
    } else {
        formBox.style.display = 'block'; msgBox.style.display = 'none';
        if (approvedCount >= limit) {
            signupBtn.innerHTML = "📝 報名候補 (名額已滿)";
            signupBtn.style.borderColor = "var(--neon-orange)";
            signupBtn.style.color = "var(--neon-orange)";
        } else {
            signupBtn.innerHTML = "✅ 送出報名 (等待審核)";
            signupBtn.style.borderColor = "var(--neon-green)";
            signupBtn.style.color = "var(--neon-green)";
        }
    }
  });
}

// 6. 報名核心邏輯
async function doSignup() {
  const btn = document.getElementById('signup-btn');
  btn.disabled = true;
  btn.textContent = "報名中...";

  try {
      try {
          const blacksnap = await db.ref('blacklists/' + groupSettings.ownerUid + '/' + currentUser.uid).get();
          if (blacksnap.exists()) {
              showToast("❌ 抱歉，您無法報名此團主的球局。");
              btn.disabled = false; btn.textContent = "確認報名";
              return;
          }
      } catch(e) { console.log("讀取黑名單略過"); }

      const name = document.getElementById('inp-name').value.trim();
      const lv = parseInt(document.getElementById('inp-level').value);
      const pay = document.getElementById('inp-payment-choice').value;
      const ph = document.getElementById('inp-phone').value.trim();

      if (!name) throw new Error("請填寫報名姓名");
      if (!lv) throw new Error("請選擇您的羽球等級");
      if (!pay) throw new Error("請選擇付款方式");
      if (!ph) throw new Error("請填寫聯絡電話");
      
      if (lv < groupSettings.lvMin || lv > groupSettings.lvMax) {
          throw new Error(`您的等級不符合團主的要求區間！`);
      }
      if (players.some(p => p.uid === currentUser.uid)) {
          throw new Error("您已經報名過囉！");
      }

      await db.ref(`groups/${groupId}/players/${currentUser.uid}`).set({
        uid: currentUser.uid, name: name, level: lv, payMethod: pay, photoURL: currentUser.photoURL, time: Date.now(), status: 'pending'
      });
      await db.ref(`groups/${groupId}/playerPhones/${currentUser.uid}`).set(ph);
      
      showToast("🎉 報名成功！"); 
      switchTab('roster');
      
  } catch (error) {
      let msg = error.message;
      if (msg.includes('PERMISSION_DENIED')) msg = "權限不足，可能您已被封鎖或欄位填寫錯誤。";
      showToast("❌ " + msg);
  } finally {
      btn.disabled = false;
      btn.textContent = "確認報名";
  }
}

function getLvClass(lv) {
    const n = parseInt(lv); if(n<=3) return "l1-3"; if(n<=5) return "l4-5"; if(n<=7) return "l6-7"; 
    if(n<=9) return "l8-9"; if(n<=12) return "l10-12"; if(n<=15) return "l13-15"; return "l16-18";
}

// 7. 名單渲染與信用系統
function renderRoster() {
  const l = document.getElementById('roster-list');
  if (players.length === 0) { 
      l.innerHTML = "<p style='text-align:center; color:var(--text-dim); padding:30px;'>尚未有人報名</p>"; 
      return; 
  }
  
  l.innerHTML = players.map(p => {
    const phoneId = `phone-${p.uid}`;
    const recordId = `record-${p.uid}`;
    const isApproved = p.status === 'approved' || !p.status; 
    
    if (isAdmin) {
        db.ref(`groups/${groupId}/playerPhones/${p.uid}`).once('value', s => { 
            if(document.getElementById(phoneId)) document.getElementById(phoneId).textContent = s.val() || '未提供'; 
        });
    }
    
    // 讀取信用系統
    db.ref('userRecords/' + p.uid).once('value', s => {
        const d = s.val(); 
        if (!d || !document.getElementById(recordId)) return;
        const c = d.lateCancels ? Object.keys(d.lateCancels).length : 0;
        const r = d.skillRatings ? Object.values(d.skillRatings) : [];
        const avg = r.length ? (r.reduce((a,b)=>a+b.score,0)/r.length).toFixed(1) : '無';
        document.getElementById(recordId).innerHTML = (c > 0 ? `<span class="warn-mark">⚠️ 臨退 ${c} 次</span>` : '') + ` <span class="badge" style="border:none; margin-left:5px; background:rgba(100,255,218,0.15);">📊 平均鑑定: ${avg} 級</span>`;
    });

    const statusBadge = isApproved ? '' : `<span class="badge" style="background:rgba(255,170,51,0.2); color:var(--neon-orange); border-color:var(--neon-orange);">⏳ 審核中</span>`;

    let actionHtml = '';
    if (isAdmin) {
        if (isApproved) {
            actionHtml = `
                <button class="btn-danger" onclick="markLateCancel('${p.uid}', '${p.name}')">📌 標記臨退</button>
                <button class="btn-danger" onclick="addToBlacklist('${p.uid}', '${p.name}')">🚫 封鎖</button>
                <button class="btn-danger" style="color:var(--neon-green); border-color:var(--neon-green);" onclick="rateSkill('${p.uid}', '${p.name}')">⚖️ 鑑定實力</button>
                <button class="btn-danger" style="color:white; border-color:white;" onclick="handleDeletePlayer('${p.uid}', '${p.fbKey}', true)">🗑️ 移除此員</button>
            `;
        } else {
            actionHtml = `
                <button class="btn-danger" style="color:var(--neon-green); border-color:var(--neon-green); background:rgba(100,255,218,0.1);" onclick="approvePlayer('${p.uid}')">✅ 核准加入</button>
                <button class="btn-danger" onclick="handleDeletePlayer('${p.uid}', '${p.fbKey}', false)">❌ 拒絕申請</button>
                <button class="btn-danger" onclick="addToBlacklist('${p.uid}', '${p.name}')">🚫 封鎖</button>
            `;
        }
    }

    return `
    <div class="player-row" style="${isApproved ? '' : 'opacity:0.6;'}">
      <div class="player-main">
        <div class="avatar">${p.photoURL ? `<img src="${p.photoURL}">` : p.name[0]}</div>
        <div style="flex:1;">
          <b style="font-size:16px;">${p.name}</b> ${statusBadge}
          <div style="margin-top:6px;">
              <span class="lvl-badge ${getLvClass(p.level)}">LV.${p.level}</span> 
              <span class="badge" style="font-size:10px;">💳 ${p.payMethod||'現金'}</span> 
              <span id="${recordId}"></span>
          </div>
          <div style="font-size:12px; color:var(--neon-orange); margin-top:6px;" id="${phoneId}">${isAdmin ? '正在讀取電話...' : '🔒 通訊已受保護'}</div>
        </div>
      </div>
      ${isAdmin ? `<div class="admin-actions">${actionHtml}</div>` : ''}
    </div>`;
  }).join('');
}

// 8. 團主專用管理函數
function approvePlayer(uid) {
    db.ref(`groups/${groupId}/players/${uid}`).update({ status: 'approved' })
      .then(() => showToast("✅ 已成功核准！")).catch(e => showToast("❌ 核准失敗：" + e.message));
}

function handleDeletePlayer(uid, fbKey, isApproved) { 
    const msg = isApproved ? "確定要將此人從正式名單中移除嗎？" : "確定要拒絕此人的報名申請嗎？";
    if(confirm(msg)) { 
        db.ref(`groups/${groupId}/players/${fbKey}`).remove().then(() => {
            db.ref(`groups/${groupId}/playerPhones/${uid}`).remove();
            showToast(isApproved ? "✅ 已成功移除" : "✅ 已拒絕申請");
        });
    } 
}

function markLateCancel(uid, n) { 
    if(confirm(`確定要為 ${n} 記上一筆【臨退】紀錄嗎？`)) {
        db.ref('userRecords/'+uid+'/lateCancels').push({time:Date.now()}).then(()=>showToast("✅ 已寫入信用紀錄")); 
    }
}
function addToBlacklist(uid, n) { 
    if(confirm(`確定將 ${n} 加入您的黑名單？他將永遠無法報名您的局。`)) {
        db.ref('blacklists/'+groupSettings.ownerUid+'/'+uid).set({name:n, time:Date.now()}).then(()=>showToast("✅ 已封鎖")); 
    }
}
function rateSkill(uid, n) { 
    const s = prompt(`請輸入您對 ${n} 觀察到的實際等級 (1-18)：`, "10"); 
    if(s && !isNaN(s)) {
        db.ref('userRecords/'+uid+'/skillRatings').push({score:parseInt(s), rater:currentUser.uid}).then(()=>showToast("✅ 鑑定完成")); 
    }
}

function saveSettings() {
  db.ref('groups/' + groupId + '/settings').update({
    venue: document.getElementById('set-venue').value, address: document.getElementById('set-address').value,
    date: document.getElementById('set-date').value, timeStart: document.getElementById('set-time-start').value,
    timeEnd: document.getElementById('set-time-end').value, limit: parseInt(document.getElementById('set-limit-select').value),
    lvMin: parseInt(document.getElementById('set-lv-min').value), lvMax: parseInt(document.getElementById('set-lv-max').value),
    payCash: document.getElementById('check-cash').checked, payLine: document.getElementById('check-linepay').checked,
    feeM: document.getElementById('set-fee-m').value, feeF: document.getElementById('set-fee-f').value, note: document.getElementById('set-note').value,
    tags: selectedTags, lastResetDate: new Date().toLocaleDateString()
  }).then(() => showToast("💾 球局設定已發佈！")).catch(e => showToast("❌ 儲存失敗，權限不足"));
}

function loadBlacklist(ownerId) {
    db.ref('blacklists/' + ownerId).on('value', s => {
        const d = s.val(), el = document.getElementById('blacklist-view');
        if(!d) { el.innerHTML = "尚無封鎖名單"; return; }
        el.innerHTML = Object.keys(d).map(uid => `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; border-bottom:1px solid #333; padding-bottom:8px;">
                <span style="font-size:14px; color:var(--text-main);">${d[uid].name}</span>
                <button class="btn-danger" style="padding:6px 12px;" onclick="db.ref('blacklists/${ownerId}/${uid}').remove()">解除封鎖</button>
            </div>`).join('');
    });
}

function createNewGroup() {
  const newId = Math.random().toString(36).substring(2, 8);
  db.ref('groups/' + newId + '/settings').set({ 
      ownerUid: currentUser.uid, 
      venue: "新場地 (請點擊管理修改)", 
      date: "每週一", lvMin: 1, lvMax: 18, limit: 12, payCash: true, 
      tags: [], lastResetDate: new Date().toLocaleDateString() 
  }).then(() => window.location.href = "?id=" + newId).catch(() => alert("❌ 失敗：請確認您是否具備團主權限"));
}
function deleteGroup() { 
    if(confirm("確定永久刪除這個球局嗎？所有名單都會消失喔！")) {
        db.ref('groups/' + groupId).remove().then(() => window.location.href = "?"); 
    }
}

// 9. UI 工具函數
function switchTab(tId) { 
    ['game','signup','roster','admin'].forEach(id => { 
        const s = document.getElementById('sec-'+id), t = document.getElementById('tab-'+id);
        if(s) s.classList.toggle('active', id===tId); if(t) t.classList.toggle('active', id===tId);
    }); 
}
function showToast(m) { 
    const t = document.getElementById('toast'); t.textContent = m; 
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); 
}
function signInWithGoogle() { auth.signInWithPopup(provider); }
function signOut() { auth.signOut().then(() => window.location.href = "?"); }
function applyForHost() { 
    if(confirm("想申請成為開團團主嗎？")) {
        db.ref('hosts/' + currentUser.uid).set({status:'pending', name:currentUser.displayName, email:currentUser.email, time:Date.now()}).then(()=>showToast("✅ 申請已送出，請等待核准")); 
    }
}
