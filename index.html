<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羽球揪團佈告欄 - Ocean Professional Elite</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== 核心視覺設定 ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  color-scheme: dark;
  --bg-deep: #020c1b; --bg-dark: #0a192f; --text-main: #e6f1ff; --text-dim: #ccd6f6;
  --neon-green: #64ffda; --neon-red: #ff5e5e; --neon-blue: #007bff; --neon-orange: #ffaa33;
  --glass: rgba(17, 34, 64, 0.6); --glass-header: rgba(10, 25, 47, 0.8);
  --border: rgba(100, 255, 218, 0.1); --radius: 12px;
}
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-deep); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #020c1b 0%, #0a192f 50%, #172a45 100%); z-index: -2; }

/* 頂部導覽 */
.header { background: var(--glass-header); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0 1.5rem; position: sticky; top: 0; z-index: 40; }
.header-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
.logo { font-size: 18px; font-weight: 700; color: var(--neon-green); text-decoration: none; }
.container { max-width: 960px; margin: 0 auto; padding: 2rem 1rem 5rem; }

/* 標籤導覽列 (分頁不換行版) */
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; overflow-x: auto; white-space: nowrap; }
.tab { padding: 12px 14px; font-size: 13px; color: var(--text-dim); cursor: pointer; background: none; border: none; border-bottom: 2px solid transparent; flex-shrink: 0; font-weight: 500; }
.tab.active { color: var(--neon-green); border-bottom-color: var(--neon-green); }

/* 卡片與按鈕 */
.card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
.btn-primary { width: 100%; padding: 12px; background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green); border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
.btn-primary:hover { background: rgba(100,255,218,0.1); }

/* 下拉抽屜 */
.sub-drawer { margin-bottom: 10px; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
.drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; cursor: pointer; background: rgba(255,255,255,0.03); }
.drawer-content { display: none; padding: 10px; background: rgba(0,0,0,0.2); }
.drawer-content.open { display: block; }

/* 球局卡片樣式 */
.game-card { cursor: pointer; border-left: 4px solid var(--neon-green); transition: 0.3s; margin-bottom: 8px; padding: 12px !important; }
.game-card.draft { border-left-color: var(--neon-orange); }
.game-card:hover { transform: translateX(5px); background: rgba(255,255,255,0.05); }

/* 區塊顯示控制 */
#login-screen, #lobby-screen, #room-screen, .section { display: none; }
.admin-only { display: none !important; }
.is-admin .admin-only { display: block !important; }

/* 其他細節 */
input, select, textarea { width: 100%; padding: 11px; background: rgba(2,12,27,0.3); border: 1px solid var(--border); border-radius: 8px; color: #fff; margin-bottom: 1rem; }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: bold; background: rgba(100,255,218,0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
.weekday-divider { color: var(--neon-green); font-size: 14px; font-weight: bold; margin: 25px 0 10px; border-left: 3px solid var(--neon-green); padding-left: 10px; }
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translate(-50%, 100px); background: rgba(10,25,47,0.9); border: 1px solid var(--neon-green); padding: 12px 24px; border-radius: 20px; font-size: 13px; color: var(--neon-green); transition: 0.3s; z-index: 200; }
.toast.show { transform: translate(-50%, 0); }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="?" class="logo">🏸 羽球揪團佈告欄</a>
    <div style="display:flex; align-items:center; gap:12px;">
      <span id="user-display-name" style="font-size:12px; color:var(--text-dim);"></span>
      <button style="font-size:11px; padding:4px 10px; background:none; color:var(--text-dim); border:1px solid var(--border); border-radius:15px; cursor:pointer;" onclick="signOut()">登出</button>
    </div>
  </div>
</header>

<div id="login-screen" class="container" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:75vh;">
  <div class="card" style="text-align:center; width:100%; max-width:400px; padding:2.5rem;">
    <div style="font-size:56px; margin-bottom:15px;">🏸</div>
    <h2 style="color:var(--neon-green); margin-bottom:20px;">深海羽球系統</h2>
    <button class="btn-primary" onclick="signInWithGoogle()">使用 Google 帳號登入</button>
  </div>
</div>

<div id="lobby-screen" class="container">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
    <h2 style="color:var(--neon-green);">佈告欄</h2>
    <button id="create-btn" class="btn-primary" style="width:auto; margin:0; padding:8px 20px; display:none;" onclick="createNewGroup()">➕ 創建新球局</button>
    <button id="apply-btn" class="btn-outline" style="font-size:12px; padding:8px 15px; border:1px solid var(--neon-green); color:var(--neon-green); background:none; border-radius:8px; cursor:pointer;" onclick="applyForHost()">申請成為團主</button>
  </div>
  
  <div class="card" style="padding: 10px; border-color:rgba(100,255,218,0.2);">
    <h3 style="font-size:14px; color:var(--text-main); margin: 10px;">👑 我的管理中心</h3>
    <div class="sub-drawer" id="drawer-draft">
        <div class="drawer-header" onclick="toggleDrawer('draft')">
            <div class="drawer-title tag-draft">📙 待完成草稿 <span id="draft-count">(0)</span></div>
            <span>▼</span>
        </div>
        <div class="drawer-content" id="content-draft"></div>
    </div>
    <div class="sub-drawer" id="drawer-active">
        <div class="drawer-header" onclick="toggleDrawer('active')">
            <div class="drawer-title tag-active">✅ 已公開發佈 <span id="active-count">(0)</span></div>
            <span>▼</span>
        </div>
        <div class="drawer-content" id="content-active"></div>
    </div>
  </div>

  <h3 style="color:var(--text-dim); margin-bottom:10px; margin-top:30px; font-size:16px;">🏸 其他開放球局</h3>
  <div id="other-games-container"></div>

  <div class="card" style="margin-top:50px; border-color:rgba(100,255,218,0.1);">
    <div class="card-title">📮 客服回饋 / 建議</div>
    <textarea id="feedback-text" placeholder="有任何問題或建議？寫在這裡..."></textarea>
    <button class="btn-primary" style="font-size:13px; padding:8px;" onclick="sendFeedback()">送出回饋</button>
  </div>
</div>

<div id="room-screen" class="container">
  <div style="margin-bottom: 15px;"><button style="background:none; color:var(--text-dim); border:none; cursor:pointer;" onclick="window.location.href='?'">🔙 返回佈告欄</button></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('game')">球局資訊</button>
    <button class="tab" onclick="switchTab('signup')">報名臨打</button>
    <button class="tab" onclick="switchTab('roster')">報名名單</button>
    <button class="tab admin-only" onclick="switchTab('admin')">⚙️ 團主設定</button>
  </div>

  <div id="sec-game" class="section active">
    <div class="card">
        <h2 id="disp-venue" style="color:var(--text-main); margin-bottom:10px;">📍 載入中...</h2>
        <p style="color:var(--neon-green); font-size:14px;">📅 <span id="disp-date"></span> <span id="disp-time"></span></p>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <div style="flex:1; background:rgba(24,95,165,0.1); padding:10px; border-radius:8px;">♂ 男 <b id="disp-fee-m"></b></div>
            <div style="flex:1; background:rgba(237,147,177,0.1); padding:10px; border-radius:8px;">♀ 女 <b id="disp-fee-f"></b></div>
        </div>
        <div id="note-box" style="margin-top:20px; padding:15px; background:rgba(100,255,218,0.05); border-radius:8px; display:none;">
            <div style="font-size:11px; color:var(--neon-green);">📝 團主備註</div>
            <div id="disp-note" style="font-size:14px; white-space:pre-wrap;"></div>
        </div>
    </div>
  </div>

  <div id="sec-signup" class="section">
    <div class="card"><label>姓名</label><input type="text" id="inp-name" readonly><label>聯絡電話</label><input type="tel" id="inp-phone" onfocus="this.select()"><button class="btn-primary" onclick="doSignup()">確認報名</button></div>
  </div>

  <div id="sec-roster" class="section">
    <div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span class="card-title" style="border:none;">名單</span><span id="count" class="badge">0</span></div><div id="roster-list"></div></div>
  </div>

  <div id="sec-admin" class="section admin-only">
    <div class="card">
        <label>球館名稱</label><input type="text" id="set-venue" onfocus="this.select()">
        <label>打球日</label><select id="set-date"><option value="">請選擇...</option><option value="每週一">每週一</option><option value="每週二">每週二</option><option value="每週三">每週三</option><option value="每週四">每週四</option><option value="每週五">每週五</option><option value="每週六">每週六</option><option value="每週日">每週日</option></select>
        <label>時間</label><input type="time" id="set-time">
        <label>男生費用</label><input type="text" id="set-fee-m" onfocus="this.select()">
        <label>女生費用</label><input type="text" id="set-fee-f" onfocus="this.select()">
        <label>備註</label><textarea id="set-note"></textarea>
        <button class="btn-primary" onclick="saveSettings()">💾 儲存並發佈</button>
        <button class="btn-primary" onclick="deleteGroup()" style="color:var(--neon-red); border-color:var(--neon-red); margin-top:30px;">🗑️ 刪除球局</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC8sgJZoA7U1rUY8mnLg-uZKkhMkaSVQ0c",
  authDomain: "badminton-1006.firebaseapp.com",
  projectId: "badminton-1006",
  storageBucket: "badminton-1006.firebasestorage.app",
  messagingSenderId: "103056676038",
  appId: "1:1030566766038:web:e73fbb8976fec3cf423077",
  databaseURL: "https://badminton-1006-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

const urlParams = new URLSearchParams(window.location.search);
const groupId = urlParams.get('id');
let currentUser = null;
let players = [];
let isAdmin = false;

auth.onAuthStateChanged((user) => {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('lobby-screen').style.display = 'none';
  document.getElementById('room-screen').style.display = 'none';

  if (user) {
    currentUser = user;
    document.getElementById('user-display-name').textContent = "Hi, " + user.displayName;
    document.getElementById('inp-name').value = user.displayName;
    checkHostStatus(user.uid);
    if (!groupId) {
      document.getElementById('lobby-screen').style.display = 'block';
      loadLobbyGames();
    } else {
      document.getElementById('room-screen').style.display = 'block';
      loadRoomData(groupId);
    }
  } else {
    document.getElementById('login-screen').style.display = 'flex';
  }
});

function signInWithGoogle() { auth.signInWithPopup(provider); }
function signOut() { auth.signOut().then(() => window.location.href = window.location.pathname); }

// 🟢 修改後的權限檢查 (支援物件格式)
function checkHostStatus(uid) {
  db.ref('hosts/' + uid).on('value', (s) => {
    const data = s.val();
    if (!data) return;
    
    // 如果資料庫裡存的是舊的單一字串，或是新的物件格式 status
    const status = (typeof data === 'object') ? data.status : data;

    if (status === 'approved') {
      document.getElementById('create-btn').style.display = 'block';
      document.getElementById('apply-btn').style.display = 'none';
    } else if (status === 'pending') {
      document.getElementById('apply-btn').textContent = '審核中...';
      document.getElementById('apply-btn').disabled = true;
    }
  });
}

// 🟢 修改後的團主申請 (自動存入姓名、Email 以便辨識)
function applyForHost() {
  if (confirm("申請成為團主？送出後系統將記錄您的名稱與 Email 以供審核。")) {
    db.ref('hosts/' + currentUser.uid).set({
        status: 'pending',
        name: currentUser.displayName,
        email: currentUser.email,
        photo: currentUser.photoURL,
        time: Date.now()
    }).then(() => showToast("申請已送出"));
  }
}

function loadLobbyGames() {
  db.ref('groups').on('value', (snapshot) => {
    const data = snapshot.val();
    const draftContent = document.getElementById('content-draft');
    const activeContent = document.getElementById('content-active');
    const otherContainer = document.getElementById('other-games-container');
    
    if (!data) {
        draftContent.innerHTML = activeContent.innerHTML = otherContainer.innerHTML = `<div style="color:var(--text-dim); font-size:12px; padding:10px;">暫無資料</div>`;
        return;
    }

    let draftHtml = ""; let myActiveHtml = "";
    let draftCount = 0; let activeCount = 0;
    const weekDays = ["每週一", "每週二", "每週三", "每週四", "每週五", "每週六", "每週日"];
    const classifiedGames = { "每週一":[], "每週二":[], "每週三":[], "每週四":[], "每週五":[], "每週六":[], "每週日":[] };

    Object.keys(data).forEach(id => {
      const group = data[id];
      const s = group.settings;
      const count = group.players ? Object.keys(group.players).length : 0;
      const isComplete = (s.venue && s.date); 

      const card = `
        <div class="card game-card ${!isComplete ? 'draft' : ''}" onclick="window.location.href='?id=${id}'">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:700;">${s.venue || "未命名草稿"}</span>
            <span class="badge">${count} 人</span>
          </div>
          <div style="font-size:11px; color:var(--text-dim); margin-top:4px;">🕒 ${s.date || "未填"} ${s.time || ""}</div>
        </div>`;

      if (s.ownerUid === currentUser.uid) {
        if (isComplete) { myActiveHtml += card; activeCount++; } 
        else { draftHtml += card; draftCount++; }
      }
      if (s.ownerUid !== currentUser.uid && isComplete) {
        if(classifiedGames[s.date]) classifiedGames[s.date].push(card);
      }
    });

    document.getElementById('draft-count').textContent = `(${draftCount})`;
    document.getElementById('active-count').textContent = `(${activeCount})`;
    draftContent.innerHTML = draftHtml || `<div style="color:var(--text-dim); font-size:12px;">無草稿</div>`;
    activeContent.innerHTML = myActiveHtml || `<div style="color:var(--text-dim); font-size:12px;">無已發佈</div>`;

    let otherHtml = "";
    weekDays.forEach(day => {
      if (classifiedGames[day].length > 0) {
        otherHtml += `<div class="weekday-divider">${day}</div>`;
        classifiedGames[day].forEach(gameCard => otherHtml += gameCard);
      }
    });
    otherContainer.innerHTML = otherHtml || `<div style="color:var(--text-dim); padding:20px; text-align:center; font-size:13px;">目前尚無開放球局</div>`;
  });
}

function toggleDrawer(type) {
    const content = document.getElementById('content-' + type);
    content.classList.toggle('open');
}

function createNewGroup() {
  const newId = Math.random().toString(36).substring(2, 8);
  db.ref('groups/' + newId + '/settings').set({ ownerUid: currentUser.uid, venue: "", date: "", time: "", feeM: "", feeF: "", note: "" })
    .then(() => window.location.href = window.location.pathname + "?id=" + newId);
}

function loadRoomData(id) {
  db.ref('groups/' + id + '/settings').on('value', (s) => {
    const st = s.val();
    if (st) {
      if (st.ownerUid === currentUser.uid) { isAdmin = true; document.body.classList.add('is-admin'); }
      document.getElementById('disp-venue').textContent = "📍 " + (st.venue || "未命名球館");
      document.getElementById('disp-date').textContent = st.date || "-";
      document.getElementById('disp-time').textContent = st.time || "-";
      document.getElementById('disp-fee-m').textContent = st.feeM || "-";
      document.getElementById('disp-fee-f').textContent = st.feeF || "-";
      if (st.note) { document.getElementById('note-box').style.display = 'block'; document.getElementById('disp-note').textContent = st.note; }
      else { document.getElementById('note-box').style.display = 'none'; }
      if (isAdmin) {
          document.getElementById('set-venue').value = st.venue || ""; document.getElementById('set-date').value = st.date || "";
          document.getElementById('set-time').value = st.time || ""; document.getElementById('set-fee-m').value = st.feeM || "";
          document.getElementById('set-fee-f').value = st.feeF || ""; document.getElementById('set-note').value = st.note || "";
      }
    }
  });
  db.ref('groups/' + id + '/players').on('value', (s) => {
    const d = s.val();
    players = d ? Object.keys(d).map(k => ({...d[k], fbKey: k})) : [];
    renderRoster();
    document.getElementById('count').textContent = players.length;
  });
}

function saveSettings() {
  db.ref('groups/' + groupId + '/settings').update({
    venue: document.getElementById('set-venue').value,
    date: document.getElementById('set-date').value,
    time: document.getElementById('set-time').value,
    feeM: document.getElementById('set-fee-m').value,
    feeF: document.getElementById('set-fee-f').value,
    note: document.getElementById('set-note').value
  }).then(() => showToast("設定已發佈！"));
}

function doSignup() {
  const ph = document.getElementById('inp-phone').value.trim();
  if (!ph) return showToast("請填寫聯絡電話");
  if (players.some(p => p.uid === currentUser.uid)) return showToast("您已經報名過囉！");
  db.ref('groups/' + groupId + '/players').push({ uid: currentUser.uid, name: currentUser.displayName, photoURL: currentUser.photoURL, phone: ph, time: Date.now() })
    .then(() => { showToast("報名成功！"); switchTab('roster'); });
}

function renderRoster() {
  const l = document.getElementById('roster-list');
  if (players.length === 0) { l.innerHTML = "<div style='text-align:center;color:var(--text-dim);padding:20px;'>目前尚無人報名</div>"; return; }
  l.innerHTML = players.map(p => `
    <div class="player-row">
      <div class="avatar">${p.photoURL ? `<img src="${p.photoURL}">` : p.name[0]}</div>
      <div style="flex:1"><div style="font-weight:700;">${p.name}</div><div style="font-size:11px;color:var(--text-dim)">${isAdmin?p.phone:'通訊隱藏'}</div></div>
      ${isAdmin ? `<button onclick="deletePlayer('${p.fbKey}')" style="background:none;border:1px solid var(--neon-red);color:var(--neon-red);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:10px;">刪除</button>` : ''}
    </div>`).join('');
}

function deletePlayer(k) { if(confirm("確定刪除此球員？")) db.ref('groups/' + groupId + '/players').child(k).remove(); }
function deleteGroup() { if(confirm("確定永久刪除球局？")) db.ref('groups/' + groupId).remove().then(() => window.location.href = window.location.pathname); }

function switchTab(i) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.getAttribute('onclick').includes(i)));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + i));
}
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
function sendFeedback() { const t = document.getElementById('feedback-text').value.trim(); if(!t) return showToast("請輸入內容"); db.ref('feedbacks').push({ uid: currentUser.uid, name: currentUser.displayName, content: t, time: Date.now() }).then(() => { document.getElementById('feedback-text').value=""; showToast("感謝回饋！"); }); }
</script>
</body>
</html>
