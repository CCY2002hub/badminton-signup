<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羽球揪團佈告欄 - Credit & Management Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* 核心風格保持穩定版 */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { color-scheme: dark; --bg-deep: #020c1b; --neon-green: #64ffda; --neon-red: #ff5e5e; --neon-orange: #ffaa33; --border: rgba(100, 255, 218, 0.1); }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-deep); color: #e6f1ff; min-height: 100vh; }
.header { background: rgba(10, 25, 47, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0 1.5rem; position: sticky; top: 0; z-index: 40; height: 60px; display: flex; align-items: center; justify-content: space-between; }
.container { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }
.card { background: rgba(17, 34, 64, 0.6); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
.btn-primary { width: 100%; padding: 12px; background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green); border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
.btn-danger { color: var(--neon-red); border: 1px solid var(--neon-red); background: none; border-radius: 4px; cursor: pointer; padding: 4px 8px; font-size: 11px; }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: rgba(100,255,218,0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
.warn-mark { color: var(--neon-red); font-weight: 800; font-size: 10px; border: 1px solid var(--neon-red); padding: 1px 4px; border-radius: 4px; margin-left: 5px; }
input, select, textarea { width: 100%; padding: 12px; background: rgba(2,12,27,0.4); border: 1px solid var(--border); border-radius: 8px; color: #fff; margin-bottom: 1rem; }
.tab.active { color: var(--neon-green); border-bottom: 2px solid var(--neon-green); }
.player-row { display: flex; flex-direction: column; gap: 8px; padding: 15px 0; border-bottom: 1px solid var(--border); }
.player-main { display: flex; align-items: center; gap: 12px; }
.admin-actions { display: flex; gap: 10px; margin-top: 5px; padding-left: 52px; }
.l1-3 { background: #4a7c1b; } .l4-5 { background: #a32d2d; } .l16-18 { background: #000; }
.lvl-badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; color: #fff; }
.tabs-wrapper { border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; display: flex; overflow-x: auto; }
.tab { padding: 15px 20px; font-size: 14px; cursor: pointer; white-space: nowrap; }
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translate(-50%, 100px); background: #0a192f; border: 1px solid var(--neon-green); padding: 12px 24px; border-radius: 20px; font-size: 13px; color: var(--neon-green); transition: 0.3s; z-index: 200; }
.toast.show { transform: translate(-50%, 0); }
</style>
</head>
<body>

<header class="header">
  <a href="?" style="text-decoration:none; color:var(--neon-green); font-weight:700;">🏸 Elite 管理系統</a>
  <div style="display:flex; align-items:center; gap:10px;">
    <span id="user-display-name" style="font-size:12px;"></span>
    <button id="logout-btn" style="font-size:10px; background:none; border:1px solid var(--border); border-radius:15px; color:gray; display:none;" onclick="signOut()">登出</button>
  </div>
</header>

<div id="login-screen" class="container" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:75vh;">
  <div class="card" style="text-align:center; width:100%; max-width:400px;">
    <h2 style="color:var(--neon-green); margin-bottom:20px;">🏸 深海羽球登入</h2>
    <button class="btn-primary" onclick="signInWithGoogle()">Google 帳號登入</button>
  </div>
</div>

<div id="lobby-screen" class="container">
  <div style="display:flex; justify-content:space-between; margin-bottom:2rem;">
    <h2>球局佈告欄</h2>
    <button id="create-btn" class="btn-primary" style="width:auto; padding:8px 15px; display:none;" onclick="createNewGroup()">➕ 創建球局</button>
    <button id="apply-btn" class="btn-outline" style="font-size:12px; border:1px solid var(--neon-green); color:var(--neon-green); background:none; padding:8px; border-radius:8px;" onclick="applyForHost()">申請當團主</button>
  </div>
  <div id="other-games-container"></div>
</div>

<div id="room-screen" class="container">
  <div style="margin-bottom:15px;"><button style="background:none; border:none; color:gray; cursor:pointer;" onclick="window.location.href='?'">🔙 返回</button></div>
  <div class="tabs-wrapper">
    <div class="tab active" id="tab-game" onclick="switchTab('game')">資訊</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">報名</div>
    <div class="tab" id="tab-roster" onclick="switchTab('roster')">名單</div>
    <div class="tab admin-only" id="tab-admin" onclick="switchTab('admin')">管理</div>
  </div>

  <div id="sec-game" class="section active">
    <div class="card">
      <h2 id="disp-venue">-</h2>
      <p id="disp-address" style="color:var(--neon-blue); text-decoration:underline; cursor:pointer; font-size:13px; margin:10px 0;"></p>
      <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px;">
        <span class="badge">👥 <span id="disp-full-count">0/0</span></span>
        <span class="badge">🏆 <span id="disp-lv-range">1-18</span> 級</span>
      </div>
      <div style="font-size:14px;">📅 <span id="disp-date"></span> | <span id="disp-time-range"></span></div>
    </div>
  </div>

  <div id="sec-signup" class="section">
    <div class="card">
      <div id="signup-form-box">
        <label>報名姓名</label><input type="text" id="inp-name">
        <label>我的等級</label>
        <select id="inp-level"><option value="">請選擇...</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option></select>
        <label>聯絡電話</label><input type="tel" id="inp-phone">
        <button class="btn-primary" onclick="doSignup()">確認報名</button>
      </div>
      <div id="signup-full-msg" style="display:none; text-align:center;"><h3>⚠️ 額滿</h3></div>
    </div>
  </div>

  <div id="sec-roster" class="section">
    <div class="card">
      <div id="roster-list"></div>
    </div>
  </div>

  <div id="sec-admin" class="section admin-only">
    <div class="card">
      <label>球館</label><input type="text" id="set-venue">
      <label>地址</label><input type="text" id="set-address">
      <div style="display:flex; gap:10px;"><div style="flex:1;"><label>開始</label><input type="time" id="set-time-start"></div><div style="flex:1;"><label>結束</label><input type="time" id="set-time-end"></div></div>
      <label>限制人數</label><select id="set-limit-select"></select>
      <label>等級要求</label><div style="display:flex; gap:10px;"><select id="set-lv-min"></select><select id="set-lv-max"></select></div>
      <button class="btn-primary" onclick="saveSettings()">儲存設定</button>
      
      <div style="margin-top:30px; border-top:1px solid #333; padding-top:20px;">
        <h3 style="color:var(--neon-red); font-size:14px; margin-bottom:10px;">🚫 團主黑名單</h3>
        <div id="blacklist-view" style="font-size:12px; color:gray;">尚未封鎖任何人</div>
      </div>
      <button class="btn-primary" style="color:var(--neon-red); border-color:var(--neon-red); margin-top:20px;" onclick="deleteGroup()">🗑️ 永久刪除球局</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC8sgJZoA7U1rUY8mnLg-uZKkhMkaSVQ0c",
  authDomain: "badminton-1006.firebaseapp.com",
  projectId: "badminton-1006",
  storageBucket: "badminton-1006.firebasestorage.app",
  messagingSenderId: "103056676038",
  appId: "1:1030566766038:web:e73fbb8976fec3cf423077",
  databaseURL: "https://badminton-1006-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

const urlParams = new URLSearchParams(window.location.search);
const groupId = urlParams.get('id');
let currentUser = null, players = [], groupSettings = {}, isAdmin = false;

function initSelects() {
    const lSel = document.getElementById('set-limit-select');
    for(let i=1; i<=50; i++) lSel.add(new Option(i + " 人", i));
    const minL = document.getElementById('set-lv-min'), maxL = document.getElementById('set-lv-max');
    for(let i=1; i<=18; i++) { minL.add(new Option(i + " 級", i)); maxL.add(new Option(i + " 級", i)); }
}
initSelects();

function switchTab(tId) {
    ['game','signup','roster','admin'].forEach(id => {
        document.getElementById('sec-'+id).classList.toggle('active', id===tId);
        document.getElementById('tab-'+id).classList.toggle('active', id===tId);
    });
}

auth.onAuthStateChanged((user) => {
  document.querySelectorAll('#login-screen, #lobby-screen, #room-screen').forEach(el => el.style.display = 'none');
  if (user) {
    currentUser = user;
    document.getElementById('user-display-name').textContent = "Hi, " + user.displayName;
    document.getElementById('inp-name').value = user.displayName;
    document.getElementById('logout-btn').style.display = 'block';
    checkHostStatus(user.uid);
    if (!groupId) { document.getElementById('lobby-screen').style.display = 'block'; loadLobbyGames(); }
    else { document.getElementById('room-screen').style.display = 'block'; loadRoomData(groupId); }
  } else { document.getElementById('login-screen').style.display = 'flex'; }
});

function checkHostStatus(uid) {
  db.ref('hosts/' + uid).on('value', (s) => {
    const d = s.val(), st = (typeof d === 'object') ? d.status : d;
    if (st === 'approved') document.getElementById('create-btn').style.display = 'block';
  });
}

function loadLobbyGames() {
  db.ref('groups').on('value', (snap) => {
    const data = snap.val(); if (!data) return;
    let html = "";
    Object.keys(data).forEach(id => {
      const s = data[id].settings, cnt = data[id].players ? Object.keys(data[id].players).length : 0;
      if (s.venue) {
        html += `<div class="card" onclick="window.location.href='?id=${id}'" style="cursor:pointer; border-left:4px solid var(--neon-green);">
          <div style="display:flex; justify-content:space-between;"><b>${s.venue}</b><span class="badge">${cnt}/${s.limit}人</span></div>
          <div style="font-size:11px; color:gray; margin-top:5px;">${s.lvMin}-${s.lvMax}級 | ${s.date} ${s.timeStart}</div></div>`;
      }
    });
    document.getElementById('other-games-container').innerHTML = html || "<p style='text-align:center; color:gray;'>尚無球局</p>";
  });
}

function loadRoomData(id) {
  db.ref('groups/' + id + '/settings').on('value', (s) => {
    const st = s.val(); if (!st) return; groupSettings = st;
    if (st.ownerUid === currentUser.uid) { isAdmin = true; document.body.classList.add('is-admin'); loadBlacklist(); }
    document.getElementById('disp-venue').textContent = st.venue || "未命名";
    document.getElementById('disp-date').textContent = st.date || "-";
    document.getElementById('disp-time-range').textContent = (st.timeStart||"") + "~" + (st.timeEnd||"");
    document.getElementById('disp-lv-range').textContent = st.lvMin + "-" + st.lvMax;
    
    if(isAdmin){
      document.getElementById('set-venue').value = st.venue || "";
      document.getElementById('set-limit-select').value = st.limit || 12;
      document.getElementById('set-lv-min').value = st.lvMin || 1;
      document.getElementById('set-lv-max').value = st.lvMax || 18;
    }
  });

  db.ref('groups/' + id + '/players').on('value', (s) => {
    const d = s.val(); players = d ? Object.keys(d).map(k => ({...d[k], fbKey: k})) : [];
    renderRoster();
    document.getElementById('count-badge').textContent = players.length + "人";
    document.getElementById('disp-full-count').textContent = players.length + "/" + (groupSettings.limit || 0);
  });
}

async function doSignup() {
  // 🛡️ 檢查是否在黑名單中
  const blacksnap = await db.ref('blacklists/' + groupSettings.ownerUid + '/' + currentUser.uid).get();
  if (blacksnap.exists()) return alert("❌ 報名失敗：您已被該團主列入黑名單。");

  const lv = parseInt(document.getElementById('inp-level').value);
  const ph = document.getElementById('inp-phone').value.trim();
  if (!lv || !ph) return showToast("請完整填寫");
  if (lv < groupSettings.lvMin || lv > groupSettings.lvMax) return showToast("等級不符要求！");
  
  db.ref('groups/' + groupId + '/players/' + currentUser.uid).set({ 
    uid: currentUser.uid, name: document.getElementById('inp-name').value, level: lv, photoURL: currentUser.photoURL, time: Date.now() 
  }).then(() => {
    db.ref('groups/' + groupId + '/playerPhones/' + currentUser.uid).set(ph);
    showToast("報名成功！"); switchTab('roster');
  });
}

// 🛡️ 管理功能：標記臨退、封鎖、實力鑑定
function markLateCancel(uid, name) {
  if(!confirm("確定要標記 " + name + " 為臨退嗎？這會永久記錄在他的檔案中。")) return;
  const ref = db.ref('userRecords/' + uid + '/lateCancels').push();
  ref.set({ time: Date.now(), groupId: groupId }).then(() => showToast("已標記臨退紀錄。"));
}

function addToBlacklist(uid, name) {
  if(!confirm("確定要封鎖 " + name + " 嗎？他將無法再報名您的任何球局。")) return;
  db.ref('blacklists/' + currentUser.uid + '/' + uid).set({ name: name, time: Date.now() }).then(() => showToast("已加入黑名單。"));
}

function rateSkill(uid, name) {
  const score = prompt("請輸入鑑定等級 (1-18)：", "10");
  if(score) {
    db.ref('userRecords/' + uid + '/skillRatings').push({ score: parseInt(score), rater: currentUser.uid });
    showToast("鑑定成功。");
  }
}

function renderRoster() {
  const l = document.getElementById('roster-list');
  if (players.length === 0) { l.innerHTML = "<p style='text-align:center; color:gray;'>尚未有人報名</p>"; return; }
  
  l.innerHTML = players.map(p => {
    const isAdminView = isAdmin;
    const phoneId = `phone-${p.uid}`;
    const recordId = `record-${p.uid}`;
    
    if (isAdminView) {
        db.ref('groups/' + groupId + '/playerPhones/' + p.uid).once('value', s => { if (document.getElementById(phoneId)) document.getElementById(phoneId).textContent = s.val() || '無電話'; });
    }
    
    // 讀取該球友的歷史信用紀錄
    db.ref('userRecords/' + p.uid).once('value', s => {
        const d = s.val();
        if (d && document.getElementById(recordId)) {
            const cancels = d.lateCancels ? Object.keys(d.lateCancels).length : 0;
            const rates = d.skillRatings ? Object.values(d.skillRatings) : [];
            const avg = rates.length ? (rates.reduce((a,b)=>a+b.score,0)/rates.length).toFixed(1) : '無';
            document.getElementById(recordId).innerHTML = (cancels > 0 ? `<span class="warn-mark">⚠️ 臨退 ${cancels} 次</span>` : '') + ` <span style="color:#aaa; font-size:10px;">鑑定: ${avg}級</span>`;
        }
    });

    return `
    <div class="player-row">
      <div class="player-main">
        <div class="avatar">${p.photoURL ? `<img src="${p.photoURL}">` : p.name[0]}</div>
        <div style="flex:1">
            <b>${p.name}</b> <span class="lvl-badge l${p.level > 15 ? '16-18' : '1-3'}">LV.${p.level}</span>
            <span id="${recordId}"></span>
            <div style="font-size:11px;color:gray" id="${phoneId}">${isAdminView ? '讀取中...' : '通訊受保護'}</div>
        </div>
      </div>
      ${isAdminView ? `
      <div class="admin-actions">
        <button class="btn-danger" onclick="markLateCancel('${p.uid}', '${p.name}')">🚫 標記臨退</button>
        <button class="btn-danger" onclick="addToBlacklist('${p.uid}', '${p.name}')">🔒 封鎖</button>
        <button class="btn-danger" style="color:var(--neon-green); border-color:var(--neon-green);" onclick="rateSkill('${p.uid}', '${p.name}')">⚖️ 鑑定實力</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

function loadBlacklist() {
    db.ref('blacklists/' + currentUser.uid).on('value', s => {
        const d = s.val();
        const el = document.getElementById('blacklist-view');
        if(!d) { el.innerHTML = "尚未封鎖任何人"; return; }
        el.innerHTML = Object.keys(d).map(uid => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span>${d[uid].name}</span>
                <button class="btn-danger" onclick="db.ref('blacklists/${currentUser.uid}/${uid}').remove()">解除</button>
            </div>
        `).join('');
    });
}

function createNewGroup() {
  const newId = Math.random().toString(36).substring(2, 8);
  db.ref('groups/' + newId + '/settings').set({ ownerUid: currentUser.uid, venue: "", date: "", lvMin: 1, lvMax: 18, limit: 12 })
    .then(() => window.location.href = "?id=" + newId);
}
function saveSettings() {
  db.ref('groups/' + groupId + '/settings').update({
    venue: document.getElementById('set-venue').value,
    limit: parseInt(document.getElementById('set-limit-select').value),
    lvMin: parseInt(document.getElementById('set-lv-min').value),
    lvMax: parseInt(document.getElementById('set-lv-max').value)
  }).then(() => showToast("設定已儲存！"));
}
function signInWithGoogle() { auth.signInWithPopup(provider); }
function signOut() { auth.signOut().then(() => window.location.href = window.location.pathname); }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
function toggleDrawer(t) { const el = document.getElementById('content-' + t); el.style.display = el.style.display === 'none' ? 'block' : 'none'; }
function applyForHost() { if(confirm("申請當團主？")) db.ref('hosts/' + currentUser.uid).set({status:'pending', name:currentUser.displayName, email:currentUser.email, time:Date.now()}).then(()=>showToast("已送出")); }
</script>
</body>
</html>
