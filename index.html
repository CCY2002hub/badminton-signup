<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羽球揪團佈告欄 - Ocean Style</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== 酷藍深海基調設計 ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* Ocean Palette */
  --bg-deep: #020c1b; /* 深海 */
  --bg-dark: #0a192f;  /* 暗海 */
  --bg-light: #172a45; /* 淺海 */
  --text-main: #e6f1ff; /* 亮白 */
  --text-dim: #ccd6f6;  /* 灰白 */
  --text-cyan: #64ffda; /* 螢光藍綠 */
  --border: rgba(100, 255, 218, 0.1); /* 螢光藍綠邊框 */
  
  /* Accent Colors (Neon) */
  --neon-green: #64ffda; /* 螢光藍綠 */
  --neon-red: #ff5e5e;   /* 霓虹紅 */
  --neon-blue: #007bff;  /* 霓虹藍 */
  
  /* Glassmorphism */
  --surface-glass: rgba(17, 34, 64, 0.6); /* 半透明資訊面 */
  --header-glass: rgba(10, 25, 47, 0.8);  /* 半透明導覽列 */
  --blur: blur(10px);
  
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 10px 30px -10px rgba(2,12,27,0.7);
}

body {
  font-family: 'Noto Sans TC', sans-serif;
  background-color: var(--bg-deep);
  color: var(--text-main);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
  position: relative;
  overflow-x: hidden;
}

/* 1. 動態深海背景與羽球圖騰 */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background-image: 
    /* 深海動態漸層 */
    linear-gradient(135deg, #020c1b 0%, #0a192f 50%, #172a45 100%);
  z-index: -2;
}

/* 酷炫羽球圖騰特效 (純 CSS 繪製) */
body::after {
  content: "🏸"; /* 羽球 emoji 作為圖騰 */
  font-size: 50vw; /* 巨型圖騰 */
  color: rgba(100, 255, 218, 0.03); /* 極淡的螢光藍綠，若隱若現 */
  position: fixed;
  bottom: -10vw; right: -10vw;
  z-index: -1;
  pointer-events: none;
  filter: blur(5px); /* 輕微模糊，像羽球飛舞的痕跡 */
}

/* 2. 深海泡泡特效 (酷的關鍵) */
.ocean-bubbles {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: -1;
  pointer-events: none;
}
.bubble {
  position: absolute;
  background-color: rgba(100, 255, 218, 0.05); /* 淡螢光藍泡泡 */
  border-radius: 50%;
  animation: bubble-float linear infinite;
}

@keyframes bubble-float {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 0.8; }
  90% { opacity: 1; }
  100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
}

/* 動態生成不同大小和速度的泡泡 */
.bubble:nth-child(1) { width: 40px; height: 40px; left: 10%; animation-duration: 25s; animation-delay: 1s; }
.bubble:nth-child(2) { width: 20px; height: 20px; left: 30%; animation-duration: 18s; animation-delay: 5s; }
.bubble:nth-child(3) { width: 50px; height: 50px; left: 50%; animation-duration: 30s; animation-delay: 3s; }
.bubble:nth-child(4) { width: 30px; height: 30px; left: 70%; animation-duration: 22s; animation-delay: 8s; }
.bubble:nth-child(5) { width: 25px; height: 25px; left: 90%; animation-duration: 20s; animation-delay: 2s; }

/* ===== 玻璃擬態 (Glassmorphism) 元件 ===== */
.site-header {
  background: var(--header-glass);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  position: sticky; top: 0; z-index: 40;
  transition: all 0.3s ease;
}
.site-header:hover {
  border-bottom-color: rgba(100, 255, 218, 0.3); /* 滑過時邊框微亮 */
}
.header-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
.logo { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; cursor: pointer; text-decoration: none; color: var(--text-cyan); text-shadow: 0 0 10px rgba(100, 255, 218, 0.3); }
.action-btn { font-size: 12px; padding: 6px 16px; border: 1px solid var(--neon-green); border-radius: 20px; background: transparent; cursor: pointer; color: var(--neon-green); transition: all .15s; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
.action-btn:hover { background: rgba(100, 255, 218, 0.1); box-shadow: 0 0 15px rgba(100, 255, 218, 0.2); }
.admin-badge { font-size: 11px; background: var(--neon-green); color: var(--bg-deep); padding: 4px 10px; border-radius: 10px; font-weight: bold; display: none; text-shadow: none; box-shadow: 0 0 10px rgba(100, 255, 218, 0.4); }
.container { max-width: 960px; margin: 0 auto; padding: 2rem 1rem 5rem; }

/* 玻璃卡片 */
.card {
  background: var(--surface-glass);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
}
.card:hover {
  border-color: rgba(100, 255, 218, 0.2); /* 滑過時邊框微亮 */
}
.card-title { font-size: 16px; font-weight: 700; margin-bottom: 1.25rem; color: var(--text-dim); border-bottom: 1px solid var(--border); padding-bottom: 8px; }

/* 螢光酷炫按鈕 */
.submit-btn {
  width: 100%; padding: 12px;
  background: transparent;
  color: var(--neon-green);
  border: 1px solid var(--neon-green);
  border-radius: var(--radius-sm);
  font-weight: 700; cursor: pointer; margin-top: 1rem;
  transition: all 0.2s;
  text-transform: uppercase; letter-spacing: 2px;
  position: relative; overflow: hidden;
}
.submit-btn:hover {
  background: rgba(100, 255, 218, 0.1);
  box-shadow: 0 0 20px rgba(100, 255, 218, 0.3);
}
.submit-btn:active { transform: scale(0.98); }

/* 球局資訊與名單樣式 (霓虹效果) */
.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(175px, 1fr)); gap: 12px; margin-bottom: 1rem; }
.info-block { background: rgba(23, 42, 69, 0.5); border: 1px solid rgba(100, 255, 218, 0.05); border-radius: var(--radius-sm); padding: .75rem 1rem; transition: border-color 0.2s; }
.info-block:hover { border-color: rgba(100, 255, 218, 0.2); }
.info-label { font-size: 11px; color: var(--text-cyan); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
.info-value { font-size: 14px; font-weight: 500; color: var(--text-main); }

.fee-row { display: flex; gap: 12px; margin-bottom: 1rem; }
.fee-card { flex: 1; border-radius: var(--radius-sm); padding: .75rem 1rem; border: 1px solid transparent; transition: all 0.2s; }
.fee-m { background: rgba(24, 95, 165, 0.1); border-color: rgba(24, 95, 165, 0.3); color: var(--neon-blue); }
.fee-m:hover { box-shadow: 0 0 15px rgba(24, 95, 165, 0.2); }
.fee-f { background: rgba(237, 147, 177, 0.1); border-color: rgba(237, 147, 177, 0.3); color: #ed93b1; }
.fee-f:hover { box-shadow: 0 0 15px rgba(237, 147, 177, 0.2); }

.badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 500; display: inline-block; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
.bg-green { background: rgba(100, 255, 218, 0.1); color: var(--neon-green); border: 1px solid var(--neon-green); box-shadow: 0 0 10px rgba(100, 255, 218, 0.2); }
.bg-red { background: rgba(255, 94, 94, 0.1); color: var(--neon-red); border: 1px solid var(--neon-red); box-shadow: 0 0 10px rgba(255, 94, 94, 0.2); }

/* 名單樣式 (Neon Player Row) */
.player-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); transition: all 0.2s; }
.player-row:hover { background: rgba(100, 255, 218, 0.03); }
.avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; background: rgba(100, 255, 218, 0.1); color: var(--neon-green); border: 1px solid rgba(100, 255, 218, 0.3); overflow: hidden; box-shadow: 0 0 10px rgba(100, 255, 218, 0.1); }
.avatar img { width: 100%; height: 100%; object-fit: cover; }

/* 首頁佈告欄卡片特效 (酷炫升級) */
.game-card { cursor: pointer; border-left: 4px solid var(--neon-green); margin-bottom: 0; position: relative; overflow: hidden; transition: all 0.3s ease; }
.game-card::after { content: "🏸"; position: absolute; right: 10px; bottom: 5px; font-size: 40px; opacity: 0.05; color: var(--text-cyan); transition: opacity 0.3s; }
.game-card:hover {
  transform: translateY(-4px) scale(1.01);
  box-shadow: 0 10px 40px rgba(2,12,27,0.8);
  border-left-color: #fff; /* 滑過時邊框變白色 */
}
.game-card:hover::after { opacity: 0.1; } /* 羽球圖騰浮現 */

/* 其他設定 (頁籤與表單) */
.tabs { display: flex; gap: 6px; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; overflow-x: auto; scrollbar-width: none; }
.tab { padding: 12px 18px; font-size: 13px; font-weight: 500; border: none; background: none; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; white-space: nowrap; transition: all .2s; letter-spacing: 1px; }
.tab:hover { color: var(--text-cyan); }
.tab.active { color: var(--text-cyan); border-bottom-color: var(--text-cyan); text-shadow: 0 0 10px rgba(100, 255, 218, 0.3); }

input { width: 100%; padding: 11px 15px; background: rgba(2, 12, 27, 0.3); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; color: var(--text-main); transition: all 0.2s; }
input:focus { outline: none; border-color: var(--neon-green); box-shadow: 0 0 10px rgba(100, 255, 218, 0.2); background: rgba(2, 12, 27, 0.5); }
input[readonly] { background: rgba(10, 25, 47, 0.6); color: var(--text-dim); border-color: transparent; }

.section { display: none; }
.section.active { display: block; animation: section-fade-in 0.3s ease; }
@keyframes section-fade-in { from { opacity: 0; transform: translateY(10s); } to { opacity: 1; transform: translateY(0); } }

#login-screen, #lobby-screen, #room-screen { display: none; }
.is-admin .admin-only { display: block !important; }
.admin-only { display: none !important; }

/* 吐司通知 (霓虹霓虹通知) */
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(10, 25, 47, 0.9); backdrop-filter: var(--blur); color: var(--text-cyan); border: 1px solid var(--neon-green); padding: 12px 24px; border-radius: 20px; font-size: 13px; font-weight: 500; transition: transform .3s; z-index: 200; box-shadow: 0 0 20px rgba(100, 25, 218, 0.2); white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }

</style>
</head>
<body>

<div class="ocean-bubbles">
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
</div>

<header class="site-header">
  <div class="header-inner">
    <a href="?" class="logo">🏸 羽球揪團佈告欄</a>
    <div style="display:flex; align-items:center; gap:12px;">
      <span id="user-display-name" style="font-size:12px; font-weight:500; color:var(--text-dim);"></span>
      <span class="admin-badge" id="admin-badge">團主</span>
      <button class="action-btn" id="logout-btn" onclick="signOut()" style="display:none;">登出</button>
    </div>
  </div>
</header>

<div id="login-screen" class="container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh;">
  <div class="card" style="text-align: center; width: 100%; max-width: 400px; padding: 2.5rem;">
    <div style="font-size: 56px; margin-bottom: 15px; text-shadow: 0 0 20px rgba(100, 255, 218, 0.3);">🏸</div>
    <h2 style="margin-bottom: 10px; color:var(--text-cyan);">羽球揪團佈告欄</h2>
    <p style="color: var(--text-dim); font-size: 13px; margin-bottom: 30px; letter-spacing: 1px;">尋找你的最強羽球夥伴</p>
    <button class="submit-btn" style="background: rgba(66, 133, 244, 0.1); border-color:#4285F4; color:#fff; display:flex; align-items:center; justify-content:center; gap:8px;" onclick="signInWithGoogle()">
      <span style="background:white; border-radius:50%; padding:2px; display:flex;">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
      </span>
      使用 Google 帳號登入
    </button>
  </div>
</div>

<div id="lobby-screen" class="container">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
    <h2 style="color:var(--text-cyan); text-shadow: 0 0 15px rgba(100, 255, 218, 0.2);">📣 尋找開放球局</h2>
    <button class="action-btn" style="background:var(--neon-green); color:var(--bg-deep); border:none; padding:8px 20px; box-shadow: 0 5px 20px rgba(100, 255, 218, 0.3);" onclick="createNewGroup()">➕ 創建球局</button>
  </div>
  <div id="games-list" style="display: grid; gap: 18px;">
    <div style="text-align:center; padding: 3rem; color:var(--text-dim); background:var(--surface-glass); border-radius:var(--radius); border:1px solid var(--border);">讀取球局中...</div>
  </div>
</div>

<div id="room-screen" class="container">
  <div style="margin-bottom: 20px;">
    <button class="action-btn" style="border-color:var(--text-dim); color:var(--text-dim);" onclick="window.location.href='?'">🔙 回到佈告欄</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('game')">球局資訊</button>
    <button class="tab" onclick="switchTab('signup')">報名臨打</button>
    <button class="tab" onclick="switchTab('roster')">報名名單</button>
    <button class="tab admin-only" onclick="switchTab('admin')">⚙️ 團主設定</button>
  </div>

  <div id="sec-game" class="section active">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;border-bottom:1px solid var(--border);padding-bottom:10px;">
        <h2 id="disp-title" style="color:var(--text-main); margin:0;">載入中...</h2>
        <span class="badge bg-green" id="status-badge">報名中</span>
      </div>
      <div class="info-grid">
        <div class="info-block"><div class="info-label">📍 地點</div><div id="disp-venue" class="info-value">-</div></div>
        <div class="info-block"><div class="info-label">⏰ 時間</div><div id="disp-time" class="info-value">-</div></div>
        <div class="info-block"><div class="info-label">📅 日期</div><div id="disp-date" class="info-value">-</div></div>
      </div>
      <div class="fee-row">
        <div class="fee-card fee-m">♂ 男生 <span id="disp-fee-m" style="font-weight:700;">-</span></div>
        <div class="fee-card fee-f">♀ 女生 <span id="disp-fee-f" style="font-weight:700;">-</span></div>
      </div>
    </div>
  </div>

  <div id="sec-signup" class="section">
    <div class="card">
      <div class="card-title">填寫報名資料</div>
      <div class="form-group">
        <label class="form-label">姓名 (Google 預設)</label>
        <input type="text" id="inp-name" readonly style="color:var(--text-dim);">
      </div>
      <div class="form-group">
        <label class="form-label">聯絡電話 (團主聯絡用)</label>
        <input type="tel" id="inp-phone" placeholder="09xx-xxx-xxx">
      </div>
      <button class="submit-btn" onclick="doSignup()">確認報名</button>
    </div>
  </div>

  <div id="sec-roster" class="section">
    <div class="card">
      <div style="display:flex;justify-content:space-between; margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px;">
        <span class="card-title" style="margin:0; border:none; padding:0;">目前報名名單</span>
        <span style="font-size:14px; color:var(--text-cyan); font-weight:500;">共 <span id="count" style="font-size:18px;">0</span> 人</span>
      </div>
      <div id="roster-list">載入中...</div>
    </div>
  </div>

  <div id="sec-admin" class="section admin-only">
    <div class="card" style="border-color:rgba(100, 255, 218, 0.3);">
      <div class="card-title" style="color:var(--neon-green);">球局設定管理</div>
      <div class="form-group"><label>標題</label><input type="text" id="set-title"></div>
      <div class="form-group"><label>球館地點</label><input type="text" id="set-venue"></div>
      <div class="form-group"><label>日期</label><input type="text" id="set-date"></div>
      <div class="form-group"><label>時間</label><input type="text" id="set-time"></div>
      <div class="form-group"><label>男生費用</label><input type="text" id="set-fee-m"></div>
      <div class="form-group"><label>女生費用</label><input type="text" id="set-fee-f"></div>
      <button class="submit-btn" onclick="saveSettings()">儲存設定</button>
      <button class="submit-btn" onclick="clearPlayers()" style="background:rgba(255, 94, 94, 0.05); color:var(--neon-red); border-color:var(--neon-red); margin-top:25px; letter-spacing:1px; font-size:13px;">⚠️ 清空名單</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

<script>
// 1. Firebase 配置
const firebaseConfig = {
  apiKey: "AIzaSyC8sgJZoA7U1rUY8mnLg-uZKkhMkaSVQ0c",
  authDomain: "badminton-1006.firebaseapp.com",
  projectId: "badminton-1006",
  storageBucket: "badminton-1006.firebasestorage.app",
  messagingSenderId: "103056676038",
  appId: "1:1030566766038:web:e73fbb8976fec3cf423077",
  databaseURL: "https://badminton-1006-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

// 2. 判斷網址有沒有房間號碼
const urlParams = new URLSearchParams(window.location.search);
const groupId = urlParams.get('id');

let currentUser = null;
let players = [];
let isAdmin = false;

// 3. 監聽登入狀態
auth.onAuthStateChanged((user) => {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('lobby-screen').style.display = 'none';
  document.getElementById('room-screen').style.display = 'none';

  if (user) {
    currentUser = user;
    document.getElementById('logout-btn').style.display = 'block';
    document.getElementById('user-display-name').textContent = "Hi, " + user.displayName;
    document.getElementById('inp-name').value = user.displayName;
    
    if (!groupId) {
      // 在首頁 (沒有帶ID) -> 顯示大廳並讀取所有球局
      document.getElementById('lobby-screen').style.display = 'block';
      loadLobbyGames();
    } else {
      // 點進了某個球局 -> 進入該房間
      document.getElementById('room-screen').style.display = 'block';
      loadRoomData(groupId);
    }
  } else {
    // 沒登入
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('logout-btn').style.display = 'none';
    document.getElementById('user-display-name').textContent = "";
  }
});

function signInWithGoogle() {
  auth.signInWithPopup(provider).catch(err => showToast("登入失敗：" + err.message));
}

function signOut() {
  auth.signOut().then(() => { window.location.href = window.location.pathname; });
}

// ==========================================
// 大廳 (揪團佈告欄) 邏輯
// ==========================================

function loadLobbyGames() {
  db.ref('groups').on('value', (snapshot) => {
    const data = snapshot.val();
    const list = document.getElementById('games-list');
    
    if (!data) {
      list.innerHTML = `<div class="card" style="text-align:center; padding: 3rem; color:var(--text-dim);">目前沒有開放的球局 🥲<br>點擊右上角自己創建一個吧！</div>`;
      return;
    }
    
    let html = "";
    // 將 Firebase 資料轉成陣列，並反轉順序讓最新建立的在上面
    const groupsArray = Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse();
    
    groupsArray.forEach(group => {
      const settings = group.settings;
      if (settings) {
        // 計算目前這團有幾人報名
        const playerCount = group.players ? Object.keys(group.players).length : 0;
        
        html += `
          <div class="card game-card" onclick="window.location.href='?id=${group.id}'">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 10px;">
              <h3 style="color:var(--text-main); margin:0;">${settings.title}</h3>
              <span class="badge bg-green" style="font-size:10px; padding:3px 7px;">${playerCount} 人報名</span>
            </div>
            <div style="font-size:13px; color:var(--text-dim); margin-bottom:5px;">📍 地點：${settings.venue}</div>
            <div style="font-size:13px; color:var(--text-dim);">📅 時間：${settings.date} ${settings.time}</div>
          </div>
        `;
      }
    });
    list.innerHTML = html;
  });
}

function createNewGroup() {
  const newId = Math.random().toString(36).substring(2, 8);
  const initialSettings = {
    ownerUid: currentUser.uid,
    title: currentUser.displayName + " 的羽球團",
    venue: "未設定", date: "未設定", time: "未設定", feeM: "未設定", feeF: "未設定"
  };

  db.ref('groups/' + newId + '/settings').set(initialSettings).then(() => {
    window.location.href = window.location.pathname + "?id=" + newId;
  });
}

// ==========================================
// 房間與報名邏輯
// ==========================================

function loadRoomData(id) {
  db.ref('groups/' + id + '/settings').on('value', (snapshot) => {
    const settings = snapshot.val();
    if (settings) {
      if (settings.ownerUid === currentUser.uid) {
        isAdmin = true;
        document.body.classList.add('is-admin');
        document.getElementById('admin-badge').style.display = 'inline-block';
      }

      document.getElementById('disp-title').textContent = settings.title || "羽球臨打團";
      document.getElementById('disp-venue').textContent = settings.venue || "-";
      document.getElementById('disp-date').textContent = settings.date || "-";
      document.getElementById('disp-time').textContent = settings.time || "-";
      document.getElementById('disp-fee-m').textContent = settings.feeM || "-";
      document.getElementById('disp-fee-f').textContent = settings.feeF || "-";
      
      if(isAdmin){
          document.getElementById('set-title').value = settings.title || "";
          document.getElementById('set-venue').value = settings.venue || "";
          document.getElementById('set-date').value = settings.date || "";
          document.getElementById('set-time').value = settings.time || "";
          document.getElementById('set-fee-m').value = settings.feeM || "";
          document.getElementById('set-fee-f').value = settings.feeF || "";
      }
    }
  });

  db.ref('groups/' + id + '/players').on('value', (snapshot) => {
    const data = snapshot.val();
    players = data ? Object.keys(data).map(key => ({...data[key], fbKey: key})) : [];
    renderRoster();
    document.getElementById('count').textContent = players.length;
  });
}

function doSignup() {
  const phone = document.getElementById('inp-phone').value.trim();
  if (!phone) return showToast("請填寫聯絡電話");

  const hasSignedUp = players.some(p => p.uid === currentUser.uid);
  if (hasSignedUp) return showToast("您已經報名過囉！");

  db.ref('groups/' + groupId + '/players').push({ 
    uid: currentUser.uid, name: currentUser.displayName,
    photoURL: currentUser.photoURL, phone: phone, time: Date.now() 
  }).then(() => {
    showToast("報名成功！");
    switchTab('roster');
  });
}

function saveSettings() {
  db.ref('groups/' + groupId + '/settings').update({
    title: document.getElementById('set-title').value,
    venue: document.getElementById('set-venue').value,
    date: document.getElementById('set-date').value,
    time: document.getElementById('set-time').value,
    feeM: document.getElementById('set-fee-m').value,
    feeF: document.getElementById('set-fee-f').value,
  }).then(() => showToast("設定已儲存！"));
}

function clearPlayers() {
  if (confirm("確定要清空名單嗎？此動作無法復原。")) db.ref('groups/' + groupId + '/players').remove().then(() => showToast("已清空名單"));
}

function deletePlayer(key) {
  if(confirm("確定要刪除這位球員嗎？")) db.ref('groups/' + groupId + '/players').child(key).remove();
}

function renderRoster() {
  const list = document.getElementById('roster-list');
  if (players.length === 0) { list.innerHTML = "<div style='text-align:center; color:var(--text-dim); padding: 20px;'>目前尚無人報名</div>"; return; }
  
  list.innerHTML = players.map((p) => {
    const avatar = p.photoURL ? `<img src="${p.photoURL}" alt="avatar">` : p.name[0];
    return `
    <div class="player-row">
      <div class="avatar">${avatar}</div>
      <div style="flex:1">
        <div style="font-weight:700; color:var(--text-main);">${p.name}</div>
        <div style="font-size:12px;color:var(--text-cyan)">${isAdmin ? p.phone : '通訊資料隱藏'}</div>
      </div>
      ${isAdmin ? `<button onclick="deletePlayer('${p.fbKey}')" style="color:var(--neon-red); border:1px solid var(--neon-red); border-radius:4px; padding:4px 8px; background:none; cursor:pointer; font-size:11px;">刪除</button>` : ''}
    </div>`
  }).join('');
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.getAttribute('onclick').includes(id)));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + id));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
