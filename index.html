<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羽球揪團佈告欄 - Privacy Guard V6</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* 視覺與排版保持穩定版，不再贅述... */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { color-scheme: dark; --bg-deep: #020c1b; --bg-dark: #0a192f; --text-main: #e6f1ff; --neon-green: #64ffda; --neon-red: #ff5e5e; --glass: rgba(17, 34, 64, 0.6); --glass-header: rgba(10, 25, 47, 0.8); --border: rgba(100, 255, 218, 0.1); --radius: 12px; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-deep); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #020c1b 0%, #0a192f 50%, #172a45 100%); z-index: -2; }
.header { background: var(--glass-header); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0 1.5rem; position: sticky; top: 0; z-index: 40; }
.header-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
.container { max-width: 960px; margin: 0 auto; padding: 1rem 1rem 5rem; }
.tabs-wrapper { border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; overflow-x: auto; white-space: nowrap; }
.tabs { display: inline-flex; gap: 5px; padding: 0 10px; }
.tab { padding: 15px 18px; font-size: 14px; color: #ccd6f6; cursor: pointer; background: none; border: none; border-bottom: 3px solid transparent; font-weight: 700; transition: 0.3s; }
.tab.active { color: var(--neon-green); border-bottom-color: var(--neon-green); text-shadow: 0 0 10px rgba(100,255,218,0.5); }
.card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
.btn-primary { width: 100%; padding: 12px; background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green); border-radius: 8px; font-weight: 700; cursor: pointer; }
.btn-primary:hover:not(:disabled) { background: rgba(100,255,218,0.1); }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: bold; background: rgba(100,255,218,0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
.lvl-badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; border: 1px solid rgba(255,255,255,0.2); margin-left: 5px; color: #fff; }
input, select, textarea { width: 100%; padding: 12px; background: rgba(2,12,27,0.4); border: 1px solid var(--border); border-radius: 8px; color: #fff; margin-bottom: 1rem; }
.section { display: none; }
.section.active { display: block !important; }
#login-screen, #lobby-screen, #room-screen { display: none; }
.admin-only { display: none !important; }
.is-admin .admin-only { display: block !important; }
.player-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(100,255,218,0.1); border: 1px solid var(--border); overflow: hidden; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translate(-50%, 100px); background: rgba(10,25,47,0.9); border: 1px solid var(--neon-green); padding: 12px 24px; border-radius: 20px; font-size: 13px; color: var(--neon-green); transition: 0.3s; z-index: 200; }
.toast.show { transform: translate(-50%, 0); }

/* 等級分色 */
.l1-3 { background: #4a7c1b; } .l4-5 { background: #a32d2d; } .l6-7 { background: #8e1c5c; } 
.l8-9 { background: #b8860b; } .l10-12 { background: #104e8b; } .l13-15 { background: #696969; }
.l16-18 { background: #000; border-color: var(--neon-green); }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="?" class="logo" style="text-decoration:none;">🏸 羽球揪團系統</a>
    <div style="display:flex; align-items:center; gap:10px;">
      <span id="user-display-name" style="font-size:12px;"></span>
      <button id="logout-btn" style="font-size:10px; padding:4px 8px; background:none; color:var(--text-dim); border:1px solid var(--border); border-radius:15px; cursor:pointer; display:none;" onclick="signOut()">登出</button>
    </div>
  </div>
</header>

<div id="login-screen" class="container" style="flex-direction:column; align-items:center; justify-content:center; height:75vh;">
  <div class="card" style="text-align:center; width:100%; max-width:400px; padding:2.5rem;">
    <div style="font-size:56px; margin-bottom:15px;">🏸</div>
    <h2 style="color:var(--neon-green); margin-bottom:10px;">深海羽球系統</h2>
    <button class="btn-primary" onclick="signInWithGoogle()">Google 快速登入</button>
  </div>
</div>

<div id="lobby-screen" class="container">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
    <h2 style="color:var(--neon-green);">佈告欄</h2>
    <button id="create-btn" class="btn-primary" style="width:auto; margin:0; padding:8px 20px; display:none;" onclick="createNewGroup()">➕ 創建球局</button>
    <button id="apply-btn" class="btn-outline" style="font-size:12px; padding:8px 15px; border:1px solid var(--neon-green); color:var(--neon-green); background:none; border-radius:8px; cursor:pointer;" onclick="applyForHost()">申請當團主</button>
  </div>
  
  <div class="card" style="padding: 10px; border-color:rgba(100,255,218,0.2);">
    <h3 style="font-size:14px; color:var(--text-main); margin: 10px;">👑 我的管理中心</h3>
    <div class="sub-drawer" onclick="toggleDrawer('draft')">
        <div class="drawer-header" style="cursor:pointer;"><div style="color:var(--neon-orange);">📙 待完成草稿 <span id="draft-count">(0)</span></div><span>▼</span></div>
        <div class="drawer-content" id="content-draft" style="display:none; padding:10px;"></div>
    </div>
    <div class="sub-drawer" onclick="toggleDrawer('active')">
        <div class="drawer-header" style="cursor:pointer;"><div style="color:var(--neon-green);">✅ 已發佈球局 <span id="active-count">(0)</span></div><span>▼</span></div>
        <div class="drawer-content" id="content-active" style="display:none; padding:10px;"></div>
    </div>
  </div>
  <div id="other-games-container"></div>
</div>

<div id="room-screen" class="container">
  <div style="margin-bottom: 15px;"><button style="background:none; color:var(--text-dim); border:none; cursor:pointer; font-size:14px;" onclick="window.location.href='?'">🔙 返回佈告欄</button></div>
  <div class="tabs-wrapper"><div class="tabs">
        <button id="tab-game" class="tab active" onclick="switchTab('game')">球局資訊</button>
        <button id="tab-signup" class="tab" onclick="switchTab('signup')">報名臨打</button>
        <button id="tab-roster" class="tab" onclick="switchTab('roster')">報名名單</button>
        <button id="tab-admin" class="tab admin-only" onclick="switchTab('admin')">⚙️ 團主設定</button>
  </div></div>

  <div id="sec-game" class="section active">
    <div class="card">
        <h2 id="disp-venue" style="color:var(--text-main); margin-bottom:5px;">📍 載入中...</h2>
        <div id="disp-address" style="font-size:13px; color:var(--neon-blue); text-decoration:underline; cursor:pointer; margin-bottom:15px;"></div>
        <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px;">
            <span class="badge">👥 人數：<span id="disp-full-count">0/0</span></span>
            <span class="badge">🏆 <span id="disp-lv-range">1-18</span> 級</span>
            <span class="badge">🏟️ 場地：<span id="disp-court-num">-</span></span>
        </div>
        <div style="font-size:14px; margin-bottom:5px;">📅 <span id="disp-date"></span> <span id="disp-time-range"></span></div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <div style="flex:1; background:rgba(24,95,165,0.1); padding:10px; border-radius:8px;">♂ 男 <b id="disp-fee-m">0</b></div>
            <div style="flex:1; background:rgba(237,147,177,0.1); padding:10px; border-radius:8px;">♀ 女 <b id="disp-fee-f">0</b></div>
        </div>
        <div id="note-box" style="margin-top:20px; padding:15px; background:rgba(100,255,218,0.05); border-radius:8px; display:none;">
            <div id="disp-note" style="font-size:14px; white-space:pre-wrap;"></div>
        </div>
    </div>
  </div>

  <div id="sec-signup" class="section">
    <div class="card">
      <div id="signup-form-box">
        <h3>填寫報名資料</h3>
        <label style="margin-top:15px;">報名姓名</label><input type="text" id="inp-name" onfocus="this.select()">
        <label>我的等級 (1-18 級)</label>
        <select id="inp-level"><option value="">請選擇...</option>
            <option value="1">1 級</option><option value="2">2 級</option><option value="3">3 級</option>
            <option value="4">4 級</option><option value="5">5 級</option><option value="6">6 級</option>
            <option value="7">7 級</option><option value="8">8 級</option><option value="9">9 級</option>
            <option value="10">10 級</option><option value="11">11 級</option><option value="12">12 級</option>
            <option value="13">13 級</option><option value="14">14 級</option><option value="15">15 級</option>
            <option value="16">16 級</option><option value="17">17 級</option><option value="18">18 級</option>
        </select>
        <label>聯絡電話</label><input type="tel" id="inp-phone" placeholder="09xx-xxx-xxx">
        <button id="signup-btn" class="btn-primary" onclick="doSignup()">確認報名</button>
      </div>
      <div id="signup-full-msg" style="display:none; text-align:center; padding:20px;"><h3 style="color:var(--neon-orange);">⚠️ 本團人數已滿</h3></div>
    </div>
  </div>

  <div id="sec-roster" class="section">
    <div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:15px;"><b>目前名單</b><span id="count-badge" class="badge">0 人</span></div><div id="roster-list"></div></div>
  </div>

  <div id="sec-admin" class="section admin-only">
    <div class="card">
        <label>球館名稱</label><input type="text" id="set-venue">
        <label>詳細地址</label><input type="text" id="set-address">
        <label>場地號碼</label><input type="text" id="set-court-num">
        <label>打球日</label><select id="set-date"><option value="">請選擇...</option><option value="每週一">每週一</option><option value="每週二">每週二</option><option value="每週三">每週三</option><option value="每週四">每週四</option><option value="每週五">每週五</option><option value="每週六">每週六</option><option value="每週日">每週日</option></select>
        <div style="display:flex; gap:10px;"><div style="flex:1;"><label>開始</label><input type="time" id="set-time-start"></div><div style="flex:1;"><label>結束</label><input type="time" id="set-time-end"></div></div>
        <label>限制人數</label><select id="set-limit-select"></select>
        <label>場地數</label><select id="set-courts-select"></select>
        <label>等級要求</label><div style="display:flex; gap:10px;"><select id="set-lv-min"></select><select id="set-lv-max"></select></div>
        <label>男生費用</label><input type="text" id="set-fee-m">
        <label>女生費用</label><input type="text" id="set-fee-f">
        <label>備註</label><textarea id="set-note"></textarea>
        <button class="btn-primary" onclick="saveSettings()">💾 儲存設定</button>
        <button class="btn-primary" onclick="deleteGroup()" style="color:var(--neon-red); border-color:var(--neon-red); margin-top:30px;">🗑️ 刪除球局</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC8sgJZoA7U1rUY8mnLg-uZKkhMkaSVQ0c",
  authDomain: "badminton-1006.firebaseapp.com",
  projectId: "badminton-1006",
  storageBucket: "badminton-1006.firebasestorage.app",
  messagingSenderId: "103056676038",
  appId: "1:1030566766038:web:e73fbb8976fec3cf423077",
  databaseURL: "https://badminton-1006-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

const urlParams = new URLSearchParams(window.location.search);
const groupId = urlParams.get('id');
let currentUser = null;
let players = [];
let groupSettings = {};

function initSelects() {
    const limitSel = document.getElementById('set-limit-select');
    for(let i=1; i<=50; i++) { limitSel.add(new Option(i + " 人", i)); }
    const courtSel = document.getElementById('set-courts-select');
    for(let i=1; i<=10; i++) { courtSel.add(new Option(i + " 面", i)); }
    const minL = document.getElementById('set-lv-min'), maxL = document.getElementById('set-lv-max');
    for(let i=1; i<=18; i++) { minL.add(new Option(i + " 級", i)); maxL.add(new Option(i + " 級", i)); }
}
initSelects();

function switchTab(tId) {
    ['game','signup','roster','admin'].forEach(id => {
        const s = document.getElementById('sec-'+id), t = document.getElementById('tab-'+id);
        if(id===tId){ s.classList.add('active'); if(t) t.classList.add('active'); }
        else { s.classList.remove('active'); if(t) t.classList.remove('active'); }
    });
}

auth.onAuthStateChanged((user) => {
  document.querySelectorAll('#login-screen, #lobby-screen, #room-screen').forEach(el => el.style.display = 'none');
  if (user) {
    currentUser = user;
    document.getElementById('user-display-name').textContent = "Hi, " + user.displayName;
    document.getElementById('logout-btn').style.display = 'block';
    checkHostStatus(user.uid);
    if (!groupId) { document.getElementById('lobby-screen').style.display = 'block'; loadLobbyGames(); }
    else { document.getElementById('room-screen').style.display = 'block'; loadRoomData(groupId); }
  } else { document.getElementById('login-screen').style.display = 'flex'; }
});

function signInWithGoogle() { auth.signInWithPopup(provider); }
function signOut() { auth.signOut().then(() => window.location.href = window.location.pathname); }

function checkHostStatus(uid) {
  db.ref('hosts/' + uid).on('value', (s) => {
    const d = s.val(), st = (typeof d === 'object') ? d.status : d;
    if (st === 'approved') document.getElementById('create-btn').style.display = 'block';
  });
}

function loadLobbyGames() {
  db.ref('groups').on('value', (snap) => {
    const data = snap.val(); if (!data) return;
    let dH = "", aH = "", dC = 0, aC = 0;
    const days = ["每週一","每週二","每週三","每週四","每週五","每週六","每週日"];
    const classified = { "每週一":[],"每週二":[],"每週三":[],"每週四":[],"每週五":[],"每週六":[],"每週日":[] };

    Object.keys(data).forEach(id => {
      const s = data[id].settings, cnt = data[id].players ? Object.keys(data[id].players).length : 0;
      const isComp = (s.venue && s.date); 
      const card = `<div class="card" onclick="window.location.href='?id=${id}'" style="cursor:pointer; border-left:4px solid ${isComp?'var(--neon-green)':'var(--neon-orange)'}; padding:12px; margin-bottom:8px;">
          <div style="display:flex; justify-content:space-between;"><b>${s.venue||"未命名"}</b><span class="badge">${cnt}/${s.limit||0}人</span></div></div>`;
      if (s.ownerUid === currentUser.uid) { if (isComp) { aH += card; aC++; } else { dH += card; dC++; } }
      else if (isComp && classified[s.date]) classified[s.date].push(card);
    });
    document.getElementById('draft-count').textContent = `(${dC})`; document.getElementById('active-count').textContent = `(${aC})`;
    document.getElementById('content-draft').innerHTML = dH || "<p style='color:gray; font-size:12px;'>無草稿</p>";
    document.getElementById('content-active').innerHTML = aH || "<p style='color:gray; font-size:12px;'>無發佈</p>";
    let oH = ""; days.forEach(d => { if (classified[d].length > 0) { oH += `<div class="weekday-divider">${d}</div>`; classified[d].forEach(c => oH += c); } });
    document.getElementById('other-games-container').innerHTML = oH || "<p style='text-align:center; padding:20px; color:gray;'>目前尚無球局</p>";
  });
}

function loadRoomData(id) {
  db.ref('groups/' + id + '/settings').on('value', (s) => {
    const st = s.val(); if (!st) return; groupSettings = st;
    if (st.ownerUid === currentUser.uid) document.body.classList.add('is-admin');
    document.getElementById('disp-venue').textContent = st.venue || "未命名";
    document.getElementById('disp-address').textContent = st.address || "無地址";
    document.getElementById('disp-address').onclick = () => window.open('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(st.address));
    document.getElementById('disp-court-num').textContent = st.courtNum || "-";
    document.getElementById('disp-date').textContent = st.date || "-";
    document.getElementById('disp-time-range').textContent = (st.timeStart || "") + " ~ " + (st.timeEnd || "");
    document.getElementById('disp-fee-m').textContent = st.feeM || "0";
    document.getElementById('disp-fee-f').textContent = st.feeF || "0";
    document.getElementById('disp-lv-range').textContent = (st.lvMin || 1) + "-" + (st.lvMax || 18);
    if (st.note) { document.getElementById('note-box').style.display='block'; document.getElementById('disp-note').textContent=st.note; }
    
    if(document.body.classList.contains('is-admin')){
      document.getElementById('set-venue').value = st.venue || ""; 
      document.getElementById('set-address').value = st.address || "";
      document.getElementById('set-court-num').value = st.courtNum || ""; 
      document.getElementById('set-date').value = st.date || "";
      document.getElementById('set-time-start').value = st.timeStart || "";
      document.getElementById('set-time-end').value = st.timeEnd || "";
      document.getElementById('set-limit-select').value = st.limit || 12;
      document.getElementById('set-courts-select').value = st.courts || 2; 
      document.getElementById('set-lv-min').value = st.lvMin || 1;
      document.getElementById('set-lv-max').value = st.lvMax || 18; 
      document.getElementById('set-fee-m').value = st.feeM || "";
      document.getElementById('set-fee-f').value = st.feeF || ""; 
      document.getElementById('set-note').value = st.note || "";
    }
  });

  db.ref('groups/' + id + '/players').on('value', (s) => {
    const d = s.val(); players = d ? Object.keys(d).map(k => ({...d[k], fbKey: k})) : [];
    renderRoster();
    document.getElementById('count-badge').textContent = players.length + " 人";
    document.getElementById('disp-full-count').textContent = players.length + " / " + (groupSettings.limit || 0);
    const me = players.find(p => p.uid === currentUser.uid);
    if (players.length >= groupSettings.limit && !me) { document.getElementById('signup-form-box').style.display='none'; document.getElementById('signup-full-msg').style.display='block'; }
    else { document.getElementById('signup-form-box').style.display='block'; document.getElementById('signup-full-msg').style.display='none'; }
  });
}

function saveSettings() {
  db.ref('groups/' + groupId + '/settings').update({
    venue: document.getElementById('set-venue').value, address: document.getElementById('set-address').value,
    courtNum: document.getElementById('set-court-num').value, date: document.getElementById('set-date').value,
    timeStart: document.getElementById('set-time-start').value, timeEnd: document.getElementById('set-time-end').value,
    limit: parseInt(document.getElementById('set-limit-select').value),
    courts: parseInt(document.getElementById('set-courts-select').value), lvMin: parseInt(document.getElementById('set-lv-min').value),
    lvMax: parseInt(document.getElementById('set-lv-max').value), feeM: document.getElementById('set-fee-m').value,
    feeF: document.getElementById('set-fee-f').value, note: document.getElementById('set-note').value
  }).then(() => showToast("已儲存！")).catch(() => alert("❌ 權限不足"));
}

function doSignup() {
  const lv = parseInt(document.getElementById('inp-level').value);
  if (!lv) return showToast("請選等級");
  if (lv < groupSettings.lvMin || lv > groupSettings.lvMax) { showToast("等級不符！"); return; }
  const ph = document.getElementById('inp-phone').value.trim(); if (!ph) return showToast("請填手機");
  db.ref('groups/' + groupId + '/players').push({ uid: currentUser.uid, name: document.getElementById('inp-name').value, level: lv, photoURL: currentUser.photoURL, phone: ph, time: Date.now() })
    .then(() => { showToast("成功！"); switchTab('roster'); });
}

function getLvClass(lv) {
    const n = parseInt(lv); if(n<=3) return "l1-3"; if(n<=5) return "l4-5"; if(n<=7) return "l6-7"; 
    if(n<=9) return "l8-9"; if(n<=12) return "l10-12"; if(n<=15) return "l13-15"; return "l16-18";
}

function renderRoster() {
  const l = document.getElementById('roster-list'), isAdmin = document.body.classList.contains('is-admin');
  if (players.length === 0) { l.innerHTML = "<p style='text-align:center; color:gray;'>尚未有人報名</p>"; return; }
  l.innerHTML = players.map(p => `<div class="player-row">
      <div class="avatar">${p.photoURL ? `<img src="${p.photoURL}">` : p.name[0]}</div>
      <div style="flex:1"><b>${p.name}</b> <span class="lvl-badge ${getLvClass(p.level)}">LV.${p.level}</span>
      <div style="font-size:11px;color:gray">${p.phone ? p.phone : '通訊已受保護'}</div></div>
      ${isAdmin ? `<button onclick="deletePlayer('${p.fbKey}')" style="background:none; border:1px solid var(--neon-red); color:var(--neon-red); border-radius:4px; font-size:10px; padding:2px 6px;">移除</button>` : ''}
    </div>`).join('');
}

function createNewGroup() {
  const newId = Math.random().toString(36).substring(2, 8);
  db.ref('groups/' + newId + '/settings').set({ 
      ownerUid: currentUser.uid, venue: "", date: "", lvMin: 1, lvMax: 18, limit: 12, courts: 2, timeStart: "18:00", timeEnd: "20:00"
  }).then(() => window.location.href = window.location.pathname + "?id=" + newId).catch(() => alert("❌ 權限不足"));
}
function deletePlayer(k) { if(confirm("移除？")) db.ref('groups/' + groupId + '/players').child(k).remove(); }
function deleteGroup() { if(confirm("確定刪除？")) db.ref('groups/' + groupId).remove().then(() => window.location.href = window.location.pathname); }
function toggleDrawer(t) { const el = document.getElementById('content-' + t); el.style.display = el.style.display === 'none' ? 'block' : 'none'; }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
</script>
</body>
</html>
