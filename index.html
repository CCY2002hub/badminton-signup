<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite 羽球系統 - V26 Hashtag Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== 核心視覺設定 (完整保留) ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  color-scheme: dark;
  --bg-deep: #020c1b; --bg-dark: #0a192f; --text-main: #e6f1ff; --text-dim: #ccd6f6;
  --neon-green: #64ffda; --neon-red: #ff5e5e; --neon-orange: #ffaa33; --neon-blue: #007bff;
  --glass: rgba(17, 34, 64, 0.6); --glass-header: rgba(10, 25, 47, 0.8);
  --border: rgba(100, 255, 218, 0.1); --radius: 12px;
}
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-deep); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #020c1b 0%, #0a192f 50%, #172a45 100%); z-index: -2; }

/* 頂部導覽 */
.header { background: var(--glass-header); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0 1.5rem; position: sticky; top: 0; z-index: 40; height: 60px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 18px; font-weight: 700; color: var(--neon-green); text-decoration: none; }
.container { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }

/* 分頁切換 */
.tabs-wrapper { border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
.tabs { display: inline-flex; gap: 5px; padding: 0 10px; }
.tab { padding: 15px 18px; font-size: 14px; color: var(--text-dim); cursor: pointer; background: none; border: none; border-bottom: 3px solid transparent; flex-shrink: 0; font-weight: 700; transition: 0.3s; }
.tab.active { color: var(--neon-green); border-bottom-color: var(--neon-green); text-shadow: 0 0 10px rgba(100,255,218,0.5); }

/* 卡片與標籤元件 */
.card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; position: relative; }
.btn-primary { width: 100%; padding: 12px; background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green); border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
.btn-primary:hover:not(:disabled) { background: rgba(100,255,218,0.1); }
.badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: bold; background: rgba(100,255,218,0.1); color: var(--neon-green); border: 1px solid var(--neon-green); margin-right: 5px; margin-bottom: 5px; }
.tag-badge { background: rgba(0, 123, 255, 0.15); color: var(--neon-blue); border-color: var(--neon-blue); }

/* Hashtag 點選按鈕樣式 */
.hashtag-selector { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
.tag-item { padding: 6px 12px; border: 1px solid #444; border-radius: 15px; font-size: 12px; cursor: pointer; transition: 0.2s; color: gray; }
.tag-item.active { border-color: var(--neon-blue); color: var(--neon-blue); background: rgba(0, 123, 255, 0.1); }

/* 名單樣式 */
.player-row { display: flex; flex-direction: column; gap: 10px; padding: 15px 0; border-bottom: 1px solid var(--border); }
.player-main { display: flex; align-items: center; gap: 15px; }
.avatar { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(100,255,218,0.1); border: 1px solid var(--border); overflow: hidden; font-size: 18px; font-weight: bold; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.admin-actions { display: flex; gap: 10px; margin-top: 5px; padding-left: 60px; overflow-x: auto; white-space: nowrap; }

/* 顯示控制 */
.section { display: none; }
.section.active { display: block !important; animation: fadeIn 0.3s; }
#login-screen, #lobby-screen, #room-screen { display: none; }
.admin-only { display: none !important; }
.is-admin .admin-only { display: block !important; }

/* 等級分色 */
.l1-3 { background: #4a7c1b; } .l4-5 { background: #a32d2d; } .l10-12 { background: #104e8b; } .l16-18 { background: #000; border-color: var(--neon-green); }

.toast { position: fixed; bottom: 2rem; left: 50%; transform: translate(-50%, 100px); background: rgba(10,25,47,0.95); border: 1px solid var(--neon-green); padding: 14px 28px; border-radius: 20px; font-size: 14px; font-weight: bold; color: var(--neon-green); transition: 0.3s; z-index: 200; text-align: center; }
.toast.show { transform: translate(-50%, 0); }
</style>
</head>
<body>

<header class="header">
  <a href="?" class="logo">🏸 Elite 羽球系統</a>
  <div style="display:flex; align-items:center; gap:10px;">
    <span id="user-display-name" style="font-size:12px;"></span>
    <button id="logout-btn" style="font-size:10px; padding:6px 12px; background:none; color:var(--text-dim); border:1px solid var(--border); border-radius:15px; cursor:pointer; display:none;" onclick="signOut()">登出</button>
  </div>
</header>

<div id="login-screen" class="container" style="flex-direction:column; align-items:center; justify-content:center; height:75vh;">
  <div class="card" style="text-align:center; width:100%; max-width:400px; padding:3rem 2rem;">
    <div style="font-size:64px; margin-bottom:15px;">🏸</div>
    <h2 style="color:var(--neon-green); margin-bottom:15px;">深海羽球系統</h2>
    <button class="btn-primary" onclick="signInWithGoogle()">使用 Google 帳號登入</button>
  </div>
</div>

<div id="lobby-screen" class="container">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
    <h2 style="color:var(--neon-green);">球局佈告欄</h2>
    <button id="create-btn" class="btn-primary" style="width:auto; margin:0; padding:10px 20px; display:none;" onclick="createNewGroup()">➕ 創建球局</button>
    <button id="apply-btn" class="btn-outline" style="font-size:12px; padding:8px 15px; border:1px solid var(--neon-green); color:var(--neon-green); background:none; border-radius:8px; cursor:pointer;" onclick="applyForHost()">申請當團主</button>
  </div>
  <div class="card" style="padding: 10px; border-color:rgba(100,255,218,0.2);">
    <h3 style="font-size:14px; color:var(--text-main); margin: 10px;">👑 我的管理中心</h3>
    <div id="my-games-list" style="padding: 0 10px;">載入中...</div>
  </div>
  <h3 style="color:var(--text-dim); margin-top:30px; font-size:16px;">🏸 開放報名中</h3>
  <div id="other-games-container">載入中...</div>
</div>

<div id="room-screen" class="container">
  <div style="margin-bottom:15px;"><button style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:15px;" onclick="window.location.href='?'">🔙 返回佈告欄</button></div>
  <div class="tabs-wrapper"><div class="tabs">
    <button id="tab-game" class="tab active" onclick="switchTab('game')">球局資訊</button>
    <button id="tab-signup" class="tab" onclick="switchTab('signup')">報名臨打</button>
    <button id="tab-roster" class="tab" onclick="switchTab('roster')">審核名單</button>
    <button id="tab-admin" class="tab admin-only" onclick="switchTab('admin')">⚙️ 團主管理</button>
  </div></div>

  <div id="sec-game" class="section active">
    <div class="card">
      <div id="disp-hashtags" style="margin-bottom:15px; display:flex; flex-wrap:wrap;"></div>
      
      <h2 id="disp-venue" style="color:var(--text-main); margin-bottom:5px;">📍 載入中...</h2>
      <div id="disp-address" style="color:var(--neon-blue); text-decoration:underline; cursor:pointer; font-size:14px; margin-bottom:15px;"></div>
      
      <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px;">
        <span class="badge">👥 核准：<span id="disp-full-count">0/0</span></span>
        <span class="badge">🏆 等級：<span id="disp-lv-range">1-18</span> 級</span>
        <span class="badge">💳 付款：<span id="disp-payment">現金</span></span>
      </div>
      
      <div class="info-row"><span class="info-label">📅 日期：</span><span id="disp-date">-</span></div>
      <div class="info-row"><span class="info-label">🕒 時間：</span><span id="disp-time-range">-</span></div>
      
      <div style="display:flex; gap:10px; margin-top:20px;">
        <div style="flex:1; background:rgba(24,95,165,0.1); padding:15px; border-radius:8px; text-align:center;">♂ 男生 <br><b id="disp-fee-m" style="font-size:18px;">0</b></div>
        <div style="flex:1; background:rgba(237,147,177,0.1); padding:15px; border-radius:8px; text-align:center;">♀ 女生 <br><b id="disp-fee-f" style="font-size:18px;">0</b></div>
      </div>
      <div id="note-box" style="margin-top:20px; padding:15px; background:rgba(100,255,218,0.05); border-radius:8px; display:none;"><div id="disp-note" style="font-size:14px; white-space:pre-wrap; line-height:1.5;"></div></div>
    </div>
  </div>

  <div id="sec-signup" class="section">
    <div class="card">
      <div id="signup-form-box">
        <h3 style="margin-bottom:15px; color:var(--text-main);">📝 填寫報名資料</h3>
        <label>報名姓名</label><input type="text" id="inp-name" onfocus="this.select()">
        <label>我的羽球等級 (1-18 級)</label>
        <select id="inp-level">
            <option value="">請選擇...</option>
            <optgroup label="新手階 (1-3)"><option value="1">1 級</option><option value="2">2 級</option><option value="3">3 級</option></optgroup>
            <optgroup label="初階 (4-5)"><option value="4">4 級</option><option value="5">5 級</option></optgroup>
            <optgroup label="初中階 (6-7)"><option value="6">6 級</option><option value="7">7 級</option></optgroup>
            <optgroup label="中階 (8-9)"><option value="8">8 級</option><option value="9">9 級</option></optgroup>
            <optgroup label="中進階 (10-12)"><option value="10">10 級</option><option value="11">11 級</option><option value="12">12 級</option></optgroup>
            <optgroup label="高階 (13-15)"><option value="13">13 級</option><option value="14">14 級</option><option value="15">15 級</option></optgroup>
            <optgroup label="職業級 (16-18)"><option value="16">16 級</option><option value="17">17 級</option><option value="18">18 級</option></optgroup>
        </select>
        <label>付款方式</label><select id="inp-payment-choice"><option value="現金">現金支付</option></select>
        <label>聯絡電話 (🔐 個資加密)</label><input type="tel" id="inp-phone" placeholder="0912-345-678">
        <button id="signup-btn" class="btn-primary" onclick="doSignup()">✅ 送出報名 (等待審核)</button>
      </div>
      <div id="signup-full-msg" style="display:none; text-align:center; padding:30px;"><h3 id="msg-content" style="font-size:18px;">狀態讀取中...</h3></div>
    </div>
  </div>

  <div id="sec-roster" class="section">
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:10px;">
            <b style="font-size:16px; color:var(--text-main);">目前名單</b>
            <span id="count-badge" class="badge">讀取中</span>
        </div>
        <div id="roster-list"></div>
    </div>
  </div>

  <div id="sec-admin" class="section admin-only">
    <div class="card">
      <h3 style="color:var(--neon-green); margin-bottom:20px;">⚙️ 球局詳細設定</h3>
      
      <label>場地特色 Hashtag (快速點選)</label>
      <div class="hashtag-selector" id="tag-selector">
          <div class="tag-item" data-val="❄️ 有冷氣">❄️ 有冷氣</div>
          <div class="tag-item" data-val="🥤 飲水機">🥤 飲水機</div>
          <div class="tag-item" data-val="🚿 淋浴間">🚿 淋浴間</div>
          <div class="tag-item" data-val="🎾 教練陪打">🎾 教練陪打</div>
          <div class="tag-item" data-val="🏸 羽毛球">🏸 羽毛球</div>
          <div class="tag-item" data-val="🚗 好停車">🚗 好停車</div>
          <div class="tag-item" data-val="🚻 乾淨廁所">🚻 乾淨廁所</div>
      </div>

      <label>球館名稱</label><input type="text" id="set-venue">
      <label>地址 (連動導航)</label><input type="text" id="set-address">
      <label>打球日</label><select id="set-date"><option value="每週一">每週一</option><option value="每週二">每週二</option><option value="每週三">每週三</option><option value="每週四">每週四</option><option value="每週五">每週五</option><option value="每週六">每週六</option><option value="每週日">每週日</option></select>
      <div style="display:flex; gap:15px; margin-bottom:1rem;"><input type="time" id="set-time-start"><input type="time" id="set-time-end"></div>
      <label>核准人數上限</label><select id="set-limit-select"></select>
      <label>要求等級</label><div style="display:flex; gap:15px; margin-bottom:1rem;"><select id="set-lv-min"></select><select id="set-lv-max"></select></div>
      <label>支付方式 (複選)</label>
      <div style="display:flex; gap:20px; margin-bottom:1rem;"><label><input type="checkbox" id="check-cash"> 現金</label><label><input type="checkbox" id="check-linepay"> LinePay</label></div>
      <div style="display:flex; gap:15px; margin-bottom:1rem;"><input type="number" id="set-fee-m" placeholder="男費用"><input type="number" id="set-fee-f" placeholder="女費用"></div>
      <label>備註</label><textarea id="set-note" rows="3"></textarea>
      <button class="btn-primary" onclick="saveSettings()">💾 儲存並發佈</button>
      <div style="margin-top:30px; border-top:1px solid #333; padding-top:20px;"><h3 style="color:var(--neon-red); font-size:15px;">🚫 黑名單</h3><div id="blacklist-view">無</div></div>
      <button class="btn-primary" style="color:var(--neon-red); border-color:var(--neon-red); margin-top:30px;" onclick="deleteGroup()">🗑️ 永久刪除球局</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC8sgJZoA7U1rUY8mnLg-uZKkhMkaSVQ0c",
  authDomain: "badminton-1006.firebaseapp.com",
  projectId: "badminton-1006",
  storageBucket: "badminton-1006.firebasestorage.app",
  messagingSenderId: "103056676038",
  appId: "1:1030566766038:web:e73fbb8976fec3cf423077",
  databaseURL: "https://badminton-1006-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

const SUPER_ADMIN = 'Lzs6gIJu74QcA9ZoAG0asg0nnBD3'; 
const urlParams = new URLSearchParams(window.location.search);
const groupId = urlParams.get('id');

let currentUser = null, isAdmin = false, groupSettings = {limit:12, lvMin:1, lvMax:18};
let players = [], selectedTags = [];

function initSelects() {
    const lSel = document.getElementById('set-limit-select');
    for(let i=1; i<=50; i++) lSel.add(new Option(i + " 人", i));
    const minL = document.getElementById('set-lv-min'), maxL = document.getElementById('set-lv-max');
    for(let i=1; i<=18; i++) { minL.add(new Option(i + " 級", i)); maxL.add(new Option(i + " 級", i)); }
}
initSelects();

// 🌟 Hashtag 點擊邏輯
document.querySelectorAll('.tag-item').forEach(item => {
    item.onclick = () => {
        item.classList.toggle('active');
        const val = item.getAttribute('data-val');
        if (item.classList.contains('active')) { if(!selectedTags.includes(val)) selectedTags.push(val); }
        else { selectedTags = selectedTags.filter(t => t !== val); }
    };
});

auth.onAuthStateChanged((user) => {
  document.querySelectorAll('#login-screen, #lobby-screen, #room-screen').forEach(el => el.style.display = 'none');
  if (user) {
    currentUser = user;
    document.getElementById('user-display-name').textContent = "Hi, " + user.displayName;
    document.getElementById('inp-name').value = user.displayName;
    document.getElementById('logout-btn').style.display = 'block';
    checkHostStatus(user.uid);
    if (!groupId) { document.getElementById('lobby-screen').style.display = 'block'; loadLobby(); } 
    else { document.getElementById('room-screen').style.display = 'block'; loadRoom(groupId); }
  } else { document.getElementById('login-screen').style.display = 'flex'; }
});

function checkHostStatus(uid) {
  db.ref('hosts/' + uid).on('value', (s) => {
    const d = s.val(), st = (typeof d === 'object') ? d.status : d;
    if (st === 'approved' || uid === SUPER_ADMIN) document.getElementById('create-btn').style.display = 'block';
  });
}

function loadLobby() {
  db.ref('groups').on('value', (snap) => {
    const data = snap.val(); 
    if (!data) return;
    let myHtml = "";
    const classified = { "每週一":[],"每週二":[],"每週三":[],"每週四":[],"每週五":[],"每週六":[],"每週日":[] };
    Object.keys(data).forEach(id => {
      const g = data[id]; if(!g.settings) return;
      const s = g.settings;
      let appCnt = 0; if (g.players) Object.values(g.players).forEach(p => { if(p.status==='approved'||!p.status) appCnt++; });
      checkAutoReset(id, s);
      const isDraft = (!s.venue || s.venue === "新場地 (請點擊管理修改)");
      const card = `<div class="card" onclick="window.location.href='?id=${id}'" style="cursor:pointer; border-left:4px solid ${isDraft?'orange':'var(--neon-green)'}; padding:15px; margin-bottom:10px;">
          <div style="display:flex; justify-content:space-between;"><b>${s.venue||"未命名"}</b><span class="badge">核准 ${appCnt}/${s.limit||12}</span></div>
          <div style="font-size:11px; color:gray;">🏆 ${s.lvMin||1}-${s.lvMax||18}級 | 🕒 ${s.date||""} ${s.timeStart||""}</div></div>`;
      if (s.ownerUid === currentUser.uid || currentUser.uid === SUPER_ADMIN) myHtml += card;
      else if (!isDraft && classified[s.date]) classified[s.date].push(card);
    });
    document.getElementById('my-games-list').innerHTML = myHtml || "<p style='color:gray; font-size:12px;'>無管理球局</p>";
    let finalOther = ""; Object.keys(classified).forEach(d => { if(classified[d].length > 0) finalOther += `<div class="weekday-divider">${d}</div>` + classified[d].join(''); });
    document.getElementById('other-games-container').innerHTML = finalOther || "<p style='text-align:center; padding:20px; color:gray;'>尚無開放球局</p>";
  });
}

function checkAutoReset(id, s) {
    if (!s.date || !s.timeEnd || !s.lastResetDate) return;
    const now = new Date();
    if (s.lastResetDate !== now.toLocaleDateString()) {
        const weekDays = {"每週一":1, "每週二":2, "每週三":3, "每週四":4, "每週五":5, "每週六":6, "每週日":0};
        if (now.getDay() === weekDays[s.date]) {
            const [h, m] = s.timeEnd.split(':').map(Number);
            if ((now.getHours() * 60 + now.getMinutes()) > (h * 60 + m + 30)) {
                db.ref(`groups/${id}/players`).remove().catch(()=>{});
                db.ref(`groups/${id}/playerPhones`).remove().catch(()=>{});
                db.ref(`groups/${id}/settings`).update({ lastResetDate: now.toLocaleDateString() }).catch(()=>{});
            }
        }
    }
}

function loadRoom(id) {
  db.ref('groups/' + id + '/settings').on('value', (s) => {
    const st = s.val(); if (!st) return; groupSettings = st;
    if (st.ownerUid === currentUser.uid || currentUser.uid === SUPER_ADMIN) { isAdmin = true; document.body.classList.add('is-admin'); loadBlacklist(st.ownerUid); }
    
    // 🌟 渲染 Hashtag
    const tagBox = document.getElementById('disp-hashtags');
    tagBox.innerHTML = (st.tags || []).map(t => `<span class="badge tag-badge"># ${t}</span>`).join('');

    document.getElementById('disp-venue').textContent = st.venue || "未命名球館";
    document.getElementById('disp-address').textContent = st.address || "無地址";
    document.getElementById('disp-address').onclick = () => { if(st.address) window.open('https://www.google.com/maps/search/' + encodeURIComponent(st.address)); };
    document.getElementById('disp-date').textContent = st.date || "-";
    document.getElementById('disp-time-range').textContent = (st.timeStart||"") + " ~ " + (st.timeEnd||"");
    document.getElementById('disp-lv-range').textContent = (st.lvMin||1) + " - " + (st.lvMax||18);
    document.getElementById('disp-fee-m').textContent = st.feeM || "0";
    document.getElementById('disp-fee-f').textContent = st.feeF || "0";
    
    let payStr = []; const pSel = document.getElementById('inp-payment-choice'); pSel.innerHTML = "";
    if(st.payCash) { payStr.push("現金"); pSel.add(new Option("現金支付", "現金")); }
    if(st.payLine) { payStr.push("LinePay"); pSel.add(new Option("LinePay 支付", "LinePay")); }
    if(pSel.options.length === 0) { payStr.push("現金 (預設)"); pSel.add(new Option("現金支付", "現金")); }
    document.getElementById('disp-payment').textContent = payStr.join(" / ");

    if (st.note) { document.getElementById('note-box').style.display='block'; document.getElementById('disp-note').textContent=st.note; }
    
    if(isAdmin){
      document.getElementById('set-venue').value = st.venue || ""; document.getElementById('set-address').value = st.address || "";
      document.getElementById('set-date').value = st.date || "每週一"; document.getElementById('set-time-start').value = st.timeStart || ""; 
      document.getElementById('set-time-end').value = st.timeEnd || ""; document.getElementById('set-limit-select').value = st.limit || 12;
      document.getElementById('set-lv-min').value = st.lvMin || 1; document.getElementById('set-lv-max').value = st.lvMax || 18;
      document.getElementById('check-cash').checked = !!st.payCash; document.getElementById('check-linepay').checked = !!st.payLine;
      document.getElementById('set-fee-m').value = st.feeM || ""; document.getElementById('set-fee-f').value = st.feeF || "";
      document.getElementById('set-note').value = st.note || "";
      
      // 同步 Hashtag 選擇狀態
      selectedTags = st.tags || [];
      document.querySelectorAll('.tag-item').forEach(item => {
          item.classList.toggle('active', selectedTags.includes(item.getAttribute('data-val')));
      });
    }
  });

  db.ref('groups/' + id + '/players').on('value', (s) => {
    const d = s.val(); players = d ? Object.keys(d).map(k => ({...d[k], fbKey: k})) : [];
    players.sort((a, b) => { const aApp = a.status === 'approved'||!a.status; const bApp = b.status === 'approved'||!b.status; return (aApp === bApp) ? (a.time-b.time) : (aApp ? -1:1); });
    renderRoster();
    const appCnt = players.filter(p => p.status==='approved'||!p.status).length;
    document.getElementById('disp-full-count').textContent = appCnt + " / " + (groupSettings.limit || 12);
    document.getElementById('count-badge').textContent = `核准: ${appCnt} | 審核: ${players.length - appCnt}`;
    
    const me = players.find(p => p.uid === currentUser.uid);
    if (me) {
        document.getElementById('signup-form-box').style.display = 'none';
        document.getElementById('signup-full-msg').style.display = 'block';
        document.getElementById('msg-content').textContent = me.status === 'pending' ? '⏳ 報名審核中...' : '✅ 報名已核准！';
    } else {
        document.getElementById('signup-form-box').style.display = 'block';
        document.getElementById('signup-full-msg').style.display = 'none';
        document.getElementById('signup-btn').textContent = appCnt >= (groupSettings.limit || 12) ? "📝 報名候補" : "✅ 送出報名";
    }
  });
}

async function doSignup() {
  try {
      const name = document.getElementById('inp-name').value.trim();
      const lv = parseInt(document.getElementById('inp-level').value);
      const pay = document.getElementById('inp-payment-choice').value;
      const ph = document.getElementById('inp-phone').value.trim();
      if (!name || !lv || !pay || !ph) throw new Error("請完整填寫！");

      await db.ref(`groups/${groupId}/players/${currentUser.uid}`).set({
        uid: currentUser.uid, name: name, level: lv, payMethod: pay, photoURL: currentUser.photoURL, time: Date.now(), status: 'pending'
      });
      await db.ref(`groups/${groupId}/playerPhones/${currentUser.uid}`).set(ph);
      showToast("🎉 已送出審核！"); switchTab('roster');
  } catch (e) { showToast("❌ " + e.message); }
}

function renderRoster() {
  const l = document.getElementById('roster-list');
  if (players.length === 0) { l.innerHTML = "<p style='text-align:center; padding:30px;'>尚未有人報名</p>"; return; }
  l.innerHTML = players.map(p => {
    const isApp = p.status === 'approved' || !p.status;
    const phoneId = `phone-${p.uid}`, recordId = `record-${p.uid}`;
    if (isAdmin) db.ref(`groups/${groupId}/playerPhones/${p.uid}`).once('value', s => { if(document.getElementById(phoneId)) document.getElementById(phoneId).textContent = s.val() || '無'; });
    
    db.ref('userRecords/' + p.uid).once('value', s => {
        const d = s.val(); if (!d || !document.getElementById(recordId)) return;
        const c = d.lateCancels ? Object.keys(d.lateCancels).length : 0;
        const r = d.skillRatings ? Object.values(d.skillRatings) : [];
        const avg = r.length ? (r.reduce((a,b)=>a+b.score,0)/r.length).toFixed(1) : '無';
        document.getElementById(recordId).innerHTML = (c > 0 ? `<span class="warn-mark">⚠️ 臨退 ${c} 次</span>` : '') + ` <span class="badge" style="background:rgba(100,255,218,0.1); border:none;">📊 平均鑑定: ${avg} 級</span>`;
    });

    return `<div class="player-row" style="${isApp?'':'opacity:0.6;'}">
      <div class="player-main">
        <div class="avatar">${p.photoURL ? `<img src="${p.photoURL}">` : p.name[0]}</div>
        <div style="flex:1;"><b>${p.name}</b> ${isApp?'':'<span class="badge" style="color:orange; border-color:orange;">⏳ 審核中</span>'}
        <span class="lvl-badge l1-3">LV.${p.level}</span> <span id="${recordId}"></span>
        <div style="font-size:11px; color:var(--neon-orange);" id="${phoneId}">${isAdmin ? '讀取中...' : '🔒 已加密'}</div></div>
      </div>
      ${isAdmin ? `<div class="admin-actions">
        ${isApp ? `<button class="btn-danger" onclick="markLateCancel('${p.uid}','${p.name}')">📌 臨退</button>` : `<button class="btn-danger" style="color:var(--neon-green); border-color:var(--neon-green);" onclick="approvePlayer('${p.uid}')">✅ 核准</button>`}
        <button class="btn-danger" onclick="addToBlacklist('${p.uid}','${p.name}')">🚫 封鎖</button>
        <button class="btn-danger" style="color:var(--neon-blue); border-color:var(--neon-blue);" onclick="rateSkill('${p.uid}','${p.name}')">⚖️ 鑑定</button>
        <button class="btn-danger" style="color:white; border-color:white;" onclick="handleDeletePlayer('${p.uid}','${p.fbKey}')">🗑️ 移除</button></div>` : ''}
    </div>`;
  }).join('');
}

function approvePlayer(uid) { db.ref(`groups/${groupId}/players/${uid}`).update({ status: 'approved' }).then(() => showToast("已核准！")); }
function handleDeletePlayer(uid, fb) { if(confirm("確定移除？")) { db.ref(`groups/${groupId}/players/${fb}`).remove(); db.ref(`groups/${groupId}/playerPhones/${uid}`).remove().then(()=>showToast("已移除")); } }
function markLateCancel(uid, n) { if(confirm(`標記 ${n} 臨退？`)) db.ref('userRecords/'+uid+'/lateCancels').push({time:Date.now()}); }
function addToBlacklist(uid, n) { if(confirm(`封鎖 ${n}？`)) db.ref('blacklists/'+groupSettings.ownerUid+'/'+uid).set({name:n, time:Date.now()}); }
function rateSkill(uid, n) { const s = prompt(`鑑定等級 (1-18)：`, "10"); if(s) db.ref('userRecords/'+uid+'/skillRatings').push({score:parseInt(s), rater:currentUser.uid}); }

function saveSettings() {
  db.ref('groups/' + groupId + '/settings').update({
    venue: document.getElementById('set-venue').value, address: document.getElementById('set-address').value,
    date: document.getElementById('set-date').value, timeStart: document.getElementById('set-time-start').value,
    timeEnd: document.getElementById('set-time-end').value, limit: parseInt(document.getElementById('set-limit-select').value),
    lvMin: parseInt(document.getElementById('set-lv-min').value), lvMax: parseInt(document.getElementById('set-lv-max').value),
    payCash: document.getElementById('check-cash').checked, payLine: document.getElementById('check-linepay').checked,
    feeM: document.getElementById('set-fee-m').value, feeF: document.getElementById('set-fee-f').value, note: document.getElementById('set-note').value,
    tags: selectedTags, lastResetDate: new Date().toLocaleDateString()
  }).then(() => showToast("💾 設定已同步！"));
}

function loadBlacklist(ownerId) {
    db.ref('blacklists/' + ownerId).on('value', s => {
        const d = s.val(), el = document.getElementById('blacklist-view');
        if(!d) { el.innerHTML = "無"; return; }
        el.innerHTML = Object.keys(d).map(uid => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${d[uid].name}</span><button class="btn-danger" onclick="db.ref('blacklists/${ownerId}/${uid}').remove()">解除</button></div>`).join('');
    });
}
function createNewGroup() {
  const newId = Math.random().toString(36).substring(2, 8);
  db.ref('groups/' + newId + '/settings').set({ ownerUid: currentUser.uid, venue: "新場地 (點擊管理修改)", date: "每週一", lvMin: 1, lvMax: 18, limit: 12, payCash: true, lastResetDate: new Date().toLocaleDateString(), tags: [] })
    .then(() => window.location.href = "?id=" + newId);
}
function deleteGroup() { if(confirm("永久刪除？")) db.ref('groups/' + groupId).remove().then(() => window.location.href = "?"); }
function switchTab(tId) { ['game','signup','roster','admin'].forEach(id => { const s = document.getElementById('sec-'+id), t = document.getElementById('tab-'+id); if(s) s.classList.toggle('active', id===tId); if(t) t.classList.toggle('active', id===tId); }); }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
function signInWithGoogle() { auth.signInWithPopup(provider); }
function signOut() { auth.signOut().then(() => window.location.href = "?"); }
function applyForHost() { if(confirm("申請團主？")) db.ref('hosts/' + currentUser.uid).set({status:'pending', name:currentUser.displayName, email:currentUser.email, time:Date.now()}); }
</script>
